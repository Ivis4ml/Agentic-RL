<body>
  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 10 课</p><h1>Ray 编排与端到端</h1><p>能访问 CDN 时切换为交互版。本课把前九课串成一条完整的数据流：RolloutManager 作为 rollout 侧的总控制器（generate 如何分发请求、管理数据、应用奖励后处理、按数据并行切分回填训练数据），RolloutServer/ServerGroup 的服务编排，placement_group 的共置与分离放置，train_actor 角色，一次异步训练步的端到端追踪，examples 串讲，以及 trace/health 观测性。</p></main></div>

  // ===== 总览：编排层的位置 =====
  function OverviewSection(){
    return h("div",null,
      h("p",null,"前九课把 slime 拆成了零件：第 1 课的双引擎与两个入口、第 2 课的统一配置、第 3 课的 RL 数学原语、第 4 课的数据与 Buffer、第 5 课的 Megatron 训练后端、第 6 课的 SGLang 推理后端、第 7 课的权重同步、第 8 课的 rollout 与异步、第 9 课的 Agent 层。本课的任务不是再引入新零件，而是把这些零件装到同一个进程网络里运转起来。承担装配工作的代码集中在 ",h("code",null,"slime/ray/")," 目录，核心是 ",h("code",null,"slime/ray/rollout.py")," 中的 ",h("strong",{className:"hl-teal"},"RolloutManager"),"：它是一个 Ray actor，作为 rollout 侧的总控制器，把生成请求分发给若干 SGLang 引擎，收集样本，做奖励后处理，再按数据并行切分回填成训练数据。"),

          h("p",null,"一个 ",h("code",null,"@ray.remote")," actor，不占 GPU（",h("code",null,"num_gpus=0"),"）。它持有数据源、生成函数、若干 ",h("code",null,"RolloutServer"),"、一把全局锁与健康监控线程，对外暴露 ",h("code",null,"generate"),"/",h("code",null,"eval"),"/",h("code",null,"offload"),"/",h("code",null,"onload")," 等远程方法。"),
          h("div",null,h(Src,{label:"RolloutManager",path:"slime/ray/rollout.py",line:419}),h(Src,{label:"create_rollout_manager",path:"slime/ray/placement_group.py",line:215}))
        ),

          h("div",null,h(Src,{label:"RayTrainGroup",path:"slime/ray/actor_group.py",line:10}),h(Src,{label:"create_training_models",path:"slime/ray/placement_group.py",line:151}))
        )
      ),
      h("p",null,"为什么把 rollout 控制逻辑放进一个独立的 Ray actor，而不是直接写在 ",h("code",null,"train.py")," 主循环里？原因是职责分离与位置无关。SGLang 引擎本身是跨进程、可能跨节点的服务，控制器需要长生命周期地持有它们的句柄、维护数据源的读写指针、运行后台健康监控。把这些状态装进一个 actor，主循环只需通过 ",h("code",null,"rollout_manager.generate.remote(rollout_id)")," 这样的远程调用与之交互，既不必关心引擎部署在哪台机器上，也不会把控制器的内部状态泄漏到训练进程。这正是第 1 课所说的“Ray 作为编排基座”在 rollout 侧的具体形态。"),

  // ===== 放置：placement group 的共置 vs 分离 =====
  function PlacementSection(){
    return h("div",null,
      h("p",null,"一切编排的起点是 GPU 放置。",h("code",null,"create_placement_groups")," 决定一共申请多少张卡，以及哪些卡留给训练（actor / critic）、哪些卡留给 rollout（SGLang 引擎）。它返回一个字典，键为 ",h("code",null,"actor")," / ",h("code",null,"rollout")," / ",h("code",null,"critic"),"，每个值是三元组 ",h("code",null,"(placement_group, reordered_bundle_indices, reordered_gpu_ids)"),"。三元组中的后两项是按物理拓扑排序后的逻辑索引到 bundle、逻辑索引到物理 GPU id 的映射。"),
      h(Code,null,"def _get_placement_group_layout(args) -> tuple[int, int]:\n    actor_num_gpus = args.actor_num_nodes * args.actor_num_gpus_per_node\n\n    if args.debug_train_only:\n        return actor_num_gpus, 0\n    if args.rollout_external:\n        if args.debug_rollout_only:\n            return 0, 0\n        return actor_num_gpus, actor_num_gpus\n    if args.debug_rollout_only:\n        return args.rollout_num_gpus, 0\n    if args.colocate:\n        # 共置: actor 与 rollout 复用同一批卡, 取两者最大值\n        return max(actor_num_gpus, args.rollout_num_gpus), 0\n    # 分离: actor 卡与 rollout 卡相加, rollout 从 actor 卡之后开始\n    return actor_num_gpus + args.rollout_num_gpus, actor_num_gpus"),
      h("p",null,"这个函数返回 ",h("code",null,"(num_gpus, rollout_offset)")," 两个量，决定全局放置布局：",h("code",null,"num_gpus")," 是要申请的 bundle 总数，",h("code",null,"rollout_offset")," 是 rollout 卡在排序后的逻辑序列中的起始下标。两种主要模式的差异完全体现在这里。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"colocate"),"共置"),
          h("p",null,"训练与推理复用同一批 GPU。总卡数取 ",h("code",null,"max(actor_num_gpus, rollout_num_gpus)"),"，rollout offset 为 0，即 rollout 与 actor 从同一个逻辑索引 0 开始，覆盖相同的物理卡。同一时刻只有一侧驻留显存，靠 offload / onload 切换。这是同步训练 ",h("code",null,"train.py")," 的默认路径。"),
          h(Formula,{cap:"共置: 申请的卡数（两侧时分复用同一批卡）"},"$$ N_{\\text{pg}} = \\max(N_{\\text{actor}},\\, N_{\\text{rollout}}) $$")
        ),

        )
      ),

      h(Code,null,"def _create_placement_group(num_gpus):\n    if num_gpus == 0:\n        return None, [], []\n    bundles = [{\"GPU\": 1, \"CPU\": 1} for _ in range(num_gpus)]\n    pg = placement_group(bundles, strategy=\"PACK\")     # PACK: 尽量塞进同一节点\n    ready_ref = pg.ready()\n    elapsed = 0\n    log_interval = 30\n    # 轮询等待调度, 等待期间周期性打印已注册/可用 GPU 数 (便于观察 autoscaler)\n    while not ray.wait([ready_ref], timeout=log_interval)[0]:\n        elapsed += log_interval\n        total = ray.cluster_resources().get(\"GPU\", 0)\n        available = ray.available_resources().get(\"GPU\", 0)\n        logger.info(f\"Waiting for placement group of {num_gpus} GPUs (elapsed {elapsed}s): ...\")\n    # 用临时 InfoActor 收集每个 bundle 的 (节点 IP, GPU id) 并排序\n    info_actors = [InfoActor.options(scheduling_strategy=...).remote() for i in range(num_bundles)]\n    gpu_ids = ray.get([a.get_ip_and_gpu_id.remote() for a in info_actors])\n    for actor in info_actors:\n        ray.kill(actor)\n    sorted_bundle_infos = sorted(bundle_infos, key=sort_key)\n    pg_reordered_bundle_indices = [info[0] for info in sorted_bundle_infos]\n    pg_reordered_gpu_ids = [gpu_ids[info[0]][1] for info in sorted_bundle_infos]\n    return pg, pg_reordered_bundle_indices, pg_reordered_gpu_ids"),

  function GenerateSection(){

      h(Code,null,"def generate(self, rollout_id):\n    start_time = time.time()\n    self.rollout_id = rollout_id\n    self.health_monitoring_resume()\n    if self.args.ci_test and self.args.use_fault_tolerance and rollout_id >= 2:\n        self._try_ci_fault_injection()\n    # 阶段一: 调用生成函数, 得到 list[Sample] 并扁平化\n    data, metrics = self._get_rollout_data(rollout_id=rollout_id)\n    self._save_debug_rollout_data(data, rollout_id=rollout_id, evaluation=False)\n    _log_rollout_data(rollout_id, self.args, data, metrics, time.time() - start_time)\n    if self.args.debug_rollout_only:\n        return                       # 仅调 rollout 时不转训练数据\n    # 阶段二+三: 奖励后处理 + 转训练数据\n    data = self._convert_samples_to_train_data(data)\n    # 阶段四: 按数据并行切分并打包\n    return self._split_train_data_by_dp(data)"),

      h(Formula,{cap:"组归一化优势（GRPO 风格）：i 为组内第 i 条回答，G 为组大小"},"$$ \\hat{A}_i = \\frac{r_i - \\mu_{\\text{group}}}{\\sigma_{\\text{group}} + \\varepsilon}, \\quad \\mu_{\\text{group}}=\\frac{1}{G}\\sum_{j=1}^{G} r_j,\\quad \\sigma_{\\text{group}}=\\sqrt{\\frac{1}{G}\\sum_{j=1}^{G}(r_j-\\mu_{\\text{group}})^2} $$"),
      h(Code,null,"def _post_process_rewards(self, samples):\n    raw_rewards = [s.get_reward_value(self.args) for s in samples]\n    if self.args.advantage_estimator in [\"grpo\", \"gspo\", \"cispo\", \"reinforce_plus_plus_baseline\"] and self.args.rewards_normalization:\n        rewards = torch.tensor(raw_rewards, dtype=torch.float).reshape(-1, self.args.n_samples_per_prompt)\n        mean = rewards.mean(dim=-1, keepdim=True)\n        rewards = rewards - mean                              # 减组内均值\n        if self.args.advantage_estimator in [\"grpo\", \"gspo\", \"cispo\"] and self.args.grpo_std_normalization:\n            std = rewards.std(dim=-1, keepdim=True)\n            rewards = rewards / (std + 1e-6)                  # 除组内标准差\n        return raw_rewards, rewards.flatten().tolist()\n    return raw_rewards, raw_rewards"),

      h(Code,null,"# rollout_mask_sums[i] = sample i 所属 rollout 的全部样本的 loss-mask 总和\nrollout_id_list = train_data[\"rollout_ids\"]\nmask_sums_per_sample = [sum(m) for m in loss_masks]\nrollout_total_mask: dict[int, int] = {}\nfor rid, ms in zip(rollout_id_list, mask_sums_per_sample, strict=True):\n    rollout_total_mask[rid] = rollout_total_mask.get(rid, 0) + ms\ntrain_data[\"rollout_mask_sums\"] = [rollout_total_mask[rid] for rid in rollout_id_list]"),

      h("p",null,h("code",null,"_split_train_data_by_dp")," 调用 ",h("code",null,"build_dp_schedule")," 计算每个数据并行 rank 的样本划分、微批划分与微批数。它把调度计算独立到一个不依赖 Ray/sglang 的函数中，从而可单元测试。步的切分按 rollout id（回退到样本 index），每步恰好持有 ",h("code",null,"global_batch_size")," 个 rollout，使每个 rollout 产生多少训练样本都不改变每步的训练步数。最后把每个 rank 的数据张量化并用 ",h("code",null,"ray.put")," 放进对象存储（或 nixl 传输），包成 ",h("code",null,"Box")," 返回给训练侧。"),

  function TrainActorSection(){

      h("p",null,h("code",null,"RayTrainGroup")," 在构造时调用 ",h("code",null,"_allocate_gpus_for_actor"),"：它在 placement group 切片上逐 rank 创建 ",h("code",null,"MegatronTrainRayActor"),"，每个 actor 占 0.4 张卡（",h("code",null,"allocate_train_group")," 设定）以便在共置模式下与 0.2 张卡的 SGLang 引擎共享同一物理卡。rank 0 创建后，从它读回 master 地址与端口，传给后续所有 rank，使整组共用同一个 torch 分布式主地址。",h("code",null,"async_train")," 对每个 worker 发 ",h("code",null,"actor.train.remote(...)")," 并返回 ref 列表（异步语义），",h("code",null,"update_weights")," / ",h("code",null,"save_model")," / ",h("code",null,"offload")," / ",h("code",null,"onload")," 则同步 ",h("code",null,"ray.get")," 等待所有 worker 完成。"),
      h(Code,null,"def async_train(self, rollout_id, rollout_data_ref, external_data=None):\n    # 返回 ref 列表 (每 worker 一个); 调用方决定何时 ray.get\n    return [actor.train.remote(rollout_id, rollout_data_ref, external_data=external_data) for actor in self._actor_handlers]\n\ndef update_weights(self):\n    # 同步: rank 0 广播权重到其余 rank, 等待全部完成\n    return ray.get([actor.update_weights.remote() for actor in self._actor_handlers])"),
