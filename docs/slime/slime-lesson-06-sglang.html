  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 6 课</p><h1>推理后端 SGLang</h1><p>能访问 CDN 时切换为交互版。本课讲清 slime 如何启动并管理 SGLang server：SGLangEngine 封装与 HTTP 接口、router 注册、暂停/继续生成与权重同步的配合、参数翻译、外部引擎接入，以及 prefill/decode 分离（PD disaggregation）与 mooncake 传输后端。</p></main></div>

  // ===== 总览：SGLang 在 slime 中的角色 =====
  function OverviewSection(){
    return h("div",null,
      h("p",null,"slime 刻意只选择 SGLang 一个 rollout（推理与采样）后端，于是可以直接使用 SGLang 全部的服务能力，而不必把多个推理引擎压成一个最小公共抽象。本课讨论的全部代码都在 ",h("code",null,"slime/backends/sglang_utils/")," 目录下，外加 ",h("code",null,"slime/backends/megatron_utils/sglang.py")," 这个依赖隔离层。它们共同回答一个问题：训练侧的 Megatron 进程如何启动、确认健康、控制并把权重推给一组 SGLang 推理服务。"),
      h("p",null,"理解全局有三个层次，自底向上：其一，每个 ",h("strong",{className:"hl-teal"},"SGLang server")," 是一个独立的 HTTP 服务进程，对外暴露 ",h("code",null,"/generate"),"、",h("code",null,"/flush_cache"),"、",h("code",null,"/update_weights_from_distributed"),"、",h("code",null,"/pause_generation")," 等接口；其二，slime 用一个轻量的 Ray actor ",h("strong",{className:"hl-blue"},"SGLangEngine")," 包裹每个 server，把这些 HTTP 接口转成可远程调用的 Python 方法；其三，多个 server 注册到同一个 ",h("strong",{className:"hl-amber"},"sglang-router")," 后面，router 按负载把生成请求分发到各 server，对训练侧呈现为单一服务地址。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"进程"),"SGLang HTTP server"),
          h("p",null,"由 ",h("code",null,"launch_server")," 在子进程中拉起，加载模型、分配 KV 缓存、启动调度循环。slime 不修改其内部，只通过 HTTP 与之交互。")
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill blue"},"Ray actor"),"SGLangEngine"),
          h("p",null,"每个 server 对应一个 ",h("code",null,"SGLangEngine")," 实例（继承自 ",h("code",null,"RayActor"),"）。它把启动参数翻译、健康检查、权重更新、暂停/继续、性能剖析等都封装为远程方法。")
        )
      ),
      h("p",null,"为什么这样分层？原因在于训练与推理在物理上是跨进程、跨节点的两套系统。SGLang server 必须是独立进程，因为它有自己的 CUDA context、调度循环与 KV 缓存管理；而训练侧需要一个可以从 Megatron 主进程 ",h("code",null,"ray.get(...)")," 调用的句柄。",h("code",null,"SGLangEngine")," 作为 Ray actor 恰好充当这个句柄，所有跨进程通信落到 HTTP 与 Ray RPC 两条通道上，保持显式可追踪。"),
      h("div",null,h(Src,{label:"sglang_engine.py",path:"slime/backends/sglang_utils/sglang_engine.py"}),h(Src,{label:"server_control.py",path:"slime/backends/sglang_utils/server_control.py"}),h(Src,{label:"sglang_config.py",path:"slime/backends/sglang_utils/sglang_config.py"}),h(Src,{label:"external.py",path:"slime/backends/sglang_utils/external.py"}),h(Src,{label:"arguments.py",path:"slime/backends/sglang_utils/arguments.py"}),h(Ext,{href:"https://docs.sglang.ai/"},"SGLang 文档"))

  // ===== SGLangEngine：启动与生命周期 =====
  function EngineSection(){
    return h("div",null,
      h("p",null,h("code",null,"SGLangEngine")," 是承重类。构造函数只记录参数（",h("code",null,"args"),"、",h("code",null,"rank"),"、",h("code",null,"worker_type"),"、",h("code",null,"base_gpu_id")," 等），真正的工作在 ",h("code",null,"init(...)")," 中完成：先确定本进程的 host 与 GPU，再调用 ",h("code",null,"_compute_server_args")," 把 slime 参数翻译为 SGLang 的 ",h("code",null,"ServerArgs"),"，最后根据是否为外部引擎走 ",h("code",null,"_init_external")," 或 ",h("code",null,"_init_normal"),"。"),
      h(Code,null,"class SGLangEngine(RayActor):\n    def init(self, dist_init_addr, port, nccl_port, host=None,\n             disaggregation_bootstrap_port=None, router_ip=None, router_port=None):\n        # 路由地址：构造时未给则回退到全局 --sglang-router-ip/port\n        self.router_ip = router_ip if router_ip is not None else self.args.sglang_router_ip\n        self.router_port = router_port if router_port is not None else self.args.sglang_router_port\n        host = host or get_host_info()[1]\n        # ... IPv6 地址加方括号规范化 ...\n        server_args_dict, external_engine_need_check_fields = _compute_server_args(\n            self.args, self.rank, dist_init_addr, nccl_port, host, port,\n            self.worker_type, disaggregation_bootstrap_port,\n            base_gpu_id=self.base_gpu_id, sglang_overrides=self.sglang_overrides,\n            num_gpus_per_engine=self.num_gpus_per_engine)\n        self.node_rank = server_args_dict[\"node_rank\"]\n        self.server_host = server_args_dict[\"host\"]\n        self.server_port = server_args_dict[\"port\"]\n        if self.args.rollout_external:\n            self._init_external(server_args_dict, external_engine_need_check_fields=...)\n        else:\n            self._init_normal(server_args_dict)"),
      h("p",null,h("code",null,"_init_normal")," 在本地子进程拉起 server，并把自己注册到 router。注意一个引擎可能横跨多个节点（张量并行加流水并行的总卡数超过单节点卡数），此时只有 ",h("code",null,"node_rank == 0")," 的进程负责对外发起 HTTP 请求与 router 注册，其余 rank 仅作为 worker 存在。",h("code",null,"_make_request")," 与各 HTTP 方法开头都有 ",h("code",null,"if self.node_rank != 0: return")," 的判断，正是出于这个原因。"),
      h(Code,null,"def _init_normal(self, server_args_dict):\n    logger.info(f\"Launch HttpServerEngineAdapter at: {self.server_host}:{self.server_port}\")\n    self.process = launch_server_process(ServerArgs(**server_args_dict))\n    self._register_to_router(server_args_dict)\n\ndef launch_server_process(server_args: ServerArgs) -> multiprocessing.Process:\n    from sglang.srt.entrypoints.http_server import launch_server\n    multiprocessing.set_start_method(\"spawn\", force=True)\n    server_args.host = server_args.host.strip(\"[]\")\n    p = multiprocessing.Process(target=launch_server, args=(server_args,))\n    p.start()\n    if getattr(server_args, \"node_rank\", 0) != 0:\n        return p\n    # 仅 node_rank 0 轮询 /health_generate 直到 HTTP 200\n    _wait_server_healthy(base_url=server_args.url(), api_key=server_args.api_key,\n                         is_process_alive=lambda: p.is_alive())\n    return p"),
      h("p",null,"健康检查的设计动机：SGLang server 启动需要加载模型权重、编译 CUDA graph、分配 KV 缓存，耗时可达数分钟。",h("code",null,"_wait_server_healthy")," 用一个带 2 秒间隔的循环反复请求 ",h("code",null,"/health_generate"),"，直到返回 200 才认为引擎就绪；循环中同时检查子进程是否仍存活，若进程意外退出立即抛出异常，避免训练侧无限等待一个已死的 server。"),
      h("h3",null,"注册到 router 与版本兼容"),

      h(Code,null,"def _register_to_router(self, server_args_dict):\n    if self.worker_type == \"encoder\":\n        return\n    if self.node_rank == 0 and self.router_ip and self.router_port:\n        worker_url = f\"http://{self.server_host}:{self.server_port}\"\n        if parse(sglang_router.__version__) <= parse(\"0.2.1\"):\n            assert self.worker_type == \"regular\", \"pd disaggregation is not supported in old router.\"\n            response = requests.post(f\"http://{self.router_ip}:{self.router_port}/add_worker?url={worker_url}\")\n        else:\n            payload = {\"url\": worker_url, \"worker_type\": self.worker_type}\n            if self.worker_type == \"prefill\":\n                bootstrap_port = server_args_dict.get(\"disaggregation_bootstrap_port\")\n                payload[\"bootstrap_port\"] = bootstrap_port  # decode 侧据此连 prefill\n            response = requests.post(f\"http://{self.router_ip}:{self.router_port}/workers\", json=payload)\n        response.raise_for_status()"),

  function PauseSection(){
    return h("div",null,
      h("p",null,"权重同步与生成之间存在一个根本矛盾：生成过程会在 KV 缓存中积累由旧权重算出的中间表示，而权重一旦更新这些 KV 即失效。如果在生成进行到一半时替换权重，server 会用新权重续解一个由旧权重起头的序列，产生语义错乱的输出。",h("code",null,"server_control.py")," 与引擎的 ",h("code",null,"pause_generation"),"/",h("code",null,"continue_generation")," 接口共同解决这个问题。"),

      h("p",null,"第 7 课的所有权重更新路径（distributed、tensor、disk、delta）都遵循同一个骨架：在 rank 0 上先对所有引擎调用 ",h("code",null,"pause_generation"),"，再 ",h("code",null,"flush_cache")," 切断旧 KV，然后推送权重，最后 ",h("code",null,"continue_generation")," 恢复。下面是 ",h("code",null,"update_weight_from_distributed.py")," 的真实结构："),
      h(Code,null,"@torch.no_grad()\ndef update_weights(self) -> None:\n    \"\"\"Pause -> flush -> _send_weights -> continue. Progress on PP source.\"\"\"\n    self.weight_version += 1\n    if dist.get_rank() == 0:\n        ray.get([engine.pause_generation.remote() for engine in self.rollout_engines])\n        ray.get([engine.flush_cache.remote() for engine in self.rollout_engines])\n    dist.barrier(group=get_gloo_group())\n    # ... 在 PP 源 rank 上分块广播权重 ...\n    self._send_weights(pbar)\n    if dist.get_rank() == 0:\n        ray.get([engine.continue_generation.remote() for engine in self.rollout_engines])\n    dist.barrier(group=get_gloo_group())"),

      h(Code,null,"def pause_generation(self):\n    response = requests.post(f\"http://{self.server_host}:{self.server_port}/pause_generation\", json={})\n    response.raise_for_status()\n    return response\n\ndef continue_generation(self):\n    response = requests.post(f\"http://{self.server_host}:{self.server_port}/continue_generation\", json={})\n    response.raise_for_status()\n    return response"),
      h("h3",null,"abort_servers_until_idle：把在途请求清空"),
      h("p",null,h("code",null,"server_control.py")," 处理另一类需求：在某些流程（如部分 rollout 的 abort、异步切换）中需要把 server 队列里所有正在进行与等待中的请求都终止并等到队列清空。",h("code",null,"abort_server_until_idle")," 反复 POST ",h("code",null,"/abort_request")," 并查询 ",h("code",null,"/v1/loads"),"，直到请求数归零："),
      h(Code,null,"def num_requests_from_load(load: Any) -> int:\n    # 从 /v1/loads 的嵌套结构里把 running + waiting 请求数加总\n    ...\n    running = load.get(\"num_running_reqs\", load.get(\"total_running_reqs\"))\n    waiting = load.get(\"num_waiting_reqs\", load.get(\"total_waiting_reqs\"))\n    return (running if isinstance(running, int) else 0) + (waiting if isinstance(waiting, int) else 0)\n\nasync def abort_server_until_idle(url, retry_interval=ABORT_RETRY_INTERVAL_SECONDS):\n    while True:\n        await _abort_server_once(url)               # POST /abort_request {abort_all: True}\n        num_requests = await _get_server_num_requests(url)\n        if num_requests <= 0:\n            return\n        await asyncio.sleep(retry_interval)         # 默认 3 秒后重试\n\nasync def abort_servers_until_idle(urls):\n    await asyncio.gather(*(abort_server_until_idle(url) for url in urls))"),
      h("p",null,"为什么需要重试而非一次 abort？因为在高并发下，发出 abort 的瞬间可能仍有新请求正被 router 分发进来，或部分请求处于不可中断的内核执行段。循环重试直到 ",h("code",null,"/v1/loads")," 报告零请求，才能保证 server 真正空闲。该函数被 ",h("code",null,"slime/rollout/sglang_rollout.py")," 的 ",h("code",null,"abort")," 协程调用（第 8 课展开 rollout 异步与部分 rollout）。"),
      h("div",{className:"note"},h("strong",null,"pause/abort 的区别"),"：",h("code",null,"pause_generation")," 只是暂停调度循环、保留已有请求状态，权重换好后 ",h("code",null,"continue_generation")," 即可继续；",h("code",null,"abort")," 则是把请求彻底终止并清空队列。前者用于权重同步（呼应第 7 课），后者用于需要丢弃在途生成的场景。"),

      h(Code,null,"def _compute_server_args(args, rank, dist_init_addr, nccl_port, host, port,\n                         worker_type=\"regular\", disaggregation_bootstrap_port=None,\n                         base_gpu_id=None, sglang_overrides=None, num_gpus_per_engine=None):\n    _gpus_per_engine = num_gpus_per_engine or args.rollout_num_gpus_per_engine\n    nnodes = max(1, _gpus_per_engine // args.num_gpus_per_node)   # 引擎可跨节点\n    node_rank = rank % nnodes\n    base = base_gpu_id if base_gpu_id is not None else get_base_gpu_id(args, rank)\n    base = _to_local_gpu_id(base)          # 在 CUDA_VISIBLE_DEVICES 下重映射为本地 id\n    kwargs = {\n        \"model_path\": args.hf_checkpoint, \"trust_remote_code\": True,\n        \"random_seed\": args.seed + rank, \"enable_memory_saver\": args.offload_rollout,\n        \"host\": host, \"port\": port, \"nccl_port\": nccl_port,\n        \"nnodes\": nnodes, \"node_rank\": node_rank, \"dist_init_addr\": dist_init_addr,\n        \"base_gpu_id\": base, \"gpu_id_step\": 1,\n        \"tp_size\": _gpus_per_engine // args.sglang_pp_size,\n        \"dp_size\": args.sglang_dp_size, \"pp_size\": args.sglang_pp_size, \"ep_size\": args.sglang_ep_size,\n        \"skip_server_warmup\": True, \"enable_draft_weights_cpu_backup\": True, \"enable_metrics\": True,\n    }\n    if worker_type == \"prefill\":\n        kwargs[\"disaggregation_mode\"] = \"prefill\"\n        kwargs[\"disaggregation_bootstrap_port\"] = disaggregation_bootstrap_port\n    elif worker_type == \"decode\":\n        kwargs[\"disaggregation_mode\"] = \"decode\"\n        kwargs[\"prefill_round_robin_balance\"] = True\n    # 遍历 ServerArgs 字段, 回填所有 --sglang-<name>\n    for attr in dataclasses.fields(ServerArgs):\n        if hasattr(args, f\"sglang_{attr.name}\") and attr.name not in kwargs:\n            kwargs[attr.name] = getattr(args, f\"sglang_{attr.name}\")\n    # 来自 --sglang-config YAML 的 per-group overrides 优先级最高\n    if sglang_overrides:\n        for key, value in sglang_overri       h(Code,null,"def _init_external(self, expect_server_args, external_engine_need_check_fields):\n    def _sanity_check_server_args(actual, expect):\n        for name in external_engine_need_check_fields:\n            assert actual.get(name) == expect.get(name), f\"{name=} mismatch ...\"\n    actual_server_args = get_server_info(f\"http://{self.server_host}:{self.server_port}\")\n    _sanity_check_server_args(actual_server_args, expect_server_args)\n    self._register_to_router(expect_server_args)"),

  // ===== PD 分离与 mooncake =====
  function PDSection(){
    return h("div",null,
      h("p",null,"PD（prefill/decode）分离，即 disaggregated serving，是 SGLang 与 slime 共同支持的高吞吐部署形态。理解它要先看清生成的两个阶段在硬件特性上的根本差异。"),
      h("h3",null,"为什么要把 prefill 与 decode 分开"),
      h("p",null,"自回归生成分两阶段：",h("strong",null,"prefill")," 一次性处理整段 prompt，把全部 token 并行送入模型，计算密集（compute-bound），GPU 利用率高；",h("strong",null,"decode")," 逐个生成新 token，每步只处理一个 token，受 KV 缓存读写带宽制约（memory-bound），算力大量闲置。若把两者放在同一 server，二者会争抢同一批 GPU：长 prompt 的 prefill 会阻塞正在 decode 的请求，造成尾延迟抖动；而 decode 的低算力利用又拉低了整体吞吐。"),
      h("p",null,"PD 分离的解法是把 prefill 与 decode 放到不同的引擎组：prefill 引擎专做 prompt 编码，算完后把 KV 缓存通过高速互联传给 decode 引擎，decode 引擎接手逐 token 生成。两组各自按自身特性配置批大小与并行方式，互不阻塞。"),
      h(Formula,{cap:"分离前后吞吐的直觉对比：合置时两阶段争用同一资源 R，分离后各自独占按需配比的资源"},"$$ \\text{Throughput}_{\\text{disagg}} \\;\\approx\\; \\min\\!\\big(\\tfrac{R_{P}}{c_{P}},\\; \\tfrac{R_{D}}{c_{D}}\\big),\\qquad \\text{合置时}\\;\\; \\text{Throughput}_{\\text{co}} \\;\\approx\\; \\frac{R}{c_{P}+c_{D}} $$"),
      h("p",null,"上式只是直觉性说明：",h("code",null,"c_P"),"、",h("code",null,"c_D")," 分别是 prefill、decode 单位工作的资源成本。分离后可以独立扩缩两组引擎数，使各自接近其资源上限，而合置时两阶段共享一份资源、彼此挤占。代价是引入了一次 prefill 到 decode 的 KV 缓存跨引擎传输，这正是 mooncake 要解决的环节。"),
      h("h3",null,"slime 中的 PD：worker_type 与 disaggregation_mode"),
      h("p",null,"在 ",h("code",null,"_compute_server_args")," 中，",h("code",null,"worker_type")," 决定 server 的角色：prefill worker 设 ",h("code",null,"disaggregation_mode=\"prefill\"")," 并需要 ",h("code",null,"disaggregation_bootstrap_port"),"（decode 侧据此建立 KV 传输连接），decode worker 设 ",h("code",null,"disaggregation_mode=\"decode\"")," 与 ",h("code",null,"prefill_round_robin_balance=True"),"。router 在 PD 模式下需开启 ",h("code",null,"pd_disaggregation"),"（见 ",h("code",null,"_start_router"),"），并关闭熔断器以避免高负载下 RDMA 传输的瞬时超时把 decode worker 误判为死亡。"),
      h("h3",null,"两种配置入口"),
      h("p",null,"slime 提供两种描述 PD 拓扑的方式。简单方式是 ",h("code",null,"--prefill-num-servers N"),"，由 ",h("code",null,"SglangConfig.from_prefill_num_servers")," 把总 GPU 按 N 个 prefill 引擎与其余 decode 引擎切分。完整方式是 ",h("code",null,"--sglang-config")," 指向一个 YAML，用 ",h("code",null,"server_groups")," 显式描述每组的 ",h("code",null,"worker_type"),"、",h("code",null,"num_gpus"),"、每引擎 GPU 数与 per-group ",h("code",null,"overrides"),"。下面是 ",h("code",null,"test_glm4.7_30B_A3B_pd_mooncake.py")," 中真实的 YAML（每组都把传输后端设为 mooncake）："),
      h(Code,null,"# tests/test_glm4.7_30B_A3B_pd_mooncake.py: write_sglang_config()\nconfig = {\n    \"sglang\": [\n        {\n            \"name\": \"default\",\n            \"server_groups\": [\n                {\"worker_type\": \"prefill\", \"num_gpus\": 4, \"num_gpus_per_engine\": 4,\n                 \"overrides\": {\"disaggregation_transfer_backend\": \"mooncake\"}},\n                {\"worker_type\": \"decode\", \"num_gpus\": 4, \"num_gpus_per_engine\": 4,\n                 \"overrides\": {\"disaggregation_transfer_backend\": \"mooncake\"}},\n            ],\n        }\n    ]\n}"),
      h("p",null,h("code",null,"SglangConfig")," 把这个 YAML 解析成 ",h("code",null,"ModelConfig")," 与 ",h("code",null,"ServerGroupConfig")," 的层次结构。",h("code",null,"ServerGroupConfig")," 的 ",h("code",null,"worker_type")," 可取 ",h("code",null,"regular"),"、",h("code",null,"prefill"),"、",h("code",null,"decode"),"、",h("code",null,"placeholder"),"（仅占 GPU 槽位不建引擎）、",h("code",null,"encoder"),"（用于 EPD 即编码-预填充-解码三段分离）。每个 ",h("code",null,"ModelConfig")," 对应独立 router，并可设 ",h("code",null,"update_weights=False")," 表示该模型（如 reference、reward）不接收训练权重更新。",h("code",null,"resolve")," 方法会从模型级、再到全局 ",h("code",null,"args")," 逐层回填每组默认值，并自动推断 ",h("code",null,"update_weights"),"（model_path 与 ",h("code",null,"hf_checkpoint")," 一致则为 True）。"),
      h("h3",null,"mooncake：KV 缓存的跨引擎传输"),
      h("p",null,h("code",null,"mooncake")," 是 ",h("code",null,"disaggregation_transfer_backend")," 的一种取值，负责 PD 分离中 prefill 引擎到 decode 引擎的 KV 缓存传输。它是一个以 KV 缓存为中心的传输与存储库，利用 RDMA 在 GPU 显存之间直接搬运 KV，避免经主机内存中转，从而把跨引擎传输的开销压到足够低，使 PD 分离的吞吐收益不被传输成本抵消。在 slime 中只需把每个 PD 组的 ",h("code",null,"disaggregation_transfer_backend")," 设为 ",h("code",null,"mooncake"),"（YAML override 或 ",h("code",null,"--sglang-disaggregation-transfer-backend mooncake"),"），其余由 SGLang 与 mooncake 库处理。"),
      h("div",{className:"warn"},"PD 分离不支持旧版 router（≤ 0.2.1）：",h("code",null,"_register_to_router")," 在旧版下断言 ",h("code",null,"worker_type == \"regular\""),"。此外 PD 与异步训练天然契合（生成与训练各占独立 GPU 组），但与 colocate 的组合需要更细的显存编排；",h("code",null,"test_glm4.7_30B_A3B_pd_mooncake.py")," 演示的正是单节点 colocate 下的 PD + mooncake。"),
      h("div",null,h(Src,{label:"_compute_server_args（worker_type）",path:"slime/backends/sglang_utils/sglang_engine.py",line:593}),h(Src,{label:"ServerGroupConfig",path:"slime/backends/sglang_utils/sglang_config.py",line:11}),h(Src,{label:"ModelConfig",path:"slime/backends/sglang_utils/sglang_config.py",line:44}),h(Src,{label:"resolve",path:"slime/backends/sglang_utils/sglang_config.py",line:68}),h(Src,{label:"SglangConfig.from_yaml",path:"slime/backends/sglang_utils/sglang_config.py",line:157}),h(Src,{label:"from_prefill_num_servers",path:"slime/backends/sglang_utils/sglang_config.py",line:182}),h(Src,{label:"router PD 配置",path:"slime/ray/rollout.py",line:1028}),h(Src,{label:"PD mooncake 测试",path:"tests/test_glm4.7_30B_A3B_pd_mooncake.py",line:30}),h(Ext,{href:"https://github.com/kvcache-ai/Mooncake"},"Mooncake 仓库"))
    );
