  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 4 课</p><h1>数据与 Data Buffer</h1><p>能访问 CDN 时切换为交互版。本课讲清 prompt 数据如何经 Dataset 进入训练循环、按 epoch 洗牌与采样产出样本组，utils/data.py 的数据结构与转换，Data Buffer 概念与异步 rollout_buffer 插件，filter_hub 的动态采样过滤（过滤掉整组全对或全错、优势为零的样本），以及 rm_hub 中各 rule-based verifier（数学答案抽取与判定、gpqa、f1、ifbench、deepscaler）。</p></main></div>

  // ===== Dataset：prompt 如何进入 =====
  function DatasetSection(){
    return h("div",null,
      h("p",null,h("code",null,"slime/utils/data.py")," 的 ",h("code",null,"Dataset")," 是整条数据流的入口。构造时它一次性把文件读完并转换成内存中的 ",h("code",null,"Sample")," 列表，此后只负责按索引取样与按 epoch 洗牌。设计上它刻意保持只读，把“取多少、给谁”的状态留给上层的取样源管理，二者职责分离。"),
      h("h3",null,"一、文件读取与广义路径"),
      h("p",null,h("code",null,"read_file")," 支持 ",h("code",null,".jsonl")," 与 ",h("code",null,".parquet")," 两种格式，均以生成器逐行/逐批产出 dict。一个值得注意的设计是“广义路径”：路径尾部可以带 ",h("code",null,"@[start:end]")," 形式的切片标记，由 ",h("code",null,"_parse_generalized_path")," 解析为 Python 的 ",h("code",null,"slice"),"，再用 ",h("code",null,"itertools.islice")," 只取数据集的一个子区间。这让用户无需改动数据文件即可指定训练用的行范围。"),

      h("p",null,"取出的每个 prompt 会被 ",h("code",null,"deepcopy")," 复制 ",h("code",null,"n_samples_per_prompt")," 份，构成一个样本组。这正是 GRPO 等组内比较算法的数据形态：同一 prompt 的多条响应放在一起，才能在组内计算相对优势（见第 3 课）。每份副本被赋予独立的 ",h("code",null,"index")," 与共享的 ",h("code",null,"group_index"),"。"),
      h(Code,null,"def get_samples(self, num_samples):\n    if self.dataset is not None:\n        if self.sample_offset + num_samples <= len(self.dataset):\n            prompt_samples = self.dataset.samples[self.sample_offset : self.sample_offset + num_samples]\n            self.sample_offset += num_samples\n        else:\n            # 跨 epoch 边界：取完剩余, 进入下一 epoch 重新洗牌再补齐\n            prompt_samples = self.dataset.samples[self.sample_offset :]\n            num_samples -= len(prompt_samples)\n            self.epoch_id += 1\n            if self.args.rollout_shuffle:\n                self.dataset.shuffle(self.epoch_id)\n            prompt_samples += self.dataset.samples[:num_samples]\n            self.sample_offset = num_samples\n    samples = []\n    for prompt_sample in prompt_samples:\n        group = []\n        for _ in range(self.args.n_samples_per_prompt):\n            sample = copy.deepcopy(prompt_sample)\n            sample.group_index = self.sample_group_index\n            sample.index = self.sample_index\n            self.sample_index += 1\n            group.append(sample)\n        self.sample_group_index += 1\n        samples.append(group)\n    return samples"),

      h("h3",null,"二、RolloutDataSourceWithBuffer：可写缓冲层"),
      h("p",null,"默认的取样源是 ",h("code",null,"RolloutDataSourceWithBuffer"),"，它继承顺序取样源并叠加一个内存缓冲 ",h("code",null,"self.buffer"),"。其 ",h("code",null,"get_samples")," 的策略是“先用缓冲，再补数据集”：先尝试从缓冲取，不够的部分再向父类的数据集取。",h("code",null,"add_samples")," 把样本组写回缓冲。"),
      h(Code,null,"class RolloutDataSourceWithBuffer(RolloutDataSource):\n    def __init__(self, args):\n        super().__init__(args)\n        self.buffer = []\n        if self.args.buffer_filter_path is None:\n            self.buffer_filter = pop_first\n        else:\n            self.buffer_filter = load_function(self.args.buffer_filter_path)\n\n    def get_samples(self, num_samples):\n        samples = self._get_samples_from_buffer(num_samples)  # 先取缓冲\n        num_samples -= len(samples)\n        if num_samples == 0:\n            return samples\n        samples += super().get_samples(num_samples=num_samples)  # 再补数据集\n        return samples\n\n    def _get_samples_from_buffer(self, num_samples):\n        if len(self.buffer) == 0 or num_samples == 0:\n            return []\n        return self.buffer_filter(self.args, None, self.buffer, num_samples)"),

      h("h3",null,"一、缓冲服务的结构：BufferQueue 与 RolloutBuffer"),

      h(Code,null,"class BufferQueue:\n    def append(self, item):\n        instance_id = item[\"instance_id\"]\n        self.group_timestamps[instance_id] = time.time()\n        # 同时写入持久 data 与临时 temp_data (后者用于统计)\n        self.temp_data.setdefault(instance_id, []).append(copy.deepcopy(item))\n        self.data.setdefault(instance_id, []).append(item)\n\n    def _get_valid_groups_with_timeout(self, del_data=False):\n        valid_groups = {}\n        for instance_id, group_data in self.data.items():\n            if self.is_valid_group_func((instance_id, group_data), self.group_size, self.task_type):\n                valid_groups[instance_id] = group_data\n        return valid_groups, []  # 第二项为 finished_groups (此处略)"),
      h("h3",null,"二、HTTP 接口与 generator 自动发现"),

      h(Code,null,"# rollout_buffer_example.generate_rollout_async (精简)\nif START_ROLLOUT:\n    metadata = data_buffer.get_metadata()\n    start_rollout(args.rollout_buffer_url, args, metadata)   # 触发远程 generator\n    START_ROLLOUT = False\n\ndata_number_to_fetch = (args.rollout_batch_size * args.n_samples_per_prompt\n                        - data_buffer.get_buffer_length())\nwhile len(results) < data_number_to_fetch:\n    data, meta_info = await get_rollout_data(api_base_url=base_url)  # 轮询缓冲服务\n    results.extend(data)\n\nresults = select_rollout_data(args, results, data_number_to_fetch // args.n_samples_per_prompt)\nfor group_record in results:\n    for record in group_record:\n        token_ids, loss_mask = mask_generator.get_loss_mask(record[\"messages\"])\n        group_results.append(Sample(tokens=token_ids, reward=record[\"reward\"],\n                                    loss_mask=loss_mask, ...))\ndata_buffer.add_samples(sample_results)\nreturn data_buffer.get_samples(args.rollout_batch_size)"),

  // ===== 动态采样过滤 filter_hub =====
  function FilterSection(){
    return h("div",null,
      h("p",null,"生成出来的样本组并非都值得用于训练。",h("code",null,"slime/rollout/filter_hub")," 提供动态采样过滤（dynamic sampling），其典型用途来自 DAPO：在 GRPO 中，如果一个 prompt 的若干条响应",h("strong",null,"全部正确或全部错误"),"，那么组内奖励无差异，相对优势处处为零，这一组对策略梯度没有任何贡献，反而占用训练算力。动态采样就是把这类“零方差组”过滤掉，并继续过采样直到凑齐足额的有效组。"),
      h(Formula,{cap:"GRPO 组内相对优势：奖励标准差为零时, 整组优势恒为零"},"$$ A_i \\;=\\; \\frac{r_i - \\operatorname{mean}(r_1,\\dots,r_G)}{\\operatorname{std}(r_1,\\dots,r_G)},\\qquad \\operatorname{std}(r)=0 \\Rightarrow A_i \\equiv 0\\ \\text{(无梯度)} $$"),
      h("p",null,"据此，过滤判据非常直接：只要一组奖励的标准差大于一个极小阈值，就保留这一组；否则丢弃。",h("code",null,"check_reward_nonzero_std")," 即此逻辑的全部实现。"),
      h(Code,null,"def check_reward_nonzero_std(args, samples: list[Sample], **kwargs):\n    rewards = [sample.get_reward_value(args) for sample in samples]\n    keep = torch.tensor(rewards, dtype=torch.float64).std() > 1e-6\n    return DynamicFilterOutput(\n        keep=keep,\n        reason=None if keep else f\"zero_std_{round(rewards[0], 1)}\",\n    )"),
      h("p",null,"返回值是一个 ",h("code",null,"DynamicFilterOutput"),"：",h("code",null,"keep")," 决定是否保留，",h("code",null,"reason")," 在丢弃时给出原因字符串（如 ",h("code",null,"zero_std_1.0")," 表示整组全对、",h("code",null,"zero_std_0.0")," 表示整组全错）。这个 reason 不只是日志，它会被 ",h("code",null,"MetricGatherer")," 按原因计数，最终作为 ",h("code",null,"rollout/dynamic_filter/drop_*")," 指标上报，用于观察过滤行为是否健康（例如全错组过多可能意味着任务过难或奖励函数有误）。"),
      h("p",null,h("code",null,"base_types.py")," 提供三件支撑设施：",h("code",null,"DynamicFilterOutput")," 数据结构；",h("code",null,"call_dynamic_filter")," 统一调用入口（过滤器为空时默认保留，并兼容旧版直接返回布尔值的过滤器）；",h("code",null,"MetricGatherer")," 按丢弃原因聚合计数。"),
      h(Code,null,"def call_dynamic_filter(fn, *args, **kwargs):\n    if fn is None:\n        return DynamicFilterOutput(keep=True)\n    output = fn(*args, **kwargs)\n    if not isinstance(output, DynamicFilterOutput):   # 兼容旧版布尔返回\n        output = DynamicFilterOutput(keep=output)\n    return output"),
