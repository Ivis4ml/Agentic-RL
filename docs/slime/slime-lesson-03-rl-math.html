  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 3 课</p><h1>RL 数学原语</h1><p>能访问 CDN 时切换为交互版。本课逐一精读 slime 的强化学习数学核心：优势估计（GAE 与 GRPO 组内归一化）、策略损失各变体（PPO 双裁剪、GSPO、CISPO）、KL 估计器 k1/k2/k3、跨 DP 全局白化、log-prob 与熵、off-policy 的重要性采样修正，以及序列长度均衡装箱、多轮 loss mask、动态批调度与 MoE 路由重放 R3。</p></main></div>

  // ===== 总览：从奖励到损失的一条计算流 =====
  function OverviewSection(){

  // ===== 优势与 KL =====
  const ADVKL=[
    {key:"grpo",name:"GRPO 组内归一化",render:function(){return [
      h("p",null,"GRPO（Group Relative Policy Optimization）的核心思想是省去价值网络（critic），改用同一 prompt 的 ",h("code",null,"n_samples_per_prompt")," 个采样组成一个组，用组内的奖励均值作为基线（baseline），用组内标准差作归一化。直觉是：在同一道题的若干次作答之间比较好坏，而非依赖一个单独训练的价值函数去估计绝对回报。"),
      h(Formula,{cap:"GRPO 组内归一化优势：对第 i 个组、第 j 个样本"},"$$ \\hat A_{i,j} \\;=\\; \\frac{r_{i,j} - \\operatorname{mean}\\big(\\{r_{i,k}\\}_{k=1}^{G}\\big)}{\\operatorname{std}\\big(\\{r_{i,k}\\}_{k=1}^{G}\\big) + \\varepsilon},\\qquad G = \\texttt{n\\_samples\\_per\\_prompt} $$"),

      h(Code,null,"# ray/rollout.py _post_process_rewards: 组内归一化\nrewards = torch.tensor(raw_rewards, dtype=torch.float)\nif rewards.shape[-1] == args.n_samples_per_prompt * args.rollout_batch_size:\n    rewards = rewards.reshape(-1, args.n_samples_per_prompt)\nelse:\n    rewards = rewards.view(-1, rewards.shape[-1])  # 各组样本数不等时\nmean = rewards.mean(dim=-1, keepdim=True)\nrewards = rewards - mean\nif args.advantage_estimator in [\"grpo\", \"gspo\", \"cispo\"] and args.grpo_std_normalization:\n    std = rewards.std(dim=-1, keepdim=True)\n    rewards = rewards / (std + 1e-6)"),

      h("div",null,h(Src,{label:"_post_process_rewards 组内归一化",path:"slime/ray/rollout.py",line:689}),h(Src,{label:"get_grpo_returns",path:"slime/utils/ppo_utils.py",line:224}),h(Src,{label:"grpo→get_grpo_returns 调用",path:"slime/backends/megatron_utils/loss.py",line:636}),h(Ext,{href:"https://arxiv.org/abs/2402.03300"},"GRPO (DeepSeekMath)"))
    ];}},
    {key:"gae",name:"GAE（PPO）",render:function(){return [
      h("p",null,"当 ",h("code",null,"advantage_estimator")," 为 ",h("code",null,"ppo")," 时使用价值网络与广义优势估计（Generalized Advantage Estimation, GAE）。GAE 在偏差与方差之间用 ",h("code",null,"lambd")," 做插值：先定义时序差分残差，再做带 ",h("code",null,"gamma*lambd")," 衰减的反向累加。"),
      h(Formula,{cap:"TD 残差与 GAE（response 末端 V_{T}=0 的 PPO 约定）"},"$$ \\delta_t = r_t + \\gamma\\, V_{t+1} - V_t, \\qquad \\hat A_t = \\sum_{l=0}^{\\infty} (\\gamma\\lambda)^{l}\\,\\delta_{t+l} $$"),

  function R3Section(){

      h("p",null,"最后一个原语处理的是 MoE（混合专家）模型特有的问题。在 MoE 中，每个 token 由一个路由器（router）选出 top-k 个专家处理。问题在于：rollout 时由 SGLang 做路由，训练时由 Megatron 重新前向计算路由，两者的数值实现不同，可能为同一 token 选出不同的专家集合。一旦专家选择不一致，训练侧重算的 log-prob 就与生成时的 log-prob 系统性地偏离，破坏 on-policy 假设。"),
      h("p",null,"R3（Rollout Routing Replay，",h(Ext,{href:"https://arxiv.org/pdf/2510.11370"},"路由重放"),"）的解决方案是：训练侧不重新计算路由，而是重放 rollout 时记录的专家选择。具体地，rollout 记录每个 token 在每层选中的专家索引 ",h("code",null,"top_indices"),"，训练前向时直接复用这些索引，只用当前权重重新计算被选中专家的概率。这样专家选择与生成时严格一致，消除了路由不匹配带来的偏差。"),

          h("p",null,"训练侧的 ",h("code",null,"actor.py")," 在 ",h("code",null,"fill_routing_replay")," 中遍历每个 micro-batch、每个 vp_stage、每个 MoE 层，把 rollout 传来的 ",h("code",null,"rollout_routed_experts")," 经 CP 切分与 TP 切分后，按层 ",h("code",null,"record")," 进各层的重放缓冲；之后的前向便进入 ",h("code",null,"replay")," 阶段。它跳过 dense 层（非 MoE 层），并断言记录的层数与 ",h("code",null,"all_routing_replays")," 数量一致。"),
