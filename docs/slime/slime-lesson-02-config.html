  function MegatronSection(){
    return h("div",null,
      h("p",null,"Megatron 透传是 slime 配置层的第一条设计主线。机制本身非常简洁：slime 不重写 Megatron 的 parser，而是直接调用 Megatron 自己的 ",h("code",null,"parse_args"),"，并把全部 slime 参数作为一个 ",h("strong",null,"extra_args_provider")," 回调注入进去。"),
      h(Code,null,"# slime/backends/megatron_utils/arguments.py\nfrom megatron.training.arguments import parse_args as _megatron_parse_args\nfrom megatron.training.arguments import validate_args as _megatron_validate_args\n\ndef megatron_parse_args(extra_args_provider, skip_hf_validate=False):\n    \"\"\"Parse megatron args, validate HF config, and set defaults.\"\"\"\n    args = _megatron_parse_args(\n        extra_args_provider=extra_args_provider,\n        ignore_unknown_args=True,\n    )\n    hf_config = None\n    if args.hf_checkpoint and not skip_hf_validate:\n        hf_config = AutoConfig.from_pretrained(args.hf_checkpoint, trust_remote_code=True)\n        _hf_validate_args(args, hf_config)\n    ...\n    args.world_size = args.actor_num_nodes * args.actor_num_gpus_per_node\n    args = _set_default_megatron_args(args)\n    return args"),

      h("h3",null,"透传之后：HF 配置一致性校验"),
      h("p",null,"原生透传意味着 Megatron 的模型结构参数（如 ",h("code",null,"--hidden-size"),"、",h("code",null,"--num-layers"),"）由用户在命令行手填，容易与 ",h("code",null,"--hf-checkpoint")," 里的真实结构不一致。",h("code",null,"_hf_validate_args")," 因此在解析后逐项比对 HF 配置与 Megatron 参数："),
      h(Code,null,"# _hf_validate_args 的比对表（节选）\nfor hf_config_name, megatron_config_name, compare_fn in [\n    (\"hidden_size\", \"hidden_size\", equal),\n    (\"num_attention_heads\", \"num_attention_heads\", equal),\n    (\"num_hidden_layers\", \"num_layers\", equal),\n    (\"intermediate_size\", \"ffn_hidden_size\", equal),\n    (\"moe_intermediate_size\", \"moe_ffn_hidden_size\", equal),\n    (\"tie_word_embeddings\", \"untie_embeddings_and_output_weights\",\n        lambda x, y: not x == y),\n    (\"rms_norm_eps\", \"norm_epsilon\", equal),\n]:\n    if hasattr(hf_config, hf_config_name) and hasattr(args, megatron_config_name):\n        if not compare_fn(getattr(hf_config, hf_config_name),\n                          getattr(args, megatron_config_name)):\n            errors.append(...)  # 收集所有不一致，最后一次性抛出"),
      h("p",null,"这张比对表把 HF 与 Megatron 两套命名映射起来（注意 ",h("code",null,"tie_word_embeddings")," 与 ",h("code",null,"untie_embeddings_and_output_weights")," 语义相反，故用 ",h("code",null,"not x == y")," 比对）。",h("code",null,"rope_theta")," 因为可能藏在 ",h("code",null,"rope_parameters")," 字典里而被单独处理。这是「以正确性为先」设计主线在配置层的体现：透传给了用户最大自由，但用一道校验把手填参数与真实模型结构钉在一起，避免静默错配。"),

      h("ul",null,
        h("li",null,h("code",null,"use_distributed_optimizer = True"),"：总是使用 ZeRO 分布式优化器。"),
        h("li",null,h("code",null,"bf16 = not fp16"),"：默认 bf16 训练。"),

  // ===== SGLang 前缀透传机制 =====
  function SglangSection(){
    return h("div",null,
      h("p",null,"SGLang 透传是第二条设计主线，机制比 Megatron 更巧妙。slime 不维护一份 SGLang 参数清单，而是在运行时从",h("strong",null,"已安装的 SGLang 包"),"里发现其全部 server 参数，自动加 ",h("code",null,"--sglang-")," 前缀后暴露。这样无论用户装的是哪个版本的 SGLang，它的每一个 server 参数都能用 ",h("code",null,"--sglang-")," 前缀传入，且 SGLang 升级后新增的参数自动可用。"),
      h("p",null,"实现的核心是一个对 ",h("code",null,"parser.add_argument")," 的临时替换（monkey-patch）。SGLang 提供 ",h("code",null,"ServerArgs.add_cli_args(parser)")," 把它的全部参数注册到给定 parser；slime 在调用它之前，把 parser 的 ",h("code",null,"add_argument")," 换成一个包装器，让每次注册都自动加前缀并改写 ",h("code",null,"dest"),"："),
      h(Code,null,"# slime/backends/sglang_utils/arguments.py\nfrom sglang.srt.server_args import ServerArgs\n\ndef add_sglang_arguments(parser):\n    old_add_argument = parser.add_argument\n    skipped_args = [\n        \"model_path\", \"config\", \"trust_remote_code\", \"random_seed\",\n        \"enable_memory_saver\",          # memory\n        \"tp_size\", \"port\", \"nnodes\", \"node_rank\", \"dist_init_addr\",\n        \"gpu_id_step\", \"base_gpu_id\", \"nccl_port\", \"skip_server_warmup\",\n        \"enable_return_routed_experts\",  # distributed\n    ]\n\n    def new_add_argument_wrapper(*name_or_flags, **kwargs):\n        # 1) 跳过那些由 slime 自己管理的参数\n        canonical = None\n        if \"dest\" in kwargs:\n            canonical = kwargs[\"dest\"]\n        else:\n            for flag in name_or_flags:\n                if isinstance(flag, str) and flag.startswith(\"--\"):\n                    canonical = flag[2:].replace(\"-\", \"_\"); break\n        if canonical and canonical in skipped_args:\n            return  # 整个参数定义被跳过\n\n        # 2) 给每个 flag 加 --sglang- 前缀\n        new_flags = []\n        for item in name_or_flags:\n            if isinstance(item, str) and item.startswith(\"-\"):\n                stem = item.lstrip(\"-\")          # --foo-bar -> foo-bar\n                new_flags.append(f\"--sglang-{stem}\")\n            else:\n                new_flags.append(item)\n\n        # 3) 若显式给了 dest 也加 sglang_ 前缀\n        final_kwargs = kwargs.copy()\n        if \"dest\" in final_kwargs and isinstance(final_kwargs[\"dest\"], str):\n            if not final_kwargs[\"dest\"].startswith(\"sglang_\"):\n                final_kwargs[\"dest\"] = f\"sglang_{final_kwargs['dest']}\"\n        old_add_argument(*new_flags, **final_kwargs)\n\n    parser.add_argument = new_add_argument_wrapper\n    ServerArgs.add_cli_args(parser)   # SGLang 在这里注册全部参数, 全被包装器拦截\n    parser.add_argument = old_add_argument  # 恢复原始方法"),
      h("p",null,"理解这段代码的关键在于：",h("code",null,"ServerArgs.add_cli_args(parser)")," 内部会对每个 SGLang 参数调用 ",h("code",null,"parser.add_argument(...)"),"。由于 slime 已经把 ",h("code",null,"parser.add_argument")," 临时替换为包装器，这些调用全部被拦截、加前缀、改 ",h("code",null,"dest"),"。例如 SGLang 的 ",h("code",null,"--mem-fraction-static")," 注册时被改写为 ",h("code",null,"--sglang-mem-fraction-static"),"，最终落在 ",h("code",null,"args.sglang_mem_fraction_static")," 上。注册完毕后立即把 ",h("code",null,"add_argument")," 恢复，使后续注册（如 PD 分离参数）不再被加前缀。"),
      h("h3",null,"为什么要 skip 一部分参数"),
      h("p",null,h("code",null,"skipped_args")," 列出的参数被整个跳过，因为它们由 slime 自己以更高层语义管理，不允许用户直接通过 SGLang 设定：",h("code",null,"model_path")," 由 ",h("code",null,"--hf-checkpoint")," 提供，",h("code",null,"tp_size")," 由 ",h("code",null,"--rollout-num-gpus-per-engine")," 推导，",h("code",null,"port"),"/",h("code",null,"nnodes"),"/",h("code",null,"dist_init_addr")," 等由 slime 的分布式编排分配。若放任用户直接设这些，会与 slime 的 placement group 与权重同步逻辑冲突。"),
      h("h3",null,"独立解析阶段与 TP 默认值推导"),
      h(Code,null,"def sglang_parse_args():\n    parser = argparse.ArgumentParser(add_help=False)\n    add_sglang_arguments(parser)\n\n    # 从 CLI 推导 sglang 张量并行的默认值\n    temp_parser = argparse.ArgumentParser(add_help=False)\n    temp_parser.add_argument(\"--rollout-num-gpus-per-engine\", type=int, default=1)\n    temp_parser.add_argument(\"--sglang-pp-size\", type=int, default=1)\n    temp_parser.add_argument(\"--sglang-pipeline-parallel-size\", type=int, default=1)\n    temp_args, _ = temp_parser.parse_known_args()\n    pp_size = temp_args.sglang_pp_size if temp_args.sglang_pp_size != 1 \\\n              else temp_args.sglang_pipeline_parallel_size\n    sglang_tp_size = temp_args.rollout_num_gpus_per_engine // pp_size\n    parser.set_defaults(sglang_tensor_parallel_size=sglang_tp_size)\n\n    args, _ = parser.parse_known_args()  # 只消费 --sglang-* , 其余留给 megatron\n    return args"),
      h("p",null,"SGLang 参数用一个完全独立的 ",h("code",null,"ArgumentParser")," 解析，并以 ",h("code",null,"parse_known_args()")," 只取走自己认识的 ",h("code",null,"--sglang-*")," 参数，把其余原样留给 Megatron parser。这正好与 Megatron 侧的 ",h("code",null,"ignore_unknown_args=True")," 互补：两个 parser 各扫一遍同一份 ",h("code",null,"sys.argv"),"，各取所需，互不干扰。SGLang 的张量并行大小默认从 ",h("code",null,"rollout_num_gpus_per_engine // pp_size")," 推导，使「每引擎几张卡」这一个直观参数能自动转成 SGLang 的 TP 配置。"),
      h("p",null,h("code",null,"validate_args")," 进一步把 SGLang 的并行参数补全并互校：把 ",h("code",null,"sglang_data_parallel_size")," 等别名映射成简称、根据 PP 大小回算 TP 大小、检查 DP attention 与 PD 分离配置的互斥关系。",h("code",null,"add_sglang_router_arguments")," 另外注册了 router 的 IP/端口/超时等参数（这些是 slime 显式写出的，并非来自透传）。"),
      h("div",null,h(Src,{label:"add_sglang_arguments",path:"slime/backends/sglang_utils/arguments.py",line:33}),h(Src,{label:"new_add_argument_wrapper",path:"slime/backends/sglang_utils/arguments.py",line:63}),h(Src,{label:"sglang_parse_args",path:"slime/backends/sglang_utils/arguments.py",line:174}),h(Src,{label:"sglang validate_args",path:"slime/backends/sglang_utils/arguments.py",line:139}),h(Src,{label:"add_sglang_router_arguments",path:"slime/backends/sglang_utils/arguments.py",line:8}),h(Ext,{href:"https://docs.sglang.ai/"},"SGLang server 参数文档"))
    );
  }

  // ===== 两阶段解析流程 =====
  function PipelineSection(){
    return h("div",null,
      h("p",null,"前面分别讲了三套参数的来源，现在把它们如何被 ",h("code",null,"parse_args()")," 串起来讲清。整个流程分为预解析、两阶段解析、合并、校验四步。"),
      h(Code,null,"def parse_args(add_custom_arguments=None):\n    configure_logger()\n    add_slime_arguments = get_slime_extra_args_provider(add_custom_arguments)\n\n    # 预解析: 取出控制解析流程本身的少数标志\n    pre = _pre_parse_mode()\n    skip_sglang = pre.debug_train_only or pre.load_debug_rollout_data is not None\n\n    # 阶段 1: 独立解析 sglang 参数 (除非用不到 sglang)\n    sglang_ns = None\n    if not skip_sglang:\n        sglang_ns = sglang_parse_args()\n\n    # 阶段 2: 解析 megatron + slime 参数 (ignore_unknown_args=True)\n    args = megatron_parse_args(\n        extra_args_provider=add_slime_arguments,\n        skip_hf_validate=pre.debug_rollout_only,\n    )\n\n    # 合并: 把预解析与 sglang 命名空间并入主 args\n    for key, value in vars(pre).items():\n        setattr(args, key, value)\n    if sglang_ns is not None:\n        for key, value in vars(sglang_ns).items():\n            setattr(args, key, value)\n\n    # 三道校验\n    slime_validate_args(args)\n    if pre.train_backend == \"megatron\" and not args.debug_rollout_only:\n        megatron_validate_args(args)\n    if not args.debug_train_only:\n        sglang_validate_args(args)\n    return args"),
