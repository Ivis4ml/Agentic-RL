  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 7 课</p><h1>权重同步</h1><p>能访问 CDN 时切换为交互版。本课讲清训练侧 Megatron 分片权重如何推送给推理侧 SGLang，为何它是异步吞吐的瓶颈，四种同步策略（from_disk / from_distributed / from_tensor / from_distributed_delta）的对比与设计动机，HF 权重在线转换的 bridge 与 direct 两条路径，可重建的 NCCL 通信组、张量备份，以及按字节分桶控制显存峰值。</p></main></div>

  // ===== 为什么需要权重同步 =====
  function WhySection(){
    return h("div",null,
      h("p",null,"在 slime 的一个训练步里，",h("strong",{className:"hl-purple"},"Megatron")," 用反向传播更新 actor 参数，得到一版新权重 ",h("code",null,"θ_train"),"；而生成下一批 rollout 数据的是 ",h("strong",{className:"hl-teal"},"SGLang")," 引擎，它持有的是另一份独立的权重副本 ",h("code",null,"θ_gen"),"。两者运行在不同进程（往往是不同节点、不同 GPU）上，参数布局也完全不同：Megatron 把每个张量按五维并行（TP/PP/EP/CP/DP）切成分片，分散在多块 GPU 上；SGLang 需要的是完整的、按 HuggingFace 命名与布局组织的权重。",h("strong",null,"权重同步"),"就是把 ",h("code",null,"θ_train")," 从 Megatron 的分片形态转换并搬运到 SGLang 引擎，使下一轮生成使用最新策略。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill purple"},"源"),"Megatron 分片"),
          h("p",null,"每块 GPU 只持有一个张量的一部分（TP 沿某一维切、EP 沿专家维切、PP 沿层切）。参数命名是 Megatron 内部的（如 ",h("code",null,"decoder.layers.N.mlp..."),"），且 GLU 的 ",h("code",null,"linear_fc1")," 与 grouped MoE 的 ",h("code",null,"linear_fc2")," 还有特殊布局。")
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"目的地"),"SGLang 完整权重"),
          h("p",null,"推理引擎需要按 HF 命名、未切分（或按它自己的 TP 切分）的完整张量。因此同步过程必然包含两步：先在训练侧把分片",h("strong",null,"聚合"),"成完整张量（all-gather），再把它",h("strong",null,"转换")," 成 HF 命名与布局，最后",h("strong",null,"搬运"),"过去。")
        )
      ),
      h("h3",null,"为什么它是异步吞吐的瓶颈"),
      h("p",null,"回顾第 1 课：同步训练每一步都要做一次权重同步（生成 → 训练 → 同步 → 再生成），同步期间生成必须暂停。模型越大，同步耗时越长：对一个数百亿到数千亿参数的模型，把全部参数从训练侧聚合、转换、广播到推理侧，是一个会持续数十秒甚至更久的集合通信过程。在这段时间里，昂贵的推理 GPU 处于空闲。异步训练（第 8 课）的目标正是让生成与训练重叠，但权重同步天然要求生成暂停（否则一次生成的前后会用上不同版本的权重），因此",h("strong",null,"同步本身的耗时直接决定了异步重叠所能达到的吞吐上限"),"。优化权重同步，等价于优化整个 RL 训练的有效算力利用率。"),

    {key:"disk",name:"from_disk（存盘再加载）",render:function(){return [

      h(Code,null,"@torch.no_grad()\ndef update_weights(self) -> None:\n    self.weight_version += 1\n    version_dir = Path(self.args.update_weight_disk_dir) / f\"weight_v{self.weight_version:06d}\"\n\n    if dist.get_rank() == 0:\n        shutil.rmtree(version_dir, ignore_errors=True)\n    dist.barrier(group=get_gloo_group())\n\n    if dist.get_rank() == 0:\n        # 暂停生成并清空 KV 缓存, 避免在旧权重上继续解码\n        ray.get([engine.pause_generation.remote() for engine in self.rollout_engines])\n        ray.get([engine.flush_cache.remote() for engine in self.rollout_engines])\n    dist.barrier(group=get_gloo_group())\n\n    # 全体训练 rank 协同把分片权重重组为完整 HF checkpoint 写盘\n    save_hf_model_to_path(self.args, version_dir, self.model, model_name=self.model_name,\n                          quantization_config=self.quantization_config, ...)\n    dist.barrier(group=get_gloo_group())\n\n    if dist.get_rank() == 0:\n        ray.get([engine.update_weights_from_disk.remote(\n            model_path=str(version_dir), weight_version=str(self.weight_version)\n        ) for engine in self.rollout_engines])\n        if not self.args.update_weight_disk_keep_files:\n            shutil.rmtree(version_dir, ignore_errors=True)\n        ray.get([engine.continue_generation.remote() for engine in self.rollout_engines])\n    dist.barrier(group=get_gloo_group())"),

      h(Code,null,"def connect_rollout_engines_from_distributed(args, group_name, rollout_engines, engine_gpu_counts=None):\n    if engine_gpu_counts is None:\n        engine_gpu_counts = [args.rollout_num_gpus_per_engine] * len(rollout_engines)\n    master_address = ray._private.services.get_node_ip_address()\n    ...\n    world_size = sum(engine_gpu_counts) + 1     # +1 给训练 rank 0\n    cumulative = [0]\n    for c in engine_gpu_counts:\n        cumulative.append(cumulative[-1] + c)\n    refs = [engine.init_weights_update_group.remote(\n                master_address=master_address, master_port=master_port,\n                rank_offset=cumulative[i] + 1, world_size=world_size,\n                group_name=group_name, backend=\"nccl\")\n            for i, engine in enumerate(rollout_engines)]\n    model_update_groups = init_process_group(\n        backend=\"nccl\", init_method=f\"tcp://{master_address}:{master_port}\",\n        world_size=world_size, rank=0, group_name=group_name)\n    ray.get(refs)\n    return model_update_groups"),

      h(Code,null,"def all_gather_param(name, param):\n    if \"expert_bias\" in name:\n        return param\n    if not param.tensor_model_parallel or getattr(param, \"parallel_mode\", None) == \"duplicated\":\n        return param.data\n    if \".experts.\" in name:\n        tp_size = mpu.get_expert_tensor_parallel_world_size()\n        tp_group = mpu.get_expert_tensor_parallel_group()\n    else:\n        tp_size = mpu.get_tensor_model_parallel_world_size()\n        tp_group = mpu.get_tensor_model_parallel_group()\n    param_partitions = [torch.empty_like(param.data) for _ in range(tp_size)]\n    dist.all_gather(param_partitions, param.data, group=tp_group)\n    partition_dim = param.partition_dim\n    if \"linear_fc1.weight\" in name or \"linear_fc1.bias\" in name:   # GLU 重拼\n        param_partitions = [p.chunk(2, dim=0) for p in param_partitions]\n        param_partitions = [p[0] for p in param_partitions] + [p[1] for p in param_partitions]\n    if \"linear_fc2.weight\" in name:                                # grouped MoE 修正\n        if partition_dim == 0:\n            partition_dim = 1\n    return torch.cat(param_partitions, dim=partition_dim)"),

      h(Code,null,"def chunk_named_params_by_size(named_params, chunk_size):\n    return _chunk_by_size(named_params, compute_size=lambda nw: nw[1].nbytes, chunk_size=chunk_size)\n\ndef _chunk_by_size(objects, compute_size, chunk_size):\n    bucket, bucket_size = [], 0\n    for obj in objects:\n        obj_size = compute_size(obj)\n        if bucket and (bucket_size + obj_size) >= chunk_size:\n            yield bucket\n            bucket, bucket_size = [], 0\n        bucket.append(obj)\n        bucket_size += obj_size\n    if bucket:\n        yield bucket"),

      h("p",null,"共置（offload）训练把模型在训练与休眠之间切换，休眠时要释放显存，这意味着要销毁 NCCL 通信组（NCCL 组会常驻一块显存做通信缓冲）。但 PyTorch 创建的进程组本身不支持”销毁后再用同样配置重建”。",h("code",null,"reloadable_process_group.py")," 用 monkey patch 解决：它替换 ",h("code",null,"dist.new_group"),"，让所有非 Gloo、成员多于一个的组都被包成 ",h("code",null,"ReloadableProcessGroup"),"，记下其 ranks 配置。"),
      h(Code,null,"class ReloadableProcessGroup(torch.distributed.ProcessGroup):\n    @staticmethod\n    def destroy_process_groups():\n        for g in ReloadableProcessGroup.GROUPS.get(os.getpid(), []):\n            if g.group is None: continue\n            dist.destroy_process_group(g.group)\n            del g.group\n            g.group = None\n\n    @staticmethod\n    def reload_process_groups():\n        old_new_group = old_new_group_dict.get(os.getpid())\n        for g in ReloadableProcessGroup.GROUPS.get(os.getpid(), []):\n            if g.group is not None: continue\n            g.group = old_new_group(ranks=g.group_info[\"ranks\"], backend=\"nccl\")  # 按原配置重建"),

      h("h3",null,"tensor_backper：训练侧的权重备份"),

      h(Code,null,"class _TensorBackuperNormal(TensorBackuper):\n    @torch.no_grad()\n    def backup(self, tag):\n        backup_dict = self._backups[tag]\n        for name, param in self._source_getter():\n            if name not in backup_dict:\n                backup_dict[name] = torch.empty_like(param, device=torch.device(\"cpu\"), pin_memory=True)\n            backup_dict[name].copy_(param.detach(), non_blocking=True)   # GPU→固定页 CPU\n        torch.cuda.synchronize()\n\n    @torch.no_grad()\n    def restore(self, tag):\n        for name, param in self._source_getter():\n            param.copy_(self._backups[tag][name], non_blocking=True)     # 固定页 CPU→GPU"),
