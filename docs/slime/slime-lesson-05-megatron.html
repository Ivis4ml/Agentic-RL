  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 5 课</p><h1>训练后端 Megatron</h1><p>能访问 CDN 时切换为交互版。本课详细讲 slime 的 Megatron-Core 训练后端：TP/PP/CP/EP/ETP 五维并行，MegatronTrainRayActor 的训练步骤，loss.py 在 packed + 上下文并行下的策略/价值/熵/KL 损失与跨 DP（含 CP）归一化，cp_utils 的长序列切分与 logprob 重组，data.py 的 packed 批构造，FP8 与 INT4 QAT 量化 kernel，以及 megatron_to_hf 各模型族的权重转换。</p></main></div>

  function OverviewSection(){const ref=useTypeset("ov");

  // ===== Tab 探索器：五维并行 / actor 训练步 / loss / CP / 低精度 =====
  const MEGA=[
    {key:"5d",name:"五维并行 TP/PP/CP/EP/ETP",render:function(){return [
      h("p",null,"Megatron-Core 把模型沿五个独立维度切到 GPU 集群上。slime 不重新发明这套机制，而是在 ",h("code",null,"initialize.py")," 里把 slime 的命令行参数原样转交给 ",h("code",null,"mpu.initialize_model_parallel"),"，由 Megatron 建好五维进程组。建组顺序固定为 ",h("code",null,'"tp-cp-ep-dp-pp"'),"，这个顺序决定哪些 rank 物理相邻：靠前的维度（TP、CP）通信最频繁，因此被放到节点内、走更快的 NVLink；DP、PP 通信较少，可以跨节点。"),

      h("p",null,"这两条约束必须同时满足同一个 ",h("code",null,"N_world"),"，因此专家维度 ",h("code",null,"etp×ep")," 与注意力维度 ",h("code",null,"tp×cp")," 共享同一批物理卡，只是逻辑切法不同。actor 初始化后会把实际的 ",h("code",null,"dp_size"),"、",h("code",null,"cp_size"),"、VPP 大小读出来存进 ",h("code",null,"train_parallel_config"),"，供后续损失归一化使用。"),
