<body>
  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 9 课</p><h1>Agent 层（Agentic RL）</h1><p>能访问 CDN 时切换为交互版。本课讲清 slime 如何把自己的 SGLang 引擎包装成 OpenAI / Anthropic 兼容 API 端点，让 Claude Code、Codex 等成熟商用 agent harness 无需改代码即可对训练中的模型运行，从而把商用 agent harness 直接当作 RL 环境；并讲清轨迹管理（多轮、分支、把 API messages 反 tokenize 回训练 token 与 loss_mask）、沙箱执行、工具调用解析与并发 HTTP 服务。</p></main></div>
  <script>

  // ===== 范式：harness-as-env =====
  function ParadigmSection(){
    return h("div",null,
      h("p",null,"传统 RL 训练里，环境（environment）是一段我们自己写、自己维护的代码：它定义状态、接受动作、返回观测与奖励。对于数学题或单轮问答，这种 static env 足够；但当目标是训练一个会写代码、会反复调用工具、会在文件系统里改来改去的 agent 时，自己复刻一个与生产环境一致的 agent 框架既昂贵又容易与真实分布产生偏差。slime 的 Agent 层给出的方案是反过来：",h("strong",{className:"hl-amber"},"把成熟的商用 agent harness 直接当作 RL 环境"),"，让训练中的模型在真实的 Claude Code、Codex 之类的 agent 程序里跑完整任务，slime 只负责在背后把这次运行还原成可训练的 token 序列与奖励。"),
      h("p",null,"实现这一点的核心技巧只有一句话：",h("strong",null,"slime 把自己的 SGLang 推理引擎伪装成一个 OpenAI / Anthropic 兼容的 API 端点"),"。Claude Code 通过 ",h("code",null,"ANTHROPIC_BASE_URL")," 找模型，Codex 通过 ",h("code",null,"OPENAI_BASE_URL")," 找模型，它们都假设对面是 api.anthropic.com 或 api.openai.com。slime 只要在本机起一个 HTTP 服务，按这两家协议的格式收发请求，并把请求体里的对话历史转成 token 喂给训练中的 SGLang，再把 SGLang 的输出按协议格式包回去，harness 就完全无法区分自己面对的是商用 API 还是训练中的模型。harness 不需要改一行代码。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill amber"},"static env"),"自建环境"),
          h("p",null,"环境逻辑、工具实现、奖励判定全由训练方编写。优点是完全可控；缺点是要重复实现一遍 agent 框架已经做好的工具循环、提示模板、上下文压缩等，且与真实部署环境存在分布偏移。")
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"harness-as-env"),"复用商用 harness"),
          h("p",null,"环境就是真实的 agent 程序本身。slime 只在协议边界做一层适配（adapter），把 SGLang 包成 OpenAI / Anthropic 端点。模型在与生产环境一模一样的工具循环、系统提示、上下文管理之下被训练，从 static env 自然过渡到 dynamic env。")
        )
      ),
      h("p",null,"这正是当前所谓 agentic RL 的直接价值：训练分布与部署分布天然一致，且像 ",h(Ext,{href:"https://www.swebench.com/"},"SWE-bench"),"、",h(Ext,{href:"https://github.com/sierra-research/tau-bench"},"tau-bench")," 这类以真实工具调用与多轮交互为核心的基准，可以用同一套 harness 既评测又训练。Agent 层因此被组织成四个职责清晰的子模块。"),

        h("div",{className:"card"},

        ),

          h("div",null,h(Src,{label:"harness/common.py",path:"slime/agent/harness/common.py",line:56}),h(Src,{label:"claude_code.py",path:"slime/agent/harness/claude_code.py",line:15}),h(Src,{label:"codex.py",path:"slime/agent/harness/codex.py",line:21}))

  // ===== 一次完整请求的数据流 =====
  function DataflowSection(){
    return h("div",null,
      h("p",null,"在拆解每个文件之前，先看一次 agent 请求从 harness 出发、穿过适配器、抵达 SGLang、再回到 harness 的完整流程。理解了这条流程，后面所有文件的角色都能就位。"),
      h(Code,null,"# harness 内的 CLI 发出一次 API 请求 (它以为对面是 api.anthropic.com)\n#   POST {adapter_url}/v1/messages   Authorization: Bearer <session_id>\n#       └─ body = { messages: [...多轮历史...], tools: [...], max_tokens: ... }\n#\n# 适配器 BaseAdapter._run_turn 接管这一轮:\n#   1) _session_id(request, body)          # 从 Bearer / body 解析出 sid\n#   2) _translate(body)                    # wire 协议消息 -> chat 模板消息 + 工具 schema\n#   3) _render_token_ids(...)              # apply_chat_template -> prompt_ids\n#   4) call_sglang_generate(prompt_ids)    # POST sglang /generate, 取回 output_ids + logprobs\n#   5) parse_model_output(...)             # 切出 reasoning / 可见文本 / 工具调用\n#   6) _build_reply(...)                   # 打包成 wire 消息 + manager 消息\n#   7) manager.record_turn(sid, ...)       # 把这一轮记入 per-sid 轨迹树\n#   8) _respond(...)                       # 按协议格式 (JSON 或 SSE 流) 回给 harness\n#\n# harness 收到回复, 执行工具, 把工具结果拼进历史, 发下一轮请求 (回到第 1 步)\n# ...直到任务结束, harness 进程退出\n#\n# 运行结束后:\n#   adapter.finish_session(sid, base_sample, reward)  # 把整棵树线性化成 list[Sample]"),
      h("p",null,"这里有三个值得强调的设计取舍。第一，",h("strong",null,"适配器是无状态转译加一层薄记账"),"：它本身不维护对话，对话历史完全由 harness 在每次请求里重新带上（这正是 OpenAI / Anthropic 协议的无状态特性），适配器只需把当轮历史转成 token、生成、记录。第二，",h("strong",null,"session id 是把多次独立 HTTP 请求归并为一条轨迹的纽带"),"：harness 把它放在 Authorization 头里，适配器据此把同一次 agent 运行的所有轮次挂到同一棵树上。第三，",h("strong",null,"训练信号在请求阶段并不产生"),"，只有等 harness 整体跑完、调用 ",h("code",null,"finish_session")," 时，才把树线性化为带 loss_mask 的 ",h("code",null,"Sample")," 列表，奖励此时才注入。"),
      h(Formula,{cap:"一次 agent 运行被还原为 N 轮 TurnRecord 的序列，再压缩为若干个可训练 Sample"},"$$ \\text{run}(sid) \\;=\\; \\big[\\, \\tau_1, \\tau_2, \\dots, \\tau_N \\,\\big] \\;\\xrightarrow{\\ \\text{record\\_turn}\\ }\\; \\text{tree}(sid) \\;\\xrightarrow{\\ \\text{get\\_trajectory}\\ }\\; \\{\\, s_1, \\dots, s_M \\,\\} $$"),
      h("p",null,"其中每个 ",h("code",null,"\\tau_i")," 是一个 ",h("code",null,"TurnRecord"),"（含本轮 prompt_ids、output_ids、logprobs、finish_reason），$N$ 是 harness 实际发出的请求轮数，$M$ 是最终线性化出的训练样本数（通常 $M \\le N$，因为同一条对话链的多轮会被压进一个样本，而分支会拆出多个样本）。")
    );
  }

      h(Code,null,"class BaseAdapter:\n    def __init__(self, *, tokenizer, sglang_url, tool_parser=None,\n                 reasoning_parser=None, max_turns_per_sid=None,\n                 fork_threshold_tokens=None, debug_callback=None):\n        self.tokenizer = tokenizer\n        self.sglang_url = sglang_url.rstrip(\"/\") ...\n        self.store = {}        # sid -> Session (采样默认值 + 上下文预算)\n        self.inflight = {}     # sid -> set[Task]   在途的轮次任务\n        self.closed = set()    # 已结算关闭的 sid\n        self.app = web.Application(client_max_size=64 * 1024 * 1024)\n        # 一个 TrajectoryManager 被所有 sid 共享; per-sid 树在它内部\n        self.manager = TrajectoryManager(**mgr_kwargs)\n        self.max_turns_per_sid = max_turns_per_sid\n        self.app.router.add_get(\"/healthz\", _health)\n        self._register_routes(self.app)   # 子类注册自己的 POST 路由"),

    ];}},
    {key:"turn",name:"_run_turn 单轮流程",render:function(){return [
      h("p",null,"这是适配器的心脏：把一次 HTTP 请求变成一轮生成并记入轨迹。它先做三道护栏（session 已关闭则拒收掉队请求、轮次超限则返回 429 杀掉这次运行、把当前 task 登记进 inflight 以便结算时能排空），随后执行翻译 → 渲染 token → 调 SGLang → 解析 → 记录 → 回复。"),
      h(Code,null,"async def _run_turn(self, request):\n    body = await request.json()\n    self._preprocess_body(body)\n    sid = self._session_id(request, body)\n    if sid in self.closed:                      # 会话已结算, 拒收掉队请求\n        return web.Response(status=503, text=\"session closed\")\n    capped = self._check_turn_cap(sid)          # 超过 max_turns_per_sid -> 429\n    if capped is not None:\n        return capped\n    s = self.store.setdefault(sid, Session())\n    task = asyncio.current_task()\n    self.inflight.setdefault(sid, set()).add(task)\n    try:\n        translated, tools_schema = self._translate(body)\n        prompt_ids = _render_token_ids(translated, self.tokenizer,\n                                       tools=tools_schema, add_generation_prompt=True)\n        turn = await call_sglang_generate(prompt_ids, s, body, adapter=self, session_id=sid)\n        raw_output = self.tokenizer.decode(turn.output_ids, skip_special_tokens=False) ...\n        parsed = parse_model_output(raw_output, tools_schema=tools_schema, ...)\n        reply = self._build_reply(parsed, turn.finish_reason, translated, tools_schema)\n        turn = dataclasses.replace(turn, finish_reason=reply.finish_reason)\n        self.manager.record_turn(sid, turn=turn, prompt_messages=translated,\n                                 response_message=reply.manager_message, metadata={\"sid\": sid})\n        return await self._respond(request, body, reply, len(prompt_ids), len(turn.output_ids), stream)\n    finally:\n        self.inflight.get(sid, set()).discard(task)"),
      h("p",null,"注意 ",h("code",null,"prompt_ids")," 是由 slime 自己用 ",h("strong",null,"被服务模型的 chat 模板"),"（",h("code",null,"apply_chat_template"),"）现场渲染的，而不是信任 harness 发来的任何 token 化结果。这保证了无论哪个 harness、无论它如何拼装历史，最终喂给训练模型的 token 都与该模型的真实模板一致；漂移问题留给 trajectory.py 统一处理。",h("code",null,"return_logprob=True")," 让 SGLang 一并返回每个输出 token 的 logprob，作为 rollout 时的行为策略概率 $\\pi_{\\text{old}}$，供后续重要性采样修正使用（见第 3 课）。"),
      h("div",null,h(Src,{label:"_run_turn",path:"slime/agent/adapters/common.py",line:302}),h(Src,{label:"_check_turn_cap",path:"slime/agent/adapters/common.py",line:269}),h(Src,{label:"_render_token_ids",path:"slime/agent/adapters/common.py",line:57}),h(Src,{label:"call_sglang_generate",path:"slime/agent/adapters/common.py",line:408}))

    {key:"sglang",name:"call_sglang_generate",render:function(){return [
      h("p",null,"这个模块级函数（刻意不写成方法，以便测试可以 monkeypatch）负责把一轮 prompt 发给 SGLang 的 ",h("code",null,"/generate")," 端点，并把回复打包成 ",h("code",null,"TurnRecord"),"。它做三件事：组装采样参数、强制按上下文预算裁剪 max_new_tokens、在客户端取消或超时时主动调用 ",h("code",null,"/abort_request")," 释放 SGLang 的 KV 槽位。"),
      h(Code,null,"async def call_sglang_generate(prompt_ids, session, body, *, adapter, session_id=None):\n    sp = _sampling_params(session, body, max_token_keys=adapter.max_token_keys,\n                          stop_keys=adapter.stop_keys)\n    if session.max_context_tokens > 0:\n        remaining_context = session.max_context_tokens - len(prompt_ids)\n        if remaining_context <= 0:                # prompt 已超预算, 直接判 length\n            return TurnRecord(prompt_ids=list(prompt_ids), output_ids=[], finish_reason=\"length\")\n        sp[\"max_new_tokens\"] = min(int(sp.get(\"max_new_tokens\", remaining_context)), remaining_context)\n    rid = uuid.uuid4().hex\n    headers = {\"X-SMG-Routing-Key\": session_id} if session_id and session_id != \"default\" else None\n    try:\n        async with aiohttp.ClientSession(timeout=timeout) as sess, sess.post(\n            f\"{adapter.sglang_url}/generate\",\n            json={\"rid\": rid, \"input_ids\": prompt_ids,\n                  \"sampling_params\": sp, \"return_logprob\": True},\n            headers=headers) as r:\n            ...\n            data = await r.json(content_type=None)\n        meta = data.get(\"meta_info\") or {}\n        output_token_logprobs = meta.get(\"output_token_logprobs\") or []\n        output_ids = [x[1] for x in output_token_logprobs]\n        output_log_probs = [float(x[0]) for x in output_token_logprobs]\n        finish = (meta.get(\"finish_reason\") or {}).get(\"type\", \"stop\") or \"stop\"\n    except (asyncio.CancelledError, aiohttp.ClientError, asyncio.TimeoutError):\n        # 客户端取消/超时: 主动 abort, 否则孤立的生成会一直占着 KV 直到自身长度上限\n        async with aiohttp.ClientSession(...) as s2:\n            await s2.post(f\"{adapter.sglang_url}/abort_request\", json={\"rid\": rid})\n        raise\n    return TurnRecord(prompt_ids=list(prompt_ids), output_ids=output_ids,\n                      finish_reason=finish, output_log_probs=output_log_probs)"),
      h("p",null,"几处设计动机值得点明。",h("code",null,"X-SMG-Routing-Key")," 把同一 sid 的多轮请求路由到 SGLang 集群里同一个副本，从而命中前缀 KV 缓存（多轮对话的前缀高度重叠，缓存命中能显著降低延迟）。主动 ",h("code",null,"abort_request")," 是关键的资源保护：agent 运行常因超时或上层取消而中断，若不显式释放，被放弃的生成会持续占用显存中的 KV 直到自然结束。",h("code",null,"_sampling_params")," 默认设 ",h("code",null,"skip_special_tokens=False")," 与 ",h("code",null,"no_stop_trim=True"),"，因为训练需要保留所有特殊 token 与停止符，不能像面向用户的接口那样修剪。"),

      h(Code,null,"async def finish_session(self, sid, *, base_sample=None, reward=0.0,\n                         extra_metadata=None, wait_timeout=5.0):\n    await self.shutdown_session(sid, wait_timeout=wait_timeout)  # 标记关闭并排空在途任务\n    self.store.pop(sid, None)\n    samples = self.manager.get_trajectory(\n        sid, base_sample=base_sample, reward=reward, extra_metadata=extra_metadata)\n    for s in samples:\n        rlen = int(s.response_length or 0)\n        # manager 不持有 tokenizer, 由适配器把被训练的尾段 token 解码回文本\n        s.response = (self.tokenizer.decode(s.tokens[-rlen:], skip_special_tokens=False)\n                      if rlen and s.tokens else \"\")\n    return samples"),

      h("div",{className:"warn"},h("strong",null,"为什么这是 agentic RL 的真实陷阱"),"：训练数据的正确性取决于一个看似无关的工程细节，即客户端回放消息的字节级形态。任何一处不匹配都不会报错，只会静默地让 loss_mask 错位、让本应共享的前缀被重复计入。这与第 1 课强调的“RL 的 bug 往往是静默的，因此 slime 以正确性为先”完全一致。Anthropic 侧还专门处理了一个客户端怪癖：列表中部出现的 ",h("code",null,"system")," 消息会被许多 chat 模板拒绝，",h("code",null,"_fold_mid_list_system_into_user")," 把它折叠进相邻 user 消息的 ",h("code",null,"<system-reminder>")," 文本块里。"),
      h("div",null,h(Src,{label:"openai 不变量注释",path:"slime/agent/adapters/openai.py",line:211}),h(Src,{label:"anthropic 不变量注释",path:"slime/agent/adapters/anthropic.py",line:147}),h(Src,{label:"tool_call_dict",path:"slime/agent/adapters/common.py",line:109}),h(Src,{label:"_fold_mid_list_system_into_user",path:"slime/agent/adapters/anthropic.py",line:291}))

  // ===== trajectory.py 深读 =====
  function TrajectorySection(){
    return h("div",null,
      h("p",null,h("code",null,"trajectory.py")," 是本课最难、也最体现 agentic RL 本质的文件。它要解决的问题可以这样表述：适配器在运行期间收到的是一连串孤立的、彼此带重叠历史的请求；要把它们变成可训练的数据，必须重建出“谁是谁的延续、谁从谁分支出去”的结构，并在重新 token 化必然带来漂移的前提下，精确地标出哪些 token 是模型自己生成的（loss_mask=1，参与梯度）、哪些只是上下文（loss_mask=0，不参与）。"),
      h("h3",null,"为什么需要一棵树而不是一条链"),
      h("p",null,"真实的 agent 运行不是线性的。Claude Code 会派生子 agent（sub-agent），会在上下文超长时做压缩（compaction）并以略有差异的历史重启，会因工具失败而回退重试。这些都会让两次请求在某个前缀之后产生分叉。slime 用一棵 ",h("strong",null,"per-session 消息树")," 来如实记录这种结构：每条消息是一个 ",h("code",null,"MessageNode"),"，",h("code",null,"record_turn")," 把新一轮的 prompt 历史沿树向下匹配，在第一个不匹配处挂上新分支，并把本轮生成的 assistant 消息作为叶子接上去。"),
      h(Code,null,"def record_turn(self, sid, *, turn, prompt_messages, response_message, metadata=None):\n    root = self._trees.setdefault(sid, MessageNode())\n    node, depth = self._find_mount_point(root, prompt_messages)          # 沿树向下逐条匹配\n    node, depth = self._try_merge_assistant_rewrite(sid, node, prompt_messages, depth)  # 短改写就地合并\n    node = self._mount_prompt_messages(node, prompt_messages[depth:])    # 余下历史挂成新节点\n    self._attach_assistant_leaf(sid, node, turn=turn,                    # 本轮生成挂成叶子\n                                response_message=response_message, metadata=metadata)"),
      h("p",null,h("code",null,"_find_mount_point")," 按 role 与 dict 相等逐层匹配，返回仍能匹配的最深节点（这正是上一节强调的相等约束发挥作用之处）。",h("code",null,"_try_merge_assistant_rewrite")," 处理一个微妙情形：harness 有时会把上一轮的 assistant 消息略作重渲染（如空白差异）后回放，使它不再与我们生成的节点相等，本该分叉，却会把原本生成的那一轮孤立成死叶子并仍然产出自己的训练样本。对策是：当挂载点恰有唯一一个生成的、短的（响应长度 < fork 阈值）assistant 叶子时，就地用回放版本覆盖该节点的消息，并把它降级为 routing-only（停止训练其生成内容），只让活跃分支被训练。长响应则照常分叉，因为它携带足够的真实信号值得独立成样本。"),
      h("h3",null,"漂移分类：CLEAN / REALIGN / FORK"),
      h("p",null,"线性化阶段才是真正的难点。把一条从根到叶的链拆进 ",h("code",null,"_SampleBuilder")," 时，理想情况下每一轮的 prompt token 恰好是已累积 token 的精确前缀延伸。但回放几乎从不逐字节重 token 化：TITO（token-in-token-out）往返与 chat 模板重渲染都会扰动已见内容的 id。",h("code",null,"_SampleBuilder")," 把这种漂移按“发生在哪里、有多远”分成三类处理。"),
      h(Code,null,"def classify_token_drift(self, turn):\n    realign_at = _common_prefix_len(self.tokens, turn.prompt_ids)  # 公共前缀长度\n    drift = len(self.tokens) - realign_at                          # 已持有 token 中被推翻的长度\n    if drift == 0:\n        return DriftKind.CLEAN     # 无漂移: prompt 恰好延伸已持有 token, 追加尾段即可\n    start = self.last_response_start_idx\n    if start is not None and realign_at >= start and len(turn.output_ids) < self._fork_threshold:\n        return DriftKind.REALIGN  # 漂移落在最近一次响应段内且响应较短: 用 prompt 覆盖该段 (loss_mask=0)\n    return DriftKind.FORK         # 其余: 关闭当前 builder, 另起一个作为分支"),
      h(Formula,{cap:"公共前缀长度与漂移量；REALIGN 仅修复落在最近响应段内的短漂移"},"$$ \\text{realign\\_at} = \\max\\{\\, p : \\mathbf{t}_{[:p]} = \\mathbf{q}_{[:p]} \\,\\}, \\qquad \\text{drift} = |\\mathbf{t}| - \\text{realign\\_at} $$"),
      h("p",null,"其中 $\\mathbf{t}$ 是 builder 已持有的 token 序列，$\\mathbf{q}$ 是来轮 prompt 的 token 序列。",h("code",null,"_common_prefix_len")," 分块（每块 4096）比较以加速。三类处理的直觉是："),
      h("ul",null,
        h("li",null,h("span",{className:"hl-green"},"CLEAN"),"（drift = 0）：来轮 prompt 是已持有 token 的精确前缀延伸，只需把超出部分以 ",h("code",null,"loss_mask=0")," 追加（这是上下文，不是模型这一轮生成的），随后把本轮 ",h("code",null,"output_ids")," 以 ",h("code",null,"loss_mask=1")," 追加。"),
        h("li",null,h("span",{className:"hl-amber"},"REALIGN"),"：漂移很短且落在最近一次响应段之内。这通常是模型上一轮的输出在回放时被轻微重渲染。对策是用来轮 prompt 覆盖那一段、并把它标成 ",h("code",null,"loss_mask=0"),"：漂移的 token 不携带可信信号，从 prompt 重新追加可保持 builder 连续。更早的轮次不受影响。"),
        h("li",null,h("span",{className:"hl-red"},"FORK"),"：漂移过大或位置太靠前（或 builder 为空、或来轮响应长度 ≥ fork 阈值）。当前 builder 被拒绝，调用方关闭它并另起一个新 builder，这个边界就是“分支”。每个存活的 builder 最终产出一个 ",h("code",null,"Sample"),"。")
      ),
      h("p",null,h("code",null,"append_turn")," 据分类把一轮装进 builder：先追加 prompt 尾段（CLEAN 直接追加超出部分；REALIGN 调用 ",h("code",null,"_align_to_prompt")," 丢弃漂移尾段、从 prompt 重新追加），再把本轮生成的响应以 ",h("code",null,"loss_mask=int(trained)")," 追加，并仅在 trained 时保留 logprobs。这里的 ",h("code",null,"trained")," 标志服务于另一个去重需求：当一个生成的轮次被多个兄弟叶子共享时，只有第一个认领它的叶子训练它，其余叶子把它以 ",h("code",null,"loss_mask=0")," 重新发出作为上下文，从而保证每条响应恰好被训练一次。"),
      h(Code,null,"def append_turn(self, turn, kind, *, trained=True):\n    assert kind is not DriftKind.FORK\n    if kind is DriftKind.REALIGN:\n        self._align_to_prompt(turn.prompt_ids)            # 丢弃漂移尾段, 从 prompt 重追加\n    else:  # CLEAN: 已持有 token 是 prompt 的精确前缀, 追加其后的尾段\n        self._append_tokens(turn.prompt_ids[len(self.tokens):], loss_mask=0)\n    self.last_response_start_idx = len(self.tokens)\n    self._append_tokens(turn.output_ids, loss_mask=int(trained),       # 响应区: 训练才置 1\n                        logprobs=turn.output_log_probs if trained else None)"),
      h("h3",null,"线性化：从树到 Sample"),
      h("p",null,h("code",null,"get_trajectory")," 遍历树的每一个叶子，取它从根到自身的路径，把路径上的生成轮次按上面的漂移规则打包成若干 builder，每个有训练内容的 builder 产出一个 ",h("code",null,"Sample"),"。最后把整次运行的奖励 ",h("strong",null,"均分"),"到所有样本上，并弹出该 sid 结束会话。"),
      h(Code,null,"def get_trajectory(self, sid, *, base_sample, reward=0.0, extra_metadata=None):\n    root = self._trees.get(sid)\n    if root is None:\n        return []\n    samples = []\n    for routing_leaf in root.leaves():\n        if routing_leaf.is_root:\n            continue\n        chain = routing_leaf.path_from_root()\n        samples.extend(self._chain_to_samples(chain, base_sample=base_sample, extra_metadata=extra_metadata))\n    per_sample_reward = (reward / len(samples)) if samples else 0.0   # 奖励在样本间均分\n    for s in samples:\n        s.reward = per_sample_reward\n    self._trees.pop(sid, None); self._turn_count.pop(sid, None)\n    return samples"),
      h("p",null,h("code",null,"to_sample")," 在产出时会剥掉首轮 prompt（",h("code",null,"leading_prompt_len"),"），使 ",h("code",null,"loss_mask")," 与 ",h("code",null,"rollout_log_probs")," 只覆盖响应区，与 slime 其余部分对 ",h("code",null,"Sample")," 的约定一致（见第 1 课的 ",h("code",null,"slime/utils/types.py")," 数据契约）。",h("code",null,"response_length")," 记为去掉首轮 prompt 后的总长度，下游据此切出训练目标。"),
      h(Formula,{cap:"一个 Sample 的 token 布局：首轮 prompt 被剥离, 其后交替出现上下文段(mask=0)与生成段(mask=1)"},"$$ \\underbrace{[\\,\\text{prompt}_0\\,]}_{\\text{strip, leading\\_prompt\\_len}} \\;\\Big|\\; \\underbrace{[\\,\\text{ctx}_1\\,]}_{m=0}\\,\\underbrace{[\\,\\text{gen}_1\\,]}_{m=1}\\,\\underbrace{[\\,\\text{ctx}_2\\,]}_{m=0}\\,\\underbrace{[\\,\\text{gen}_2\\,]}_{m=1}\\,\\cdots $$"),
      h("div",{className:"note"},"设计取舍小结：",h("code",null,"TrajectoryManager")," 完全是 tokenizer-free 的纯结构逻辑，输入是 token id 与消息 dict，输出是 token id 序列与 mask。这让它既可被两个协议适配器共用，又可脱离模型独立单元测试。漂移的三分类（CLEAN/REALIGN/FORK）是对“重新 token 化不可避免地会漂移”这一现实的工程化回应：能精确延伸就延伸，短漂移就地修复且不计入损失，大漂移诚实地分叉成独立样本，宁可多产几个样本也不混淆训练信号。"),
      h("div",null,h(Src,{label:"MessageNode",path:"slime/agent/trajectory.py",line:45}),h(Src,{label:"_common_prefix_len",path:"slime/agent/trajectory.py",line:115}),h(Src,{label:"DriftKind",path:"slime/agent/trajectory.py",line:129}),h(Src,{label:"classify_token_drift",path:"slime/agent/trajectory.py",line:168}),h(Src,{label:"append_turn",path:"slime/agent/trajectory.py",line:192}),h(Src,{label:"_align_to_prompt",path:"slime/agent/trajectory.py",line:215}),h(Src,{label:"to_sample",path:"slime/agent/trajectory.py",line:233}),h(Src,{label:"record_turn",path:"slime/agent/trajectory.py",line:272}),h(Src,{label:"get_trajectory",path:"slime/agent/trajectory.py",line:296}),h(Src,{label:"_try_merge_assistant_rewrite",path:"slime/agent/trajectory.py",line:351}),h(Src,{label:"_split_chain_into_builders",path:"slime/agent/trajectory.py",line:437}))
    );
  }

  // ===== harness 探索器 =====
  const HARNESS=[
    {key:"base",name:"BaseHarness 生命周期",render:function(){return [
      h("p",null,"harness 是“可替换的编码 agent”。",h("code",null,"BaseHarness")," 把与具体 agent 无关的生命周期收拢成三步模板：创建非特权 agent 用户 → 写入 CLI 配置 → 启动并等待。具体 harness 只需实现 ",h("code",null,"install_cli"),"、",h("code",null,"write_config"),"、",h("code",null,"launch_and_wait")," 三个抽象方法。基类刻意不知道任何任务信息：",h("code",null,"run")," 只接收通用字段（工作目录、session_id、adapter_url、prompt），任务相关的工作区准备与评分留给示例层。"),
      h(Code,null,"@dataclass(frozen=True)\nclass HarnessContext:\n    workdir: str\n    session_id: str\n    adapter_url: str\n    model_label: str = \"slime-actor\"   # 仅 CLI 显示用; 适配器忽略它, 服务上游已加载的模型\n\nclass BaseHarness(ABC, metaclass=SingletonABCMeta):\n    name: str = \"\"\n    async def run(self, sb, *, workdir, session_id, adapter_url, time_budget_sec, prompt):\n        await _sandbox.ensure_agent_user(sb, workdir)      # 建 agent 用户, 授权 git diff\n        ctx = HarnessContext(workdir=workdir, session_id=session_id, adapter_url=adapter_url)\n        await self.write_config(sb, ctx)\n        return await self.launch_and_wait(sb, ctx, prompt, time_budget_sec)"),
      h("p",null,h("code",null,"model_label")," 的注释点出了 harness-as-env 的本质：harness 以为它在选某个具体模型，但适配器完全忽略这个标签，永远服务上游 SGLang 当前加载的那个训练中模型。换言之，模型身份对 harness 不透明，这正是“无需改 harness 代码”的前提。",h("code",null,"SingletonABCMeta")," 让每种 harness 在进程内是单例，避免重复安装。"),
      h("div",null,h(Src,{label:"HarnessContext",path:"slime/agent/harness/common.py",line:42}),h(Src,{label:"BaseHarness",path:"slime/agent/harness/common.py",line:56}),h(Src,{label:"run",path:"slime/agent/harness/common.py",line:80}),h(Src,{label:"ensure_agent_user",path:"slime/agent/sandbox.py",line:257}))
    ];}},
    {key:"run",name:"run_command 启动并轮询",render:function(){return [
      h("p",null,"非交互式 CLI 把一条 shell 命令交给 ",h("code",null,"run_command")," 跑到结束。它的关键设计是用 ",h("code",null,"setsid")," 把命令以分离（detached）进程启动，而非作为长连接的前台 exec，这样即便沙箱网关对连接时长设上限、命令也能存活。输出经 ",h("code",null,"tee")," 写入轨迹日志，真实退出码（",h("code",null,"PIPESTATUS[0]"),"，而非 tee 的退出码）写入一个标记文件，主控每 5 秒轮询一次。"),
      h(Code,null,"async def run_command(sb, *, workdir, start_cmd, env, time_budget_sec):\n    meta_dir = f\"{workdir}/.harness\"; done = f\"{meta_dir}/done\"\n    launcher_body = (\n        \"#!/bin/bash\\n\" f\"cd {workdir}\\n\" \"export HOME=/home/agent\\n\"\n        f\"{start_cmd} 2>&1 | tee {shlex.quote(traj)}\\n\"\n        f\"echo ${{PIPESTATUS[0]}} > {done}\\n\")        # 记真实退出码, 而非 tee 的\n    await sb.write_file(launcher, launcher_body, user=\"agent\")\n    await sb.exec(f\"runuser -u agent ... -- bash -c 'setsid {launcher} < /dev/null ... &'\", ...)\n    deadline = time.time() + time_budget_sec\n    exit_code = EXIT_TIME_BUDGET_EXCEEDED\n    while time.time() < deadline:\n        await asyncio.sleep(5)\n        ec, out, _ = await sb.exec(f\"test -f {done} && cat {done}\", user=\"agent\", ...)\n        if ec == 0:\n            exit_code = int((out or \"\").strip()); break\n    return exit_code"),
      h("p",null,"每 5 秒的短 RPC 还有第二重作用：它持续触碰沙箱，避免沙箱因空闲被垃圾回收。所有元数据放在 ",h("code",null,"{workdir}/.harness/")," 一个目录下，使后续做 diff 捕获时只需排除这一个目录。若预算耗尽仍未见标记文件，返回 ",h("code",null,"EXIT_TIME_BUDGET_EXCEEDED")," (-1)。"),
      h("div",null,h(Src,{label:"run_command",path:"slime/agent/harness/common.py",line:106}),h(Src,{label:"install_npm_cli",path:"slime/agent/harness/common.py",line:159}),h(Src,{label:"install_node22",path:"slime/agent/harness/common.py",line:173}))
    ];}},
    {key:"cc",name:"Claude Code harness",render:function(){return [
      h("p",null,"接管 Claude Code 只需三件事：把 npm 包装进沙箱、预先应答 bypass-permissions 让它无人值守启动、把 ",h("code",null,"ANTHROPIC_BASE_URL")," 指向 slime 适配器并把 session_id 放进 ",h("code",null,"ANTHROPIC_AUTH_TOKEN"),"。后者正是适配器解析 sid 的来源（Authorization: Bearer），把整次运行的所有请求绑到同一棵轨迹树。"),
      h(Code,null,"class ClaudeCodeHarness(BaseHarness):\n    name = \"claude_code\"\n    launch_flags = (\"--permission-mode bypassPermissions \"\n                    \"--output-format stream-json --include-partial-messages ...\")\n    async def write_config(self, sb, ctx):     # 预先应答 onboarding 与 bypass 权限\n        settings = json.dumps({\"hasCompletedOnboarding\": True,\n                               \"bypassPermissionsModeAccepted\": True})\n        await sb.exec(\"... | tee /home/agent/.claude.json /home/agent/.claude/settings.json ...\")\n    async def launch_and_wait(self, sb, ctx, prompt, time_budget_sec):\n        cmd = f\"/usr/local/bin/claude -p {shlex.quote(prompt)} {self.launch_flags}\"\n        env = {\"ANTHROPIC_BASE_URL\": ctx.adapter_url,        # 推理重定向到 slime 适配器\n               \"ANTHROPIC_AUTH_TOKEN\": ctx.session_id,        # sid 经 Bearer 头传给适配器\n               \"ANTHROPIC_MODEL\": ctx.model_label, **self.static_env}\n        return await run_command(sb, workdir=ctx.workdir, start_cmd=cmd, env=env, ...)"),
      h("p",null,h("code",null,"-p")," 是 Claude Code 的非交互（print）模式，配合 ",h("code",null,"bypassPermissions")," 让它在沙箱里全自动跑完。",h("code",null,"static_env")," 关掉非必要遥测与实验性特性，保证训练期间行为稳定可复现。环境变量与命令参数都开放了 ",h("code",null,"SLIME_AGENT_CC_EXTRA_*")," 扩展点，便于不同任务追加配置。"),
      h("div",null,h(Src,{label:"ClaudeCodeHarness",path:"slime/agent/harness/claude_code.py",line:15}),h(Src,{label:"write_config",path:"slime/agent/harness/claude_code.py",line:44}),h(Src,{label:"launch_and_wait",path:"slime/agent/harness/claude_code.py",line:57}))
    ];}},
    {key:"codex",name:"Codex harness",render:function(){return [
      h("p",null,"Codex 走 OpenAI 协议。它有两个非显然之处：其一，provider 的 base_url 必须内联写进 ",h("code",null,"config.toml"),"（Codex 只对默认 OpenAI provider 认环境变量），所以这里自定义一个名为 slime 的 provider；其二，配置经 base64 往返写入，以躲开 shell 引号陷阱。session_id 经 ",h("code",null,"OPENAI_API_KEY")," 传入，Codex 会把它放进 Authorization: Bearer，适配器据此解析 sid。"),
      h(Code,null,"class CodexHarness(BaseHarness):\n    name = \"codex\"\n    config_toml = ('model = \"{model}\"\\n' 'model_provider = \"slime\"\\n' \"\\n\"\n                   \"[model_providers.slime]\\n\" 'name = \"slime\"\\n'\n                   'base_url = \"{base_url}\"\\n'      # 必须内联! Codex 只对默认 provider 认 env\n                   'env_key = \"OPENAI_API_KEY\"\\n' 'wire_api = \"chat\"\\n')\n    async def write_config(self, sb, ctx):\n        toml = self.config_toml.format(model=ctx.model_label, base_url=f\"{ctx.adapter_url}/v1\")\n        toml_b64 = base64.b64encode(toml.encode(\"utf-8\")).decode(\"ascii\")    # base64 躲引号陷阱\n        await sb.exec(f\"... echo {shlex.quote(toml_b64)} | base64 -d > /home/agent/.codex/config.toml ...\")\n    async def launch_and_wait(self, sb, ctx, prompt, time_budget_sec):\n        cmd = f\"codex exec {self.exec_flags} {shlex.quote(prompt)}\"     # exec 是非交互入口\n        env = {\"OPENAI_API_KEY\": ctx.session_id, \"OPENAI_BASE_URL\": f\"{ctx.adapter_url}/v1\"}\n        return await run_command(sb, workdir=ctx.workdir, start_cmd=cmd, env=env, ...)"),
