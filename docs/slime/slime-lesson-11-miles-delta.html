      h("h3",null,"R3：从 slime 的进程内重放到 miles 的服务化重放"),
      h("p",null,"MoE 的不稳定根源在于：推理引擎（SGLang）与训练引擎（Megatron）对同一序列计算专家路由时，由于 kernel、并行布局、数值路径不同，可能选出不同的 top-k 专家集合。被选专家不同，等价于推理与训练用的是不同的子网络，重要性采样比就失真，大模型（Qwen3、DeepSeek-V3）上会出现训练崩溃。R3 的解法是：推理时记录每个 token 实际选中的专家索引，训练时强制按这份记录重放，从而保证逐位（bit-wise）一致的专家选择。"),

      h("p",null,"slime 的 ",h("code",null,"RoutingReplay")," 是一个进程内的全局单例配合环境变量驱动的状态机：通过 ",h("code",null,"ENABLE_ROUTING_REPLAY")," 与 ",h("code",null,"ROUTING_REPLAY_STAGE")," 环境变量在 fallthrough / record / replay_forward / replay_backward 之间切换，",h("code",null,"compute_topk")," 被包装后在 record 阶段把 ",h("code",null,"top_indices")," 复制到 CPU 固定内存，在 replay 阶段取回并用 ",h("code",null,"scores.gather")," 重算 ",h("code",null,"probs"),"。它解决的是单次训练步内 forward 与 backward 的路由一致，但本身没有把“推理侧”的路由作为数据源。"),
      h(Code,null,"# slime/slime/utils/routing_replay.py（对照基准，路径在 slime 仓库）\nclass RoutingReplay:\n    def record(self, top_indices):\n        buf = torch.empty_like(top_indices, device=\"cpu\", pin_memory=True)\n        buf.copy_(top_indices)\n        self.top_indices_list.append(buf)\n    def pop_forward(self):\n        top_indices = self.top_indices_list[self.forward_index]\n        self.forward_index += 1\n        return top_indices.to(torch.cuda.current_device())"),
      h("h4",null,"miles 的实现：utils/replay_base.py（服务化、可校验、可扩展）"),
      h("p",null,"miles 把这套机制重写为 ",h("code",null,"BaseReplayManager")," 抽象，并实例化两个具体管理器：",h("code",null,"RoutingReplayManager")," （MoE 专家路由）与 ",h("code",null,"IndexerReplayManager")," （为带 indexer 的层重放 KV 位置，服务 DeepSeek-V3.2 这类稀疏注意力）。三处关键演进："),
      h("ul",null,
        h("li",null,h("strong",null,"以对象状态取代环境变量"),"：阶段切换是管理器的 ",h("code",null,"stage")," 字段（",h("code",null,"_set_replay_stage"),"），不再依赖进程级环境变量，多个 replay 类型可独立开关。"),
        h("li",null,h("strong",null,"推理侧路由作为数据源（rollout routing replay）"),"：rollout 请求带上 ",h("code",null,"return_routed_experts=True"),"，SGLang 把每个 token 实际选中的专家以 base64 回传，",h("code",null,"sglang_rollout.py")," 解码为 ",h("code",null,"sample.rollout_routed_experts"),"，训练时通过 ",h("code",null,"fill_replay_data")," 把它填进每个 MoE 模块的 ",h("code",null,"Replay"),"，再以 replay_forward / replay_backward 强制训练侧采用推理侧的专家选择。这才是 R3（arXiv 2510.11370）相对 slime 进程内重放的本质区别：消除的是“训练与推理之间”的失配，而非仅“同一训练步内”的失配。"),
        h("li",null,h("strong",null,"内置 CI 校验"),"：",h("code",null,"check_replay_result")," 逐 token 度量训练引擎重算的 top-k 与重放 top-k 的集合重叠，超过 ",h("code",null,"replay_check_max_mismatch_fraction")," 即抛错。它用成员掩码（membership mask）的 ",h("code",null,"scatter_")," + ",h("code",null,"gather")," 避免 O(n·topk²) 的全配对张量，使校验可常驻 CI。")
      ),
      h(Code,null,"# miles/utils/replay_base.py: 由 stage 驱动的 topk 包装\ndef new_topk_fn(scores, topk, *args, **kwargs):\n    if not manager.enabled:\n        return old_topk_fn(scores, topk, *args, **kwargs)\n    stage = manager.stage\n    replay = manager.get_current()\n    if stage == \"fallthrough\":\n        return old_topk_fn(scores, topk, *args, **kwargs)\n    elif stage == \"record\":\n        result = old_topk_fn(scores, topk, *args, **kwargs)\n        top_indices = result[1] if return_probs else result\n        replay.record(top_indices)\n        return result\n    elif stage == \"replay_forward\":\n        return _get_replay_result(replay.pop_forward(), scores, topk, *args, **kwargs)\n    elif stage == \"replay_backward\":\n        return _get_replay_result(replay.pop_backward(), scores, topk, *args, **kwargs)"),
      h(Code,null,"# miles/rollout/sglang_rollout.py: 请求推理侧回传专家路由\nif args.use_rollout_routing_replay:\n    payload[\"return_routed_experts\"] = True\n# ... 收到响应后\nif \"routed_experts\" in output[\"meta_info\"]:\n    sample.rollout_routed_experts = np.frombuffer(\n        pybase64.b64decode(output[\"meta_info\"][\"routed_experts\"].encode(\"ascii\")),\n        dtype=np.int32,\n    ).reshape(len(sample.tokens) - 1, args.num_layers, ...)"),
      h("p",null,"路由重放在训练步中的编排见 ",h("code",null,"actor.py"),"：所有 replay 管理器在 ",h("code",null,"setup")," 时按 ",h("code",null,"use_{name}_replay")," 决定是否启用并在 CI 模式下打开校验；计算 ref / teacher 的 log-prob 时强制 ",h("code",null,"fallthrough"),"（这些前向不参与重放），计算 actor 的 forward 时切到 ",h("code",null,"record")," 或 ",h("code",null,"replay_forward"),"，backward 时切到 ",h("code",null,"replay_backward"),"。"),
      h("div",null,h("a",{className:"src",href:"vscode://file/Users/xinyu/Code/Agentic-RL/slime/slime/utils/routing_replay.py:13",title:"slime/slime/utils/routing_replay.py:13"},"slime RoutingReplay（对照）"),h(Src,{label:"miles Replay",path:"miles/utils/replay_base.py",line:14}),h(Src,{label:"BaseReplayManager",path:"miles/utils/replay_base.py",line:53}),h(Src,{label:"get_topk_fn",path:"miles/utils/replay_base.py",line:87}),h(Src,{label:"check_replay_result",path:"miles/utils/replay_base.py",line:158}),h(Src,{label:"RoutingReplayManager",path:"miles/utils/replay_base.py",line:215}),h(Src,{label:"IndexerReplayManager",path:"miles/utils/replay_base.py",line:224}),h(Src,{label:"rollout 记录专家",path:"miles/rollout/sglang_rollout.py",line:178}),h(Src,{label:"actor 重放阶段",path:"miles/backends/megatron_utils/actor.py",line:323}),h(Ext,{href:"https://arxiv.org/pdf/2510.11370"},"R3 论文 2510.11370"),h(Ext,{href:"https://miles.radixark.com/docs"},"miles 文档"))
    );

  // ===== true_on_policy/：消除 train-infer 失配 =====
  function TrueOnPolicySection(){
    return h("div",null,
      h("p",null,"R3 把专家选择确定下来，但失配的来源还有 attention kernel、RoPE/SwiGLU 的融合算子、TP 全归约的累加顺序、prefill 与 decode 路径的数值差异。",h("code",null,"miles/true_on_policy/")," 子包的目标是把 SGLang（推理）与 Megatron 或 FSDP（训练）在算子层面统一到逐位一致，使训练所用的 log-prob 与生成时的 log-prob 完全相同，从而把策略真正变成 on-policy。这是一个跨仓库的“启动契约（launch contract）”：从一个公开开关 ",h("code",null,"--true-on-policy"),"，推导出训练侧、推理侧、环境变量三组配置。"),
      h("h3",null,"为什么失配会破坏 RL"),
      h("p",null,"策略梯度依赖重要性采样比 ",h("code",null,"r = π_train / π_rollout"),"。理想情形下生成与训练用同一组参数，比值恒为 1。但当推理与训练的前向数值不一致时，即使参数相同，",h("code",null,"r")," 也会偏离 1，引入有偏梯度。"),
      h(Formula,{cap:"逐位一致使重要性比退化为 1，梯度无偏"},"$$ r_t=\\frac{\\pi_{\\theta}^{\\text{train}}(a_t\\mid s_t)}{\\pi_{\\theta}^{\\text{rollout}}(a_t\\mid s_t)} \\;\\xrightarrow[\\text{bit-wise identical}]{}\\; 1 \\quad\\Longrightarrow\\quad \\nabla_\\theta J=\\mathbb{E}\\big[r_t\\,A_t\\,\\nabla_\\theta\\log\\pi_\\theta\\big]\\ \\text{unbiased} $$"),
      h("h3",null,"分层契约：schema → contract → profile → config → launch plan"),
      h("p",null,"这个子包刻意把“声明”与“执行”分开，用五个不可变 dataclass 表达一条契约，避免在脚本里散落魔法字符串："),
      h("ul",null,
        h("li",null,h("code",null,"schema.py"),"：最底层的声明式标识 ",h("code",null,"TrueOnPolicyContractSchema"),"，记录契约名、模型族、所需 kernel 契约、log-prob 契约（如 ",h("code",null,"sglang_prefill"),"）、SGLang attention 后端（如 ",h("code",null,"fa3"),"）、FSDP attention 实现（如 ",h("code",null,"flash_attention_3"),"）。当前内置 ",h("code",null,"qwen3_dense_true_on_policy_v1"),"。"),
        h("li",null,h("code",null,"contracts.py"),"：",h("code",null,"TrueOnPolicyContract")," 包装 schema，并据训练后端与 SGLang 目标推导 kernel 策略关键字（",h("code",null,"kernel_policy_kwargs_for"),"），例如 Megatron 后端要求确定性训练、禁用 RoPE 融合、禁用 bias-SwiGLU 融合、开启 batch-invariant。"),
        h("li",null,h("code",null,"model_profiles.py"),"：",h("code",null,"TrueOnPolicyModelProfile")," 把契约绑定到具体模型名与 Megatron model type，声明支持的训练并行布局（dp/tp/pp/ulysses_cp）与 rollout 布局，并提供能力查询（是否支持 Ulysses CP、是否支持 TP-invariant）。"),
        h("li",null,h("code",null,"config.py"),"：从命令行参数派生 ",h("code",null,"TrueOnPolicyConfig"),"，做一致性校验（契约模型族与 profile 是否匹配、后端是否支持、PP/CP 是否在支持列表内），再 ",h("code",null,"build_launch_plan")," 组装出 ",h("code",null,"TrueOnPolicyLaunchPlan"),"。")
      ),
      h(Code,null,"# miles/true_on_policy/config.py: 由开关派生 kernel 策略\ndef kernel_policy_kwargs_for(self, *, train_backend, sglang_target):\n    uses_megatron = train_backend == \"megatron\"\n    uses_tp_invariant_rollout = sglang_target == \"fsdp_tp\"\n    return {\n        \"deterministic_inference\": True,\n        \"deterministic_training\": True,\n        \"sglang_attention_backend\": self.sglang_attention_backend,  # fa3\n        \"megatron_uses_sglang_backend\": uses_megatron,\n        \"disable_rope_fusion\": uses_megatron,\n        \"disable_bias_swiglu_fusion\": uses_megatron,\n        \"batch_invariant_mode\": uses_megatron,\n        \"tp_invariant_row_linear\": uses_tp_invariant_rollout,\n        \"deterministic_tp_allreduce\": uses_tp_invariant_rollout,\n    }"),
      h("p",null,"启动计划最终落成三组命令行参数与一组环境变量。SGLang 侧加 ",h("code",null,"--sglang-enable-deterministic-inference")," 与 ",h("code",null,"--sglang-attention-backend fa3"),"；Megatron 侧加 ",h("code",null,"--true-on-policy-contract"),"、",h("code",null,"--transformer-impl local"),"、",h("code",null,"--no-bias-swiglu-fusion"),"、",h("code",null,"--no-rope-fusion"),"、",h("code",null,"--batch-invariant-mode"),"；miles 侧统一加 ",h("code",null,"--deterministic-mode"),"、",h("code",null,"--true-on-policy-mode"),"、",h("code",null,"--recompute-logprobs-via-prefill"),"。环境变量则固定 ",h("code",null,"NCCL_ALGO=Ring"),"、",h("code",null,"NVTE_ALLOW_NONDETERMINISTIC_ALGO=0"),"、",h("code",null,"CUBLAS_WORKSPACE_CONFIG=:4096:8"),"，确保 NCCL 全归约与 cuBLAS 工作区的确定性。"),
      h(Code,null,"# miles/true_on_policy/config.py: build_env_vars\ndef build_env_vars(self):\n    return {\n        \"NCCL_ALGO\": os.environ.get(\"NCCL_ALGO\", \"Ring\"),\n        \"NVTE_ALLOW_NONDETERMINISTIC_ALGO\": \"0\",\n        \"CUBLAS_WORKSPACE_CONFIG\": \":4096:8\",\n    }"),
      h("div",{className:"note"},"为什么用 ",h("code",null,"--recompute-logprobs-via-prefill"),"：部分模型的 prefill 与 decode kernel 数值不一致，rollout 在 decode 路径下生成的 log-prob 与训练（等价于 prefill）算出的不同。重算改走 prefill 即可统一二者，对应 ",h("code",null,"arguments.py")," 的同名开关。",h("code",null,"--true-on-policy-mode")," 是 true-on-policy 的总开关，见 ",h("code",null,"arguments.py")," 第 154 行。"),
      h("h3",null,"算法层兜底：当失配无法消除时（TIS / MIS）"),
      h("p",null,"逐位一致是系统层的理想，但并非所有模型 / 布局都能达成（MoE 上仍在推进，见 README Roadmap）。失配不可避免时，miles 在损失层提供重要性采样修正。",h("code",null,"corrections.py")," 的 ",h("code",null,"vanilla_tis_function")," 实现截断重要性采样（Truncated Importance Sampling, TIS）：把 ",h("code",null,"exp(train - rollout)")," 截断到 ",h("code",null,"[tis_clip_low, tis_clip]")," 后乘进 ",h("code",null,"pg_loss"),"；",h("code",null,"icepop_function")," 则采用 clip-or-pop 策略，把超出区间的 token 直接置零。",h("code",null,"--custom-tis-function-path")," 允许接入自定义的 MIS（Masked Importance Sampling）实现，示例见 ",h("code",null,"examples/train_infer_mismatch_helper/mis.py"),"。"),
      h(Formula,{cap:"TIS：截断重要性比并乘入策略梯度损失（vanilla_tis_function）"},"$$ w_t=\\operatorname{clip}\\!\\Big(\\exp\\big(\\log\\pi^{\\text{train}}_t-\\log\\pi^{\\text{rollout}}_t\\big),\\ c_{\\text{low}},\\ c_{\\text{high}}\\Big),\\qquad \\mathcal{L}_{\\text{pg}}\\leftarrow w_t\\cdot\\mathcal{L}_{\\text{pg}} $$"),
      h("div",null,h(Src,{label:"schema.py",path:"miles/true_on_policy/schema.py",line:13}),h(Src,{label:"contracts.py",path:"miles/true_on_policy/contracts.py",line:15}),h(Src,{label:"kernel_policy_kwargs_for",path:"miles/true_on_policy/contracts.py",line:49}),h(Src,{label:"model_profiles.py",path:"miles/true_on_policy/model_profiles.py",line:10}),h(Src,{label:"TrueOnPolicyConfig",path:"miles/true_on_policy/config.py",line:138}),h(Src,{label:"build_launch_plan",path:"miles/true_on_policy/config.py",line:204}),h(Src,{label:"--true-on-policy-mode",path:"miles/utils/arguments.py",line:153}),h(Src,{label:"--recompute-logprobs-via-prefill",path:"miles/utils/arguments.py",line:159}),h(Src,{label:"vanilla_tis_function",path:"miles/backends/training_utils/loss_hub/corrections.py",line:7}),h(Src,{label:"icepop_function",path:"miles/backends/training_utils/loss_hub/corrections.py",line:35}),h(Src,{label:"--use-tis",path:"miles/utils/arguments.py",line:1031}),h(Src,{label:"MIS 示例",path:"examples/train_infer_mismatch_helper/mis.py",line:1}),h(Ext,{href:"https://fengyao.notion.site/off-policy-rl"},"off-policy RL 笔记"))

  // ===== 低精度全栈：统一 FP8 与 INT4 W4A16 QAT =====

      h("p",null,"为什么这能稳定训练：FP8（e4m3）的动态范围有限，量化误差对 scale 的分块策略敏感。若训练侧用一种分块、推理侧用另一种，等价于两侧在不同的权重上做前向，重要性比再次失真。统一到同一套 ue8m0 / per-block 逻辑后，权重在两侧逐位一致，与 true-on-policy 的目标互补：true-on-policy 统一算子，统一 FP8 统一权重量化。miles README 称其为“首个实现端到端 FP8 采样与训练”的框架。"),

      h("p",null,"实现是“全栈”的：训练时用一个 CUDA 伪量化（fake-quant）kernel 在前向中模拟 INT4 的取整误差，使模型在训练阶段就适应量化噪声（这正是 QAT 与训练后量化的区别）。kernel 在 ",h("code",null,"kernels/int4_qat/fake_int4_quant_cuda.cu")," 中，按 ",h("code",null,"[1, 32]")," 分块做对称（除以 7）或非对称（除以 15）量化，用 warp 级 ",h("code",null,"__shfl_xor_sync")," 归约求每块的 max / min 得到 scale 与 zero point。",h("code",null,"setup.py")," 按本机 GPU 架构编译，并固定附带 ",h("code",null,"sm_90a"),"（Hopper）。"),
