  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 1 课</p><h1>地基与双引擎全局观</h1><p>能访问 CDN 时切换为交互版。本课讲清 slime 的设计哲学（Megatron 训练 + SGLang rollout + Data Buffer 三者同流），两个训练入口 train.py 与 train_async.py 的同步与异步骨架，Ray 作为编排基座的角色，以及 slime/utils 下的非 RL 工具箱。</p></main></div>

      h("p",null,"读 slime 之前，先建立一张全局图。slime 是一个面向强化学习扩展（RL scaling）的大模型后训练框架，把两件事放进同一套数据流里：用 ",h("strong",{className:"hl-purple"},"Megatron-Core")," 做训练（参数更新），用 ",h("strong",{className:"hl-teal"},"SGLang")," 做 rollout（推理与采样），中间用 ",h("strong",{className:"hl-amber"},"Data Buffer")," 作为桥接模块管理 prompt 初始化、自定义数据与生成方法。三者共用同一条 training / rollout / Data Buffer 路径，不退化成彼此割裂的训练器、推理服务与 agent 框架的堆叠。"),

      h("p",null,"slime 之所以被称为经过大规模训练检验（battle-tested）的框架，是因为它是 ",h(Ext,{href:"https://z.ai/blog/glm-5.2"},"GLM-5.2"),"、GLM-5.1、GLM-5、GLM-4.x 系列模型背后的 RL 框架，验证的是完整的后训练循环，而非孤立的示例脚本。除 GLM 系列外，它还支持 Qwen3.x、DeepSeek V3 系列与 Llama 3。"),

  const ENTRY=[
    {key:"common",name:"两者共享的前半段",render:function(){return [

      h(Code,null,"# train.py 主循环 (略作精简)\nfor rollout_id in range(args.start_rollout_id, args.num_rollout):\n    if args.eval_interval is not None and rollout_id == 0 and not args.skip_eval_before_train:\n        ray.get(rollout_manager.eval.remote(rollout_id))\n\n    # 1) 生成本步 rollout 数据\n    rollout_data_ref = ray.get(rollout_manager.generate.remote(rollout_id))\n\n    # 2) 训练一步 (actor, 可选 critic)\n    if args.use_critic:\n        value_refs = critic_model.async_train(rollout_id, rollout_data_ref)\n        ...\n    else:\n        ray.get(actor_model.async_train(rollout_id, rollout_data_ref))\n\n    if should_run_periodic_action(rollout_id, args.save_interval, num_rollout_per_epoch, args.num_rollout):\n        save(rollout_id)\n\n    # 3) 把训练后的权重同步给 rollout\n    actor_model.update_weights()\n\n    if should_run_periodic_action(rollout_id, args.eval_interval, num_rollout_per_epoch):\n        ray.get(rollout_manager.eval.remote(rollout_id))"),

      h(Code,null,"# train_async.py: 不支持 colocate\nassert not args.colocate, \"Colocation is not supported for async training.\"\n...\n# 先发起第一步的生成\nrollout_data_next_future = rollout_manager.generate.remote(args.start_rollout_id)\nfor rollout_id in range(args.start_rollout_id, args.num_rollout):\n    # 取回上一次发起的生成结果\n    if rollout_data_next_future is not None:\n        rollout_data_curr_ref = ray.get(rollout_data_next_future)\n\n    # 提前发起下一步的生成 (与本步训练重叠)\n    if rollout_id + 1 < args.num_rollout:\n        rollout_data_next_future = rollout_manager.generate.remote(rollout_id + 1)\n\n    # 用当前数据训练一步\n    ray.get(actor_model.async_train(rollout_id, rollout_data_curr_ref))\n    ...\n    # 按 update_weights_interval 周期性同步权重\n    if (rollout_id + 1) % args.update_weights_interval == 0:\n        # 同步权重前先把在途生成取回, 避免在生成中途更新权重\n        rollout_data_curr_ref = ray.get(x) if (x := rollout_data_next_future) is not None else None\n        rollout_data_next_future = None\n        actor_model.update_weights()"),
