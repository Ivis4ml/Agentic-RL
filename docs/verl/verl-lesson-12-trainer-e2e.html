  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 12 课</p><h1>PPO Trainer 主循环与端到端</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 的训练主循环：RayPPOTrainer 与 v1 PPOTrainer 的构造与 fit()，一次 PPO 步的完整控制流（取批、生成、计算 old/ref log-prob 与 value、估计 advantage、更新 critic 与 actor、记录指标），奖励计算、指标统计、checkpoint 管理与 checkpoint engine、模型合并导出 HF，并把第 1 至 11 课串成一条端到端数据流。</p></main></div>
