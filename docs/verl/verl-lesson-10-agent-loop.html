  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 10 课</p><h1>Agent Loop（Agentic RL）</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 的 Agent Loop：如何驱动一次多轮、带工具调用的 agent rollout，异步并发地与第 9 课的推理服务交互，产出可训练轨迹（token 序列加 response_mask）；single_turn 与 tool_agent 两种循环的区别；工具解析与注册执行；以及 reward_loop 的异步奖励计算。它也是承载 tau2 类任务的位置。</p></main></div>
