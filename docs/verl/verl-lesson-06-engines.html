  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 6 课</p><h1>训练引擎抽象与多后端</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 的统一训练引擎抽象 BaseEngine（前向反向、优化器步进、分片、checkpoint 的接口），FSDP2 与 Megatron 两套主力后端的分片与并行实现，损失跨数据并行的归一化与跨分片梯度裁剪的分布式正确性，以及融合 kernel 的设计。</p></main></div>

  // ===== 统一抽象 BaseEngine =====
  function AbstractSection(){const ref=useTypeset("abs");

      h("p",null,"前几课已经建立了三层概念：",h("code",null,"DataProto")," 是数据契约（第 2 课），混合控制器把单进程的算法脚本广播到一组 worker 上（第 3 课），",h("code",null,"core_algos")," 提供 PPO/GRPO 等损失与优势的纯数学函数（第 5 课）。本课处理的是这套体系的承重层：一个 worker 拿到一批数据后，究竟由谁来执行“前向得到 logits、按损失函数反向、裁剪梯度、优化器步进、把分片权重导出给推理引擎”。这件事被统一收敛到一个抽象基类 ",h("strong",{className:"hl-teal"},"BaseEngine"),"。"),

      h("h3",null,"问题：每个 DP rank 拿到的有效 token 数不同"),

      h(Code,null,"# forward_backward_batch 开头（FSDP 与 Megatron 一致）\nbatch_num_tokens = data[\"loss_mask\"].sum().to(device)\ntorch.distributed.all_reduce(            # 跨 DP 求全局有效 token 数\n    batch_num_tokens, op=ReduceOp.SUM, group=self.get_data_parallel_group())\ntu.assign_non_tensor(data, batch_num_tokens=batch_num_tokens.item())\ntu.assign_non_tensor(data, dp_size=self.get_data_parallel_size())"),
