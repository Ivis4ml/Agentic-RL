<body>
  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 8 课</p><h1>Rollout 引擎与多推理后端</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 的 rollout 子系统：统一的 BaseRollout 抽象与 AsyncRolloutRequest 数据结构、tokenizer 与 chat template 处理、vLLM / SGLang / TensorRT-LLM / HF / naive 五个推理后端如何生成序列并与训练侧共置，以及权重同步的核心机制（分桶 IPC 传输与参数/缓冲区拆分），最后是 RolloutReplica 的副本管理。</p></main></div>

  // ===== 全局观：rollout 子系统在 verl 中的位置 =====
  function OverviewSection(){
    return h("div",null,
      h("p",null,"在 PPO 这类策略梯度算法里，每一步训练都需要先用当前策略采样轨迹（rollout），再用这些轨迹算优势、更新参数。采样本质上是大批量的自回归推理，它的吞吐直接决定整个 RL 训练的速度。因此 verl 把 rollout 单独抽象成一个子系统，并允许接入不同的推理引擎。本课覆盖的目录是 ",h("code",null,"verl/workers/rollout/"),"。"),
      h("p",null,"理解这一层的关键在于区分三类对象，它们各司其职，不要混淆："),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"Rollout / ServerAdapter"),"客户端适配器"),
          h("p",null,"驻留在训练进程（hybrid worker）内的薄客户端，继承 ",h("code",null,"BaseRollout"),"。它本身不持有推理引擎，而是通过 Ray actor 句柄或 HTTP 客户端向真正的推理服务发请求，负责 ",h("code",null,"resume"),"/",h("code",null,"release"),"/",h("code",null,"update_weights")," 三类控制方法。")
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill purple"},"RolloutReplica"),"副本管理器"),
          h("p",null,"一个 replica 是一台逻辑上的推理服务实例，可能横跨多个节点。",h("code",null,"RolloutReplica")," 负责按 hybrid / colocated / standalone 三种模式拉起底层 HTTP server，并暴露 ",h("code",null,"wake_up"),"/",h("code",null,"sleep"),"/",h("code",null,"clear_kv_cache")," 等集合操作。第 9 课承接它的 server 细节。")
        )
      ),
      h("p",null,"第三类是真正的推理后端（vLLM、SGLang、TensorRT-LLM 引擎本身），它们运行在独立的 server actor 进程里，由 replica 拉起。本课讲清前两类如何把训练侧、推理侧、权重同步三者衔接起来，并对比五个后端各自的生成实现。"),

        h(Src,{label:"workers/rollout/",path:"verl/workers/rollout/base.py"}),

  // ===== base.py：统一接口与注册表 =====
  function BaseSection(){
    return h("div",null,
      h("p",null,h("code",null,"base.py")," 定义了所有 rollout 的最小公共契约 ",h("code",null,"BaseRollout"),"。它是一个抽象基类，只规定四件事：构造时把配置转为 dataclass（",h("code",null,"omega_conf_to_dataclass"),"），以及三个异步抽象方法 ",h("code",null,"resume"),"、",h("code",null,"update_weights"),"、",h("code",null,"release"),"。注意这三个方法都是 ",h("code",null,"async")," 的，因为 server 模式下它们要通过网络或 IPC 与独立的推理进程通信。"),
      h(Code,null,"class BaseRollout(ABC):\n    def __init__(self, config, model_config, device_mesh, *args, **kwargs):\n        self.config = omega_conf_to_dataclass(config)\n        self.model_config = omega_conf_to_dataclass(model_config)\n        self.device_mesh = device_mesh\n\n    @abstractmethod\n    async def resume(self, tags: list[str]): ...      # 把权重/kv_cache 恢复进显存\n\n    @abstractmethod\n    async def update_weights(self, weights, **kwargs): ...  # 训练权重推给推理引擎\n\n    @abstractmethod\n    async def release(self): ...                       # 释放权重与 kv_cache 显存\n\n    def generate_sequences(self, prompts: DataProto) -> DataProto:\n        raise NotImplementedError                      # 同步批量生成 (仅 HF/naive)"),
      h("p",null,"这里有一处设计上的分叉值得指出：",h("code",null,"generate_sequences")," 是同步的、不是抽象方法，默认抛 ",h("code",null,"NotImplementedError"),"。它代表早期的 SPMD（单程序多数据）生成路径，即每个训练 rank 在自己进程内直接驱动推理。如今主流的 vLLM / SGLang / TRT-LLM 后端都走 server 模式，生成由 server 进程完成、训练侧只发请求，因此它们的 ",h("code",null,"generate_sequences")," 直接抛错（见 ",h("code",null,"vllm_rollout.py:206"),"）。只有 HF 与 naive 两个后端仍实现它，用于单卡调试与教学。"),
      h("h3",null,"为什么需要 resume / release：显存的时分复用"),
      h("p",null,"在共置（colocate / hybrid）部署里，训练引擎与推理引擎共用同一批 GPU。训练时需要优化器状态、梯度、激活值占满显存；采样时又需要 KV cache 占满显存。两者无法同时存在，于是引入显存的时分复用：采样前 ",h("code",null,"resume")," 把推理权重和 KV cache 唤醒进显存，采样后 ",h("code",null,"release")," 把它们释放（vLLM 称为 sleep，SGLang 称为 release_memory_occupation），腾出空间给训练。",h("code",null,"tags")," 参数区分唤醒/释放的是 ",h("code",null,'"weights"')," 还是 ",h("code",null,'"kv_cache"'),"，因为 LoRA 等场景只需换 KV cache 而保留基座权重。"),
      h("h3",null,"注册表：按 (后端名, 模式) 动态解析类"),
      h("p",null,"verl 不在 import 时静态依赖任何推理引擎，而是用一张字符串注册表延迟加载。",h("code",null,"get_rollout_class")," 根据 ",h("code",null,"(rollout_name, mode)")," 查表得到全限定类名，再用 ",h("code",null,"importlib")," 动态导入。这样未安装 vLLM 的环境也能 import verl，只在真正用到某后端时才触发其依赖。"),
      h(Code,null,"_ROLLOUT_REGISTRY = {\n    (\"vllm\", \"async\"):   \"verl.workers.rollout.vllm_rollout.ServerAdapter\",\n    (\"sglang\", \"async\"): \"verl.workers.rollout.sglang_rollout.sglang_rollout.ServerAdapter\",\n    (\"trtllm\", \"async\"): \"verl.workers.rollout.trtllm_rollout.trtllm_rollout.ServerAdapter\",\n}\n\ndef get_rollout_class(rollout_name, mode=\"async\"):\n    fqdn = _ROLLOUT_REGISTRY[(rollout_name, mode)]\n    module_name, class_name = fqdn.rsplit(\".\", 1)\n    return getattr(importlib.import_module(module_name), class_name)"),
      h("p",null,"注意三个后端注册的都是名为 ",h("code",null,"ServerAdapter")," 的类，且 mode 只有 ",h("code",null,'"async"'),"。这正是前文所说的：SPMD 同步模式（PR #4411）已被移除，所有生产后端统一走 server 模式，ServerAdapter 充当客户端。HF 与 naive 走另一条同步路径，不进这张表。"),
      h("div",null,
        h(Src,{label:"BaseRollout",path:"verl/workers/rollout/base.py",line:29}),
        h(Src,{label:"resume / update_weights / release",path:"verl/workers/rollout/base.py",line:44}),
        h(Src,{label:"generate_sequences",path:"verl/workers/rollout/base.py",line:71}),
        h(Src,{label:"_ROLLOUT_REGISTRY",path:"verl/workers/rollout/base.py",line:83}),
        h(Src,{label:"get_rollout_class",path:"verl/workers/rollout/base.py",line:90}))
    );
  }

  // ===== schemas.py：AsyncRolloutRequest =====
  function SchemasSection(){
    return h("div",null,

  // ===== 权重同步：分桶 IPC 传输 =====
  function WeightSyncSection(){
    return h("div",null,
      h("p",null,"权重同步是异步 RL 效率的核心之一：训练一步后，必须把更新后的参数推给推理引擎，否则采样仍用旧策略。难点在于一个数十亿乃至上千亿参数的模型，其权重总量可能达数百 GB，若一次性物化到一块连续显存再传，显存峰值会爆。verl 的解法是分桶传输（bucketing）：把权重切成固定大小的桶逐个传，把显存峰值压到一个桶的大小。"),
      h("h3",null,"发送端：BucketedWeightSender"),
      h("p",null,h("code",null,"bucketed_weight_transfer.py")," 用 ZMQ（REQ/REP）+ CUDA IPC 实现发送端。它先分配一块 ",h("code",null,"bucket_size")," 大小的 uint8 通信缓冲区，把 IPC 句柄发给接收端；随后遍历权重生成器，把张量按字节拷进缓冲区，攒满一个桶就发一次、等接收端确认（",h("code",null,"socket.recv()"),"），清空再攒下一桶。"),
      h(Code,null,"async def async_send_weights(self, weights):\n    self._init_socket(); self._init_buffer()           # 建 ZMQ + 共享通信缓冲区\n    offset, bucket_meta = 0, {}\n    async for name, weight in ensure_async_iterator(weights):\n        if offset + weight.nbytes > self.bucket_size and len(bucket_meta) > 0:\n            get_torch_device().synchronize()\n            self.socket.send_pyobj({\"bucket_meta\": bucket_meta, \"is_last\": False})\n            self.socket.recv()                          # 等接收端把这桶加载完\n            bucket_meta, offset = {}, 0                  # 复用同一块缓冲区, 显存峰值 = 1 桶\n        if offset + weight.nbytes > self.bucket_size:   # 单个权重比桶还大\n            self._direct_send_large_weight(name, weight)   # 直传它自己的 IPC 句柄\n            continue\n        bucket_meta[name] = {\"name\": name, \"shape\": weight.shape, \"dtype\": weight.dtype,\n                             \"offset\": offset, \"handle\": None}\n        self.buffer[offset:offset+weight.nbytes].copy_(weight.view(-1).view(torch.uint8), non_blocking=True)\n        offset += weight.nbytes\n    get_torch_device().synchronize()\n    self.socket.send_pyobj({\"bucket_meta\": bucket_meta, \"is_last\": True})  # 收尾桶\n    self.socket.recv()"),
      h("p",null,"几个设计要点：第一，发送端与接收端共用同一块 IPC 缓冲区，每桶只是把数据拷进同一段显存再通知对方读取，因此整个传输过程的额外显存峰值恒定为一个桶（默认见 ",h("code",null,"update_weights_bucket_megabytes"),"，2048 MB），与模型总参数量无关。第二，注释明确不强制 cast 权重 dtype，因为 MoE gate 等参数必须保持 fp32；让接收端按需转换，避免凭空放大传输量。第三，对比单个桶还大的权重（如超大词表 embedding），退回 ",h("code",null,"_direct_send_large_weight"),"，单独 ",h("code",null,"reduce_tensor")," 直传它自己的 IPC 句柄。"),
      h(Formula,{cap:"分桶传输的显存峰值与桶数：峰值由桶大小决定, 与模型总量解耦"},"$$ \\text{peak\\_mem} \\approx \\text{bucket\\_size},\\qquad n_{\\text{buckets}} = \\left\\lceil \\frac{\\sum_i \\text{nbytes}(w_i)}{\\text{bucket\\_size}} \\right\\rceil $$"),
      h("h3",null,"接收端：BucketedWeightReceiver"),
      h("p",null,"接收端用 ZMQ REP socket，循环 ",h("code",null,"recv_pyobj")," 取每桶元数据，按 ",h("code",null,"offset")," / ",h("code",null,"shape")," / ",h("code",null,"dtype")," 从共享缓冲区切出张量视图，交给回调 ",h("code",null,"on_bucket_received")," 处理（即加载进推理模型），加载完同步并回 ACK，直到 ",h("code",null,"is_last"),"。它运行在推理引擎进程内（如 vLLM worker 的 ",h("code",null,"update_weights_from_ipc"),"）。"),
      h(Code,null,"def receive_weights(self, on_bucket_received):\n    self._init_socket(); self._init_buffer()   # 从发送端 rebuild IPC 缓冲区\n    while True:\n        metadata = self.socket.recv_pyobj()\n        weights = []\n        for name, meta in metadata[\"bucket_meta\"].items():\n            if meta[\"handle\"] is not None:                      # 超大权重: 直接 rebuild\n                weights.append((name, rebuild_ipc(meta[\"handle\"], self.device.index))); continue\n            size = meta[\"dtype\"].itemsize * meta[\"shape\"].numel()\n            tensor = self.buffer[meta[\"offset\"]:meta[\"offset\"]+size].view(dtype=meta[\"dtype\"]).view(meta[\"shape\"])\n            weights.append((name, tensor))\n        on_bucket_received(weights)            # 加载进推理模型\n        get_torch_device().synchronize()\n        self.socket.send(b\"\")                   # ACK, 通知发送端可复用缓冲区\n        if metadata[\"is_last\"]: break"),
      h("p",null,"REQ/REP 的一来一回是关键的流控：发送端必须等接收端 ACK 才能复用缓冲区写下一桶，从而保证「写入」与「读取」不会在同一块共享显存上竞争。文件顶部注释提示这套机制刻意不依赖 vLLM 内部 API，因此可在不同后端复用。",h("code",null,"use_shm")," 路径用于不支持 CUDA IPC 的设备（如部分 Ascend NPU），改用主机共享内存。"),
      h("div",null,
        h(Src,{label:"BucketedWeightSender",path:"verl/workers/rollout/vllm_rollout/bucketed_weight_transfer.py",line:74}),
        h(Src,{label:"async_send_weights",path:"verl/workers/rollout/vllm_rollout/bucketed_weight_transfer.py",line:103}),
        h(Src,{label:"_direct_send_large_weight",path:"verl/workers/rollout/vllm_rollout/bucketed_weight_transfer.py",line:216}),
        h(Src,{label:"BucketedWeightReceiver",path:"verl/workers/rollout/vllm_rollout/bucketed_weight_transfer.py",line:233}),
        h(Src,{label:"receive_weights",path:"verl/workers/rollout/vllm_rollout/bucketed_weight_transfer.py",line:261}),

  function WeightUtilsSection(){
    return h("div",null,
      h("p",null,h("code",null,"weight_update_utils.py")," 解决一个细节但重要的正确性问题：模型里既有可训练参数（",h("code",null,"named_parameters"),"），也有不可训练的缓冲区（",h("code",null,"named_buffers"),"，如 RoPE 的频率表、BatchNorm 的 running stats、某些注意力的 sliding window mask）。训练侧推过来的权重流里两者混在一起，但它们在推理引擎里的加载方式不同：参数走引擎的 ",h("code",null,"load_weights"),"，缓冲区必须原地 ",h("code",null,"copy_"),"。"),
      h(Code,null,"def split_buffer_updates(model, weights):\n    named_buffers = dict(model.named_buffers())\n    param_updates, buffer_updates = [], []\n    for name, tensor in weights:\n        (buffer_updates if name in named_buffers else param_updates).append((name, tensor))\n    return param_updates, buffer_updates, named_buffers\n\n@torch.no_grad()\ndef apply_buffer_updates(model, buffer_updates, named_buffers=None):\n    for name, tensor in buffer_updates:\n        target = named_buffers[name]\n        if target.shape != tensor.shape:                 # 形状不符直接报错, 防止静默错配\n            raise ValueError(f\"Buffer shape mismatch for {name}: ...\")\n        target.copy_(tensor.to(device=target.device, dtype=target.dtype))   # 原地拷贝"),
      h("p",null,"调用点在接收端 ",h("code",null,"_update_weights")," 里：每收到一桶，就先 ",h("code",null,"split_buffer_updates")," 把这桶拆成参数更新与缓冲区更新，参数交给 vLLM 模型的 ",h("code",null,"load_weights"),"，缓冲区交给 ",h("code",null,"apply_buffer_updates")," 原地拷贝。后者还会同步到所有副本模型（如 MTP drafter 草稿模型，见 ",h("code",null,"_apply_buffer_updates_all_models"),"）。",h("code",null,"named_buffers")," 在拆分时已构建，传给 apply 复用、避免重复遍历。"),
