  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 7 课</p><h1>Workers 与角色</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 如何把第 6 课的训练引擎包装成可被单控制器编排的 Ray worker：TrainingWorker 作为引擎外壳，ActorRolloutRefWorker 作为同一组 GPU 上承载 actor、rollout 与 ref 的共置 worker，以及 @register 注解的 dispatch 模式如何决定数据切分与收集。</p></main></div>

  // ===== 概览：worker 这一层在做什么 =====
  function OverviewSection(){
    return h("div",null,
      h("p",null,"回顾前几课的分工：第 3 课讲了单控制器（single controller），即一个驱动进程通过 ",h("code",null,"RayWorkerGroup")," 用一行远程调用驱动一整组 GPU worker，并由 ",h("code",null,"@register")," 的 dispatch 模式决定数据如何切分到各 worker、各 worker 的返回如何收集回来；第 6 课讲了 ",h("strong",{className:"hl-purple"},"训练引擎（BaseEngine）"),"，它把 FSDP、Megatron、VeOmni 等后端的前向、反向、优化器步、权重导出等统一为一套与后端无关的接口。"),

          h("div",null,h(Src,{label:"Role",path:"verl/trainer/ppo/utils.py",line:27}))
        )
      ),
      h("div",{className:"note"},"一个值得注意的设计转折：在 verl 的早期版本里，actor、critic、reward model 各有独立的 worker 类（如 ",h("code",null,"CriticWorker"),"、",h("code",null,"RewardModelWorker"),"），且每个后端再分一份（FSDP 一份、Megatron 一份）。在本仓库的统一引擎版本中，这些类被合并：凡是需要训练或前向的角色，统一由 ",h("code",null,"TrainingWorker")," 承载，后端由 ",h("code",null,"config.*.strategy")," 在引擎内部选择；rollout 角色则由 ",h("code",null,"ActorRolloutRefWorker")," 内部持有的 ",h("code",null,"BaseRollout")," 承载。因此本课不再有逐后端的 worker 类，而只有按职责划分的两个核心 worker。"),

  // ===== @register 与 dispatch 模式 =====
  function DispatchSection(){
    return h("div",null,
      h("p",null,"理解 worker 层之前，必须先理解 ",h("code",null,"@register")," 注解。它本身不执行任何分布式逻辑，只是把一对元信息（dispatch 模式、execute 模式、是否阻塞）挂到方法对象上，供 ",h("code",null,"RayWorkerGroup")," 在生成代理方法时读取。换言之，worker 类里的方法体写的是“在单个进程里要做什么”，而 ",h("code",null,"@register")," 声明的是“控制器调用它时，数据如何在 world_size 个进程之间分发与收集”。"),
      h(Code,null,"# single_controller/base/decorator.py\ndef register(dispatch_mode=Dispatch.ALL_TO_ALL, execute_mode=Execute.ALL, blocking=True, materialize_futures=True):\n    _check_dispatch_mode(dispatch_mode=dispatch_mode)\n    _check_execute_mode(execute_mode=execute_mode)\n\n    def decorator(func):\n        @wraps(func)\n        def inner(*args, **kwargs):\n            if materialize_futures:\n                args, kwargs = _materialize_futures(*args, **kwargs)\n            return func(*args, **kwargs)\n        # 把 dispatch/execute/blocking 作为属性挂到方法上, 供 WorkerGroup 读取\n        attrs = {\"dispatch_mode\": dispatch_mode, \"execute_mode\": execute_mode, \"blocking\": blocking}\n        setattr(wrapper, MAGIC_ATTR, attrs)\n        return wrapper\n    return decorator"),

      h(DispatchExplorer),
      h("div",{className:"note"},"完整的 dispatch/collect 机制（参数如何被 ",h("code",null,"parallel_put")," 放进 Ray 对象库、返回如何被拼接回 ",h("code",null,"DataProto"),"）属于第 3 课。本课只需建立一个判据：看一个 worker 方法的 ",h("code",null,"@register")," 注解，就能知道控制器调用它时数据是被复制还是被切分、返回是被全收集还是只取主 rank。")
    );

  const DISPATCH=[
    {key:"o2a",name:"ONE_TO_ALL",render:function(){return [

    ];}},
    {key:"nd",name:"make_nd_compute_dataproto_dispatch_fn",render:function(){return [
      h("p",null,"这是 worker 层数据计算方法的主力模式，也是本课最重要的一种。它不是预定义枚举，而是一个工厂函数，按 ",h("code",null,"mesh_name")," 生成一对 dispatch/collect 函数。其核心思想是：每个 worker 进程在初始化时已经向自己登记了在某个命名网格（mesh）下的数据并行 rank（",h("code",null,"dp_rank"),"）以及是否为该网格的输出收集 rank（",h("code",null,"is_collect"),"）。dispatch 时按 ",h("code",null,"dp_rank")," 把一个批次切成 dp_size 份再分发，collect 时只从 ",h("code",null,"is_collect")," 为真的进程取回结果。"),
      h("p",null,"为什么需要按 mesh 命名？因为同一个共置 worker 内部可能有多个并行结构不同的引擎：actor 引擎有自己的张量并行/流水并行布局，ref 引擎可能不同，rollout 引擎又是另一套。每套布局对应一个网格，数据切分必须按调用的方法所属的网格来做。",h("code",null,"compute_log_prob")," 用 actor 网格，",h("code",null,"compute_ref_log_prob")," 用 ref 网格。"),
      h(Code,null,"# 工厂: 按 mesh_name 生成延迟查询的 dispatch/collect 对\ndef make_nd_compute_dataproto_dispatch_fn(mesh_name):\n    return {\n        \"dispatch_fn\": partial(dispatch_lazy_compute_data_proto, mesh_name),\n        \"collect_fn\": partial(collect_lazy_compute_data_proto, mesh_name),\n    }\n\n# 切分: 先按 dp_size 拆 DataProto, 再按每个进程的 dp_rank 取对应分片\ndef dispatch_nd_compute(dp_rank_mapping, dp_size, worker_group, *args, **kwargs):\n    for i in range(worker_group.world_size):\n        local_dp_rank = dp_rank_mapping[i]\n        transformed_args.append(arg[local_dp_rank])   # 同一 dp 组内的进程拿同一份分片"),

  // ===== TrainingWorker: 把引擎包成 worker =====
  function TrainingWorkerSection(){
    return h("div",null,
      h("p",null,h("code",null,"TrainingWorker")," 是最基础的角色 worker，它继承自 ",h("code",null,"Worker"),"（提供 rank、world_size、master 地址等分布式元信息）与 ",h("code",null,"DistProfilerExtension"),"（提供性能剖析接口）。它的构造函数做三件事：初始化 Ray 进程组，从配置里读出引擎/优化器/检查点配置，然后用 ",h("code",null,"EngineRegistry.new(...)")," 实例化一个具体的训练引擎。引擎的后端由 ",h("code",null,"engine_config.strategy")," 决定，这正是第 6 课讲的引擎注册表机制。"),
      h(Code,null,"# engine_workers.py\nclass TrainingWorker(Worker, DistProfilerExtension):\n    \"\"\"TrainingWorker provides a Tinker-like API as a RayWorkerGroup to a single controller.\"\"\"\n\n    def __init__(self, config: TrainingWorkerConfig):\n        Worker.__init__(self)\n        from verl.workers.engine import BaseEngine, EngineRegistry\n        initialize_global_process_group_ray(timeout_second=None)\n        ...\n        # 按 model_type + strategy 从注册表里取出并实例化引擎\n        self.engine: BaseEngine = EngineRegistry.new(\n            model_type=self.config.model_type,\n            backend=self.engine_config.strategy,\n            model_config=self.model_config,\n            engine_config=self.engine_config,\n            optimizer_config=self.optimizer_config,\n            checkpoint_config=self.checkpoint_config,\n        )\n        # 关键: 向自己登记在 'train' 网格下的 dp_rank 与是否为收集 rank\n        self._register_dispatch_collect_info(\n            mesh_name=\"train\",\n            dp_rank=self.engine.get_data_parallel_rank(),\n            is_collect=self.engine.is_mp_src_rank_with_outputs(),\n        )"),
      h("p",null,"构造函数结尾的 ",h("code",null,"_register_dispatch_collect_info")," 是 worker 与 dispatch 机制衔接的关键。它把引擎报告的两条信息记到 worker 自身：第一，本进程在数据并行维度上属于哪个 ",h("code",null,"dp_rank"),"（决定它应当收到哪一份数据分片）；第二，本进程是否是模型并行组里负责输出的源 rank（",h("code",null,"is_mp_src_rank_with_outputs"),"，决定 collect 时是否从它取回结果）。张量并行组内只有一个进程产出完整输出，其余进程的返回为 ",h("code",null,"None"),"，因此 collect 时必须只收集源 rank。"),
      h("h3",null,"对外暴露的引擎方法"),
      h("p",null,"在引擎之上，",h("code",null,"TrainingWorker")," 用 ",h("code",null,"@register")," 暴露一组方法。按 dispatch 模式可分两类。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill amber"},"ONE_TO_ALL"),"控制类"),
          h("ul",null,
            h("li",null,h("code",null,"to(device, model, optimizer, grad)"),"：手动控制把模型/优化器/梯度加载到设备或卸载到 CPU，用于共置时在训练与推理之间腾挪显存。"),
            h("li",null,h("code",null,"set_loss_fn(loss_fn)"),"：注入损失函数。"),
            h("li",null,h("code",null,"reset()"),"：初始化或重置引擎状态。"),
            h("li",null,h("code",null,"save_checkpoint / load_checkpoint"),"：每个进程保存或加载自己的分片。")),
          h("div",null,h(Src,{label:"to",path:"verl/workers/engine_workers.py",line:150}),h(Src,{label:"reset",path:"verl/workers/engine_workers.py",line:164}),h(Src,{label:"save_checkpoint",path:"verl/workers/engine_workers.py",line:425}))
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"nd_compute"),"数据计算类"),
          h("ul",null,
            h("li",null,h("code",null,"train_batch(data)"),"：在一个 mini-batch 上跑前向、反向并优化一步，返回 loss 与指标。"),
            h("li",null,h("code",null,"train_mini_batch(data)"),"：把一个批次切成多个 mini-batch、跑多个 epoch，内部循环调用 ",h("code",null,"train_batch"),"。"),
            h("li",null,h("code",null,"infer_batch(data)"),"：只做前向（如计算 log_prob 或 value），不更新参数。")),
          h("div",null,h(Src,{label:"train_batch",path:"verl/workers/engine_workers.py",line:323}),h(Src,{label:"train_mini_batch",path:"verl/workers/engine_workers.py",line:233}),h(Src,{label:"infer_batch",path:"verl/workers/engine_workers.py",line:380}))
        )
      ),
      h("p",null,"数据计算类方法的注解都是 ",h("code",null,"@register(dispatch_mode=make_nd_compute_dataproto_dispatch_fn(mesh_name=\"train\"), blocking=False)"),"。",h("code",null,"blocking=False")," 表示控制器发起调用后立即拿到 future 而不阻塞，可与其它工作重叠，这是异步训练能重叠生成与计算的底层支撑。注意这些方法体内部并不亲自做数据切分，切分已经由 dispatch 在控制器侧完成，方法收到的 ",h("code",null,"data")," 已是本进程应处理的那一份。"),
      h(Code,null,"@register(dispatch_mode=make_nd_compute_dataproto_dispatch_fn(mesh_name=\"train\"), blocking=False)\n@DistProfiler.annotate(color=\"red\", role=\"train_batch\")\ndef train_batch(self, data: TensorDict) -> TensorDict:\n    assert self.loss_fn is not None\n    with self.engine.train_mode(...), Timer(name=\"train_batch\", logger=None) as timer:\n        output = self.engine.train_batch(data, loss_function=self.loss_fn)\n    # 只有模型并行组的源 rank 产出完整输出, 其余返回 None\n    if self.engine.is_mp_src_rank_with_outputs():\n        final_output = self._postprocess_output(output, ...).cpu()\n    else:\n        final_output = None\n    return final_output"),
      h("div",{className:"note"},"为什么 critic 也用 ",h("code",null,"TrainingWorker"),"？因为 critic（价值模型）与 actor 的差别只在于模型头与损失函数：critic 输出标量价值、用价值损失训练。在统一引擎设计下，这些差别全部进入配置（critic 使用 ",h("code",null,"model_type=\"value_model\"")," 与 ",h("code",null,"value_loss"),"），worker 本身无需改动。控制器在 ",h("code",null,"trainer_base")," 里直接用 ",h("code",null,"TrainingWorker")," 注册 critic 角色，再 ",h("code",null,"set_loss_fn(value_loss)"),"。"),
      h("div",null,h(Src,{label:"TrainingWorker",path:"verl/workers/engine_workers.py",line:76}),h(Src,{label:"EngineRegistry.new",path:"verl/workers/engine/base.py",line:362}),h(Src,{label:"is_mp_src_rank_with_outputs",path:"verl/workers/engine/base.py",line:217}),h(Src,{label:"critic 注册（用 TrainingWorker）",path:"verl/trainer/ppo/v1/trainer_base.py",line:176}))
    );
  }

  // ===== ActorRolloutRefWorker: 共置 worker =====
  function HybridSection(){
    return h("div",null,
      h("p",null,h("code",null,"ActorRolloutRefWorker")," 是 verl 中最具特色的 worker，也是 HybridFlow 论文中“共置（colocate）”思想的直接体现。它在同一组 GPU 进程里同时承载三个角色：",h("strong",{className:"hl-red"},"actor")," 训练引擎、",h("strong",{className:"hl-teal"},"rollout")," 推理引擎、可选的 ",h("strong",{className:"hl-amber"},"ref")," 参考策略引擎。具体承载哪些角色由构造参数 ",h("code",null,"role")," 字符串决定。"),
      h(Code,null,"# engine_workers.py\nclass ActorRolloutRefWorker(Worker, DistProfilerExtension):\n    \"\"\"Hybrid worker that includes actor model, rollout and optional ref model.\"\"\"\n    actor_worker_cls = TrainingWorker\n    ref_worker_cls = TrainingWorker\n\n    def __init__(self, config, role, distillation_config=None, **kwargs):\n        Worker.__init__(self)\n        self.role = role\n        assert self.role in [\"actor\", \"rollout\", \"ref\", \"actor_rollout\", \"actor_rollout_ref\"]\n        self._is_actor   = self.role in [\"actor\", \"actor_rollout\", \"actor_rollout_ref\"]\n        self._is_rollout = self.role in [\"rollout\", \"actor_rollout\", \"actor_rollout_ref\"]\n        self._is_ref     = self.role in [\"ref\", \"actor_rollout_ref\"]"),
      h("p",null,"这里有一个重要观察：",h("code",null,"actor_worker_cls = TrainingWorker"),"。也就是说，共置 worker 内部的 actor 与 ref 不是另写一套训练逻辑，而是直接复用上一节的 ",h("code",null,"TrainingWorker")," 作为内嵌组件。共置 worker 自己只负责三件事：在 ",h("code",null,"init_model")," 里按角色构建这些内嵌引擎、把内嵌引擎的网格信息转嫁到自己身上、把内嵌引擎的方法重新封装成带正确 dispatch 注解的对外方法。"),
      h("h3",null,"为什么要共置：显存与权重同步"),
      h("p",null,"把 actor 与 rollout 放在同一组 GPU 上的根本动机是显存复用与权重同步成本。在同步 RL 训练里，一步内先用当前策略采样（rollout），再用采样数据更新策略（actor train），两个阶段在时间上互斥。若它们共用同一组卡，则训练时让 rollout 进入睡眠（释放 KV 缓存与权重显存），采样时让 actor 卸载到 CPU，两者轮流占用显存，避免为推理与训练各留一份昂贵的 GPU。更关键的是，",h("strong",null,"共置使得训练后的新权重可以在进程内直接传给 rollout 引擎"),"，无需跨节点的网络传输。"),
      h(Formula,{cap:"共置下一步内的显存占用上界（任一时刻只有一侧驻留权重）"},"$$ M_{\\text{peak}} \\approx \\max\\big(M_{\\text{actor}}^{\\text{train}},\\; M_{\\text{rollout}}^{\\text{infer}}\\big) \\;\\ll\\; M_{\\text{actor}}^{\\text{train}} + M_{\\text{rollout}}^{\\text{infer}} $$"),
      h("p",null,"上式说明：共置把显存峰值从两侧之和降为两侧之大者。代价是两阶段无法并行，因此共置主要用于同步训练；异步训练需要生成与训练同时进行，会改用分离（disaggregated）部署，actor 与 rollout 各占独立的卡，权重同步则改走检查点引擎做跨进程传输。这一对比是第 11 课异步训练的核心。"),
      h("h3",null,"init_model：按角色装配内嵌引擎"),
      h("p",null,h("code",null,"init_model")," 是 ",h("code",null,"ONE_TO_ALL")," 方法（每个进程都要建自己的引擎分片），它按 ",h("code",null,"role")," 顺序装配 ref、actor、rollout 与检查点引擎。其中每装配一个训练引擎，就调用一次 ",h("code",null,"set_dispatch_collect")," 把该引擎的网格信息（在 ",h("code",null,"ref")," 或 ",h("code",null,"actor")," 网格下的 dp_rank 与 collect 标志）合并到共置 worker 自身，使得后续对 ",h("code",null,"compute_ref_log_prob"),"、",h("code",null,"compute_log_prob")," 的调用能各自按正确的网格切分数据。"),
      h(Code,null,"@register(dispatch_mode=Dispatch.ONE_TO_ALL)\ndef init_model(self):\n    model_config = omega_conf_to_dataclass(self.config.model)\n    # 1. 构建 ref 引擎 (若角色含 ref)\n    if \"ref\" in self.role:\n        self.ref = self.ref_worker_cls(config=ref_training_config)\n        self.ref.reset()\n        self.set_dispatch_collect(mesh_name=\"ref\", **self.ref.get_dispatch_collect())\n    # 2. 构建 actor 引擎 (若角色含 actor) 并注入 ppo_loss\n    if \"actor\" in self.role:\n        self.loss_fn = partial(ppo_loss, config=actor_config)\n        self.actor = self.actor_worker_cls(config=actor_training_config)\n        self.actor.reset()\n        self.actor.set_loss_fn(self.loss_fn)\n        self.set_dispatch_collect(mesh_name=\"actor\", **self.actor.get_dispatch_collect())\n    # 3. 构建 rollout 引擎 (若角色含 rollout)\n    if \"rollout\" in self.role:\n        rollout_cls = get_rollout_class(rollout_config.name, rollout_config.mode)\n        self.rollout = rollout_cls(config=rollout_config, model_config=model_config, device_mesh=...)\n    # 4. 构建检查点引擎 (用于权重同步)\n    if \"actor\" in self.role:\n        self.checkpoint_engine = CheckpointEngineRegistry.new(backend, ...)"),
      h("div",{className:"note"},"为什么 ref 经常与 actor 共置而不是单列一个角色？因为参考策略只在 KL 惩罚里被用作前向（不训练），且它与 actor 共享同一份模型结构。把 ref 折入 ",h("code",null,"actor_rollout_ref")," 角色可省去一组独立 GPU。只有在使用 LoRA、ref 需要的是“未加 LoRA 的基座”时，才会把 ref 拆成独立角色（见 ",h("code",null,"main_ppo")," 中按 LoRA 决定角色为 ",h("code",null,"ActorRolloutRef")," 还是 ",h("code",null,"ActorRollout")," 的逻辑）。"),
      h("div",null,h(Src,{label:"ActorRolloutRefWorker",path:"verl/workers/engine_workers.py",line:434}),h(Src,{label:"init_model",path:"verl/workers/engine_workers.py",line:502}),h(Src,{label:"按角色判定 _is_actor/_is_rollout/_is_ref",path:"verl/workers/engine_workers.py",line:455}),h(Src,{label:"main_ppo 按 LoRA 选角色",path:"verl/trainer/main_ppo_v0.py",line:59}))
    );
  }

  // ===== 共置 worker 对外的角色方法 =====
  function MethodsSection(){
    return h("div",null,
      h("p",null,"装配好内嵌引擎后，",h("code",null,"ActorRolloutRefWorker")," 对控制器暴露一组角色方法。每个方法都很薄：它选取正确的内嵌引擎、转调其方法、把结果搬到 CPU 后返回。真正的计算逻辑全在内嵌的 ",h("code",null,"TrainingWorker")," 与 ",h("code",null,"BaseRollout")," 里。下面逐一说明四个核心方法，并强调它们各自的 dispatch 注解。"),
      h(Code,null,"# 计算 actor 的 log_prob: 用 actor 网格切分\n@register(dispatch_mode=make_nd_compute_dataproto_dispatch_fn(mesh_name=\"actor\"))\n@DistProfiler.annotate(color=\"blue\", role=\"actor_compute_log_prob\")\ndef compute_log_prob(self, data: TensorDict) -> TensorDict:\n    output = self.actor.infer_batch(data)\n    return output.cpu() if output is not None else None\n\n# 计算 ref 的 log_prob: 用 ref 网格切分\n@register(dispatch_mode=make_nd_compute_dataproto_dispatch_fn(mesh_name=\"ref\"))\n@DistProfiler.annotate(color=\"olive\", role=\"ref_compute_log_prob\")\ndef compute_ref_log_prob(self, data: TensorDict) -> TensorDict:\n    output = self.ref.infer_batch(data=data)\n    return output.cpu() if output is not None else None\n\n# 更新 actor 参数: 用 actor 网格切分, blocking=False 以便重叠\n@register(dispatch_mode=make_nd_compute_dataproto_dispatch_fn(mesh_name=\"actor\"))\n@DistProfiler.annotate(color=\"red\", role=\"actor_update\")\ndef update_actor(self, data: TensorDict) -> TensorDict:\n    output = self.actor.train_mini_batch(data=data)\n    return output.cpu() if output is not None else None"),
      h("p",null,"注意三者的网格选择：",h("code",null,"compute_log_prob")," 与 ",h("code",null,"update_actor")," 都用 ",h("code",null,"actor")," 网格，因为它们操作的是 actor 引擎；",h("code",null,"compute_ref_log_prob")," 用 ",h("code",null,"ref")," 网格。这正是命名网格模式存在的理由：同一个进程里 actor 与 ref 的并行布局可能不同，数据切分必须各按各的网格。这种区分对调用方完全透明，控制器只是调用 ",h("code",null,"actor_rollout_wg.compute_log_prob(data)"),"，切分细节由注解自动处理。"),
      h("h3",null,"generate 与 update_weights"),
      h("p",null,"rollout 相关方法是这个共置 worker 的另一半。",h("code",null,"generate_sequences")," 类方法转调内嵌的 ",h("code",null,"self.rollout")," 引擎做采样，属于第 8 课 Rollout 引擎的主题。",h("code",null,"update_weights")," 则把训练后的新权重传给 rollout 引擎，它是一个 ",h("code",null,"async")," 方法（",h("code",null,"blocking=False"),"），并按部署模式分两条路径。"),
      h(Code,null,"@register(dispatch_mode=Dispatch.ONE_TO_ALL, blocking=False)\nasync def update_weights(self, global_steps=None, mode=\"auto\"):\n    effective_mode = mode if mode != \"auto\" else self.config.rollout.checkpoint_engine.backend\n    # 路径 A: 分离部署 (异步训练)：只经检查点引擎跨进程发送权重\n    if effective_mode != \"naive\":\n        per_tensor_param, _ = self.actor.engine.get_per_tensor_param()\n        await self.checkpoint_engine.send_weights(per_tensor_param, global_steps=global_steps)\n        return\n    # 路径 B: 共置部署 (同步训练)：进程内直接把权重灌给 rollout\n    if self.config.rollout.free_cache_engine:\n        await self.rollout.resume(tags=[\"weights\"])          # 唤醒 rollout 的权重显存\n    per_tensor_param, peft_config = self.actor.engine.get_per_tensor_param(...)\n    await self.rollout.update_weights(per_tensor_param, peft_config=peft_config, ...)\n    if self.actor.engine.is_param_offload_enabled:\n        self.actor.engine.to(\"cpu\", model=True, optimizer=False, grad=False)  # actor 让出显存\n    if self.config.rollout.free_cache_engine:\n        await self.rollout.resume(tags=[\"kv_cache\"])          # 唤醒 rollout 的 KV 缓存"),

      h("div",{className:"note"},"还有两个与权重相关的细节方法：",h("code",null,"load_checkpoint")," 与 ",h("code",null,"save_checkpoint")," 都断言 ",h("code",null,"\"actor\" in self.role"),"（只有 actor 角色需要持久化训练状态），并转调内嵌 actor 的对应方法；",h("code",null,"execute_checkpoint_engine")," 用 ",h("code",null,"DP_COMPUTE")," 模式按数据并行 rank 在各进程上执行检查点引擎的任意方法。"),
