  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 4 课</p><h1>配置体系</h1><p>能访问 CDN 时切换为交互版。本课讲清 verl 的配置体系：base_config.py 的冻结 dataclass 基类、trainer/config 下 actor/critic/ref/rollout/reward/algorithm 各组结构化配置、Hydra 与 OmegaConf 如何组合 YAML 与命令行覆盖，以及配置如何流入 main_ppo 并决定资源池映射与各 worker 的后端选择。</p></main></div>

  // ===== 一、为什么需要一套配置体系 =====
  function WhySection(){
    return h("div",null,
      h("p",null,"一次 RL 后训练涉及的可调参数数以百计：actor 用什么并行策略、micro batch 多大、rollout 选 vLLM 还是 SGLang、张量并行多少、优势估计用 GAE 还是 GRPO、KL 系数多少、checkpoint 存哪些内容。如果把这些参数散落在脚本里，既无法静态检查类型，也无法在不改代码的前提下扫描超参。verl 的配置体系要同时满足三个互相牵制的诉求："),
      h("ul",null,
        h("li",null,h("strong",null,"可组合"),"：actor、rollout、critic、reward、algorithm 等组可独立替换。换一个训练后端只应替换 actor 一组，而非重写整份配置。"),

        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill amber"},"内层"),"BaseConfig dataclass"),

  // ===== 二、BaseConfig：冻结 dataclass 的设计 =====
  function BaseConfigSection(){
    const ref=useTypeset("base");
    return h("div",{ref:ref},
      h("p",null,"所有结构化配置类都继承自 ",h("code",null,"BaseConfig"),"，它定义在 ",h("code",null,"verl/base_config.py"),"。这是整个配置体系的最底层基石，只有约 70 行，却确定了三条关键性质：默认冻结、dict 式访问、与 OmegaConf 兼容。"),
      h(Code,null,"@dataclass\nclass BaseConfig(collections.abc.Mapping):\n    \"\"\"为 dataclass 配置提供 dict 式接口。\n    默认所有字段不可变, 除非列入 _mutable_fields。\n    继承 Mapping 抽象基类, 使实例能像字典一样使用。\"\"\"\n\n    _mutable_fields = set()\n    _target_: str = \"\"\n\n    def __setattr__(self, name, value):\n        # 字段一旦存在即视为冻结, 除非它在 _mutable_fields 中\n        if name in self.__dict__ and name not in getattr(self, \"_mutable_fields\", set()):\n            raise FrozenInstanceError(f\"Field '{name}' is frozen and cannot be modified\")\n        super().__setattr__(name, value)\n\n    def get(self, key, default=None):\n        try:\n            return getattr(self, key)\n        except AttributeError:\n            return default\n\n    def __getitem__(self, key):\n        return getattr(self, key)"),
      h("h3",null,"为什么默认冻结"),
      h("p",null,"RL 训练的 bug 往往是静默的：某个超参在构造后被某处代码意外改写，训练照常进行但结果偏差，难以察觉。",h("code",null,"BaseConfig")," 重写 ",h("code",null,"__setattr__"),"，使任何已存在字段的再次赋值都抛出 ",h("code",null,"FrozenInstanceError"),"。这把“配置在构造后不应改变”这条约定从口头约束变为运行时强制。确需在运行期回填的字段（例如 batch size 需按实际 GPU 数校正），通过类变量 ",h("code",null,"_mutable_fields")," 显式列入白名单，从而把“哪些字段可变”也变成可审阅的声明。"),
      h("h3",null,"为什么继承 Mapping"),
      h("p",null,"verl 早期大量代码以 ",h("code",null,"config['actor']['ppo_epochs']")," 或 ",h("code",null,"config.get('lora', {})")," 的字典风格访问配置。",h("code",null,"BaseConfig")," 继承 ",h("code",null,"collections.abc.Mapping")," 并实现 ",h("code",null,"__getitem__"),"、",h("code",null,"__iter__"),"、",h("code",null,"__len__"),"、",h("code",null,"get"),"，使得迁移到 dataclass 后，原有的字典式访问仍然成立。这是一种刻意保留的向后兼容：既获得 dataclass 的类型标注与属性访问，又不必一次性改写所有调用点。"),

          h(Code,null,"_mutable_fields = BaseConfig._mutable_fields | {\n    \"ppo_mini_batch_size\",\n    \"ppo_micro_batch_size\",\n    \"ppo_micro_batch_size_per_gpu\",\n    \"engine\",\n    \"model_config\",\n}")
        ),

        )
      ),
      h("div",null,h(Src,{label:"BaseConfig",path:"verl/base_config.py",line:22}),h(Src,{label:"__setattr__ 冻结逻辑",path:"verl/base_config.py",line:33}),h(Src,{label:"get / __getitem__",path:"verl/base_config.py",line:40}),h(Src,{label:"ActorConfig._mutable_fields",path:"verl/workers/config/actor.py",line:141}))
    );

  // ===== 三、结构化配置类：各组字段 =====
  const GROUPS=[
