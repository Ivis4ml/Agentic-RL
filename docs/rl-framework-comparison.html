    ];}},
    {key:"env",name:"环境/Agent 接入与动态化",render:function(){return [
      h("p",null,"这是你们痛点 (a)“static→dynamic env”的核心维度，也是“env scale 谁最容易”的关键。"),

        h("li",null,h("strong",{className:"hl-amber"},"Polar（最强）"),"：八种真实商用 agent（claude_code/codex/gemini_cli/opencode/openhands_sdk/pi/qwen_code/shell）",h("strong",null,"零改造"),"接入：gateway 注入 ",h("code",null,"*_BASE_URL"),"=gateway、",h("code",null,"session_id")," 当 API key 重定向推理流量。接新环境只需写一个命令生成器或用 shell/import_path 逃逸口。"),
