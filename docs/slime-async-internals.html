  <div id="root"><main class="fallback"><p class="kicker">Static fallback</p><h1>slime 异步内核（代码级）</h1><p>能访问 CDN 时切换为交互版。本页把 fully_async 在途池与 delta 权重同步展开到代码级机制。</p></main></div>
  <script>
  const h=React.createElement;const {useState,useEffect,useRef}=React;

  function useTypeset(dep){const ref=useRef(null);useEffect(function(){const M=window.MathJax;if(M&&M.typesetPromise&&ref.current){if(M.typesetClear){try{M.typesetClear([ref.current]);}catch(e){}}M.typesetPromise([ref.current]).catch(function(){});}},[dep]);return ref;}
  function Formula(props){return h("div",{className:"formula"},props.cap?h("span",{className:"cap"},props.cap):null,props.children);}
  const PY_KW=["and","as","assert","async","await","break","class","continue","def","elif","else","except","finally","for","from","if","import","in","is","lambda","None","not","or","pass","raise","return","try","while","with","yield","True","False","global"];
  const PY_TY=["Any","Optional","Callable","Tensor","torch","dist","np","Sample","Status","DeltaBucket","DeltaState","DeltaSpec","DeltaParam","ParamDiff","EncodedChunk","AsyncRolloutWorker","GenerateState","Stream","Event","set","dict","list","int","float","bool","str","bytes"];
  function escapeHtml(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function hp(text){const esc=escapeHtml(text);const re=new RegExp("(@[A-Za-z_]\\w*)|\\b(class|def)\\s+([A-Za-z_]\\w*)|\\b("+PY_KW.join("|")+")\\b|\\b("+PY_TY.join("|")+")\\b|\\b([A-Za-z_]\\w*)(?=\\s*\\()|\\b(\\d+(?:\\.\\d+)?)\\b","g");return esc.replace(re,function(m,deco,kind,decl,kw,ty,fn,num){if(deco)return '<span class="tok-decorator">'+deco+'</span>';if(kind&&decl)return '<span class="tok-keyword">'+kind+'</span> <span class="'+(kind==="class"?"tok-class":"tok-fn")+'">'+decl+'</span>';if(kw)return '<span class="tok-keyword">'+kw+'</span>';if(ty)return '<span class="tok-type">'+ty+'</span>';if(fn)return '<span class="tok-fn">'+fn+'</span>';if(num)return '<span class="tok-number">'+num+'</span>';return m;});}
  function highlight(code){let out="",plain="",i=0;const flush=function(){if(plain){out+=hp(plain);plain="";}};while(i<code.length){const ch=code[i];if(ch==="#"){flush();let j=i;while(j<code.length&&code[j]!=="\n")j++;out+='<span class="tok-comment">'+escapeHtml(code.slice(i,j))+'</span>';i=j;}else if(ch==='"'||ch==="'"){flush();const q=ch;let j=i+1;while(j<code.length&&code[j]!==q){if(code[j]==="\\")j++;j++;}j++;out+='<span class="tok-string">'+escapeHtml(code.slice(i,j))+'</span>';i=j;}else{plain+=ch;i++;}}flush();return out;}
  function Code(props){return h("pre",null,h("code",{dangerouslySetInnerHTML:{__html:highlight(props.children)}}));}

  function TopNav(){return h("div",{className:"course-nav"},
    h("a",{className:"home",href:"rl-framework-comparison.html"},"slime 异步内核",h("span",{className:"dot"},"·"),"代码级"),
    h("div",{className:"lessons"},
      h("a",{className:"lchip",href:"rl-framework-comparison.html"},"← 五框架横评"),
      h("a",{className:"lchip",href:"slime/slime-course-index.html"},"slime 精读"),
      h("a",{className:"lchip",href:"slime/slime-lesson-08-rollout-async.html"},"L8 Rollout 与异步"),
      h("a",{className:"lchip",href:"slime/slime-lesson-07-weight-sync.html"},"L7 权重同步")));}

  const FA = "slime/rollout/fully_async_rollout.py";
  const DL = "slime/backends/megatron_utils/update_weight/update_weight_from_distributed_delta.py";

  function FullyAsync(){const ref=useTypeset("fa");
    return h("div",{ref:ref},
      h("h3",null,"它解决什么：把在途并发与训练 batch 解耦"),
      h("p",null,"同步 rollout 的瓶颈是“等齐整批”：一步的耗时由批内最慢轨迹决定。长程 agentic 任务里轨迹长度方差极大，这个长尾直接拖垮吞吐。fully_async 的核心是让一个常驻后台线程维持一个固定大小的在途轨迹池，池的大小 ",h("code",null,"max_concurrent_tasks")," 与训练 batch 大小 ",h("code",null,"rollout_batch_size")," 完全解耦：慢轨迹仍在跑时，快轨迹已经完成并被新轨迹补位，池始终保持满。"),
      h(Formula,{cap:"有效生成吞吐由池占用率决定，与最慢单条轨迹无关（只要池保持满）"},"$$ \\text{throughput}_{\\text{gen}} \\approx \\frac{\\texttt{max\\_concurrent\\_tasks}}{\\mathbb{E}[T_{\\text{traj}}]}, \\qquad \\texttt{max\\_concurrent\\_tasks} = \\texttt{sglang\\_server\\_concurrency} \\times N_{\\text{engines}} $$"),
      h("p",null,"并发上限取自 ",h("code",null,"args.sglang_server_concurrency")," 乘以 SGLang 引擎数，与 ",h("code",null,"sglang_rollout")," 里的 per-sample 信号量上限一致；worker 是进程级全局单例，跨 rollout 调用复用，使队列保持“热”。"),
      h("div",null,h(Src,{label:"_get_global_worker（全局常驻）",path:FA,line:53}),h(Src,{label:"concurrency 计算",path:FA,line:59}),h(Src,{label:"AsyncRolloutWorker",path:FA,line:76})),

      h("h3",null,"后台事件循环：回收 + 补满 + 让出"),
      h("p",null,"worker 在独立线程里跑一个 asyncio 事件循环（",h("code",null,"_thread_main → asyncio.run(self._loop())"),"）。每轮做三件事：回收已完成的 task、把在途池补满到 ",h("code",null,"max_concurrent"),"、然后 ",h("code",null,"await asyncio.sleep(1)")," 让出控制权给真正的生成协程。"),
      h(Code,null,"async def _loop(self):\n    active_tasks: set[asyncio.Task] = set()\n    max_concurrent = self.concurrency        # = sglang_server_concurrency * num_engines\n    while self.running:\n        # 1) 回收已完成任务（结果已在回调里处理）\n        done = {t for t in active_tasks if t.done()}\n        active_tasks -= done\n        # 2) 把在途池补满（与 rollout_batch_size 无关）\n        while len(active_tasks) < max_concurrent and self.running:\n            groups = self.data_buffer.get_samples(1)\n            if not groups:\n                break\n            for group in groups:\n                task = asyncio.create_task(\n                    generate_and_rm_group(self.args, group,\n                        sampling_params=self.state.sampling_params.copy(),\n                        evaluation=False))\n                task.add_done_callback(self._make_done_cb(gid))\n                active_tasks.add(task)\n        await asyncio.sleep(1)"),
      h("p",null,"每个 task 是一组（group）的生成 + 打分，调用 slime 自己的 ",h("code",null,"generate_and_rm_group"),"，后者再分派到 ",h("code",null,"--custom-generate-function-path")," 与 ",h("code",null,"--custom-rm-path"),"。worker 本身不感知 slime 上层的 pause / 权重更新信号，每条生成各自在信号上短路并标记状态，worker 只负责调度与回收。"),
      h("div",null,h(Src,{label:"_loop",path:FA,line:118}),h(Src,{label:"补满在途池",path:FA,line:136}),h(Src,{label:"create_task(generate_and_rm_group)",path:FA,line:143}),h(Src,{label:"data_buffer.get_samples(1)",path:FA,line:137})),

      h("h3",null,"完成回调：中止的组退回 buffer，不送训练"),
      h("p",null,"这是 fully_async 与异步正确性的衔接点。一条生成若在权重切换时被中止，会带 ",h("code",null,"Sample.Status.ABORTED"),"。回调判断：只要组内任一样本是 ABORTED，就把整组退回 ",h("code",null,"data_buffer")," 等下一轮（携新权重）重跑，而不是把半截的 off-policy 轨迹送去训练；否则放入 ",h("code",null,"output_queue"),"。"),
      h(Code,null,"def _cb(done_task):\n    result = done_task.result()        # list[Sample]\n    # 中止的组（权重切换时被打断）退回 buffer, 不送训练\n    if any(s.status == Sample.Status.ABORTED for s in result):\n        self.data_buffer.add_samples([result])\n        return\n    self.output_queue.put((gid, result))"),
      h("div",null,h(Src,{label:"_make_done_cb",path:FA,line:169}),h(Src,{label:"ABORTED 退回 buffer",path:FA,line:183}),h(Src,{label:"output_queue.put",path:FA,line:189})),

      h("h3",null,"收集端：攒够一个 batch 就返回"),
      h("p",null,"训练侧入口 ",h("code",null,"generate_rollout_fully_async")," 拿到全局 worker，持续从 ",h("code",null,"output_queue")," 抽取已完成的组，攒够 ",h("code",null,"target = rollout_batch_size")," 即按 ",h("code",null,"sample.index")," 排序后返回（slime 的确定性约定）。注意它显式拒绝 evaluation 模式。"),
      h(Code,null,"async def _generate_rollout_async(args, rollout_id, data_buffer):\n    worker = _get_global_worker(args, data_buffer)   # 全局常驻, 队列保持\"热\"\n    target = args.rollout_batch_size\n    collected = {}\n    while len(collected) < target:\n        for gid, group in worker.get_completed_groups():\n            collected[gid] = group\n        if not drained:\n            await asyncio.sleep(0.05)\n    return sorted(collected.values(), key=_index)[:target]"),
      h("div",{className:"note"},"与陈旧度的衔接：每条 ",h("code",null,"Sample.weight_versions")," 是一个列表（一条长轨迹可跨多个权重版本生成）；训练侧据此做重要性采样修正，",h("code",null,"--mask-offpolicy-in-partial-rollout")," 把续跑前旧前缀的 loss_mask 置零。见 ",h(Src,{label:"Sample（weight_versions）",path:"slime/utils/types.py",line:9}),"与第 8 课。"),
      h("div",null,h(Src,{label:"_generate_rollout_async",path:FA,line:194}),h(Src,{label:"攒够 target",path:FA,line:211}),h(Src,{label:"按 index 排序",path:FA,line:241}),h(Src,{label:"拒绝 evaluation",path:FA,line:254})),

      h("div",{className:"pick"},h("strong",null,"为什么这解决长尾："),"池占用率而非最慢轨迹决定吞吐；ABORTED 组回收重跑而非污染训练；全局常驻 worker 让队列跨 rollout 边界保持热，避免每个 rollout 重新预热的冷启动开销。")
    );
  }

  function DeltaSync(){const ref=useTypeset("dl");
    return h("div",{ref:ref},
      h("h3",null,"它解决什么：只传变化的字节，且无损覆盖"),
      h("p",null,"每步训练后要把更新的权重推给推理引擎。全量广播让 ",h("code",null,"T_sync")," 很大，吃掉异步重叠的收益。delta 同步的思路：把当前权重与“上一次广播的 pinned-CPU 快照”做按位 diff，只打包变化的位置与值发送；接收端用训练侧的精确字节覆盖变化位置（无任何算术），因此是无损的，不会有需要靠周期性重同步去纠正的漂移。首次 ",h("code",null,"update_weights")," 只播种快照、不联系推理引擎（它们在 init 时已加载同一 HF checkpoint）。"),
      h(Formula,{cap:"传输字节量随密度 ρ 线性下降（bf16 权重实测 ρ≈2%）"},"$$ \\text{wire\\_bytes} \\approx \\rho \\cdot N_{\\text{params}} \\cdot (b_{\\text{val}} + b_{\\text{pos}}),\\quad \\rho \\approx 2\\%,\\ b_{\\text{val}}=2\\,(\\text{bf16}),\\ b_{\\text{pos}}\\in\\{2,4\\}\\,\\text{字节} $$"),
      h("div",null,h(Src,{label:"模块说明（三编码 + 无损覆盖）",path:DL,line:1}),h(Src,{label:"UpdateWeightFromDistributedDelta",path:DL,line:479})),

      h("h3",null,"一次同步的总流程"),
      h("p",null,"非首次 ",h("code",null,"update_weights")," 的骨架是经典的“停、换、续”，中间夹 diff/编码/广播，两段计时 ",h("code",null,"delta_encode")," 与 ",h("code",null,"delta_finalize")," 之和即用户观测到的同步延迟。"),
      h(Code,null,"@torch.no_grad()\ndef update_weights(self):\n    if not self._snapshot_seeded:           # 首次: 只播种快照, 不联系推理引擎\n        self._seed_snapshot(); self._snapshot_seeded = True; return\n    self.weight_version += 1\n    if dist.get_rank() == 0:\n        ray.get([e.pause_generation.remote() for e in self.rollout_engines])  # 停\n        ray.get([e.flush_cache.remote() for e in self.rollout_engines])       # 换(切旧 KV)\n    dist.barrier(group=get_gloo_group())\n    with timer(\"delta_encode\"):\n        self._send_weights(pbar)            # 逐 chunk: 取快照->diff->编码->入桶->广播或写入磁盘\n        if self.writer: self.writer.drain()\n        self.delta_state.flush_snapshot()\n        dist.barrier(group=get_gloo_group())\n    with timer(\"delta_finalize\"):\n        self._finalize_sync()               # 续: 等 apply 落定 -> continue_generation\n    self._record_metrics()"),
      h("div",null,h(Src,{label:"update_weights",path:DL,line:568}),h(Src,{label:"首次只播种快照",path:DL,line:576}),h(Src,{label:"停 + 换 + barrier",path:DL,line:587}),h(Src,{label:"_seed_snapshot（355B 约 50s）",path:DL,line:612})),

      h("h3",null,"compute：按位 diff（dtype 无关）"),
      h("p",null,"diff 不依赖具体浮点类型，而是把张量按元素字节宽度 reinterpret 成整数再逐元素比较，得到一个同形状的布尔掩码。这样 bf16 / fp16 / fp32 / fp8 都走同一条路径，且“相等即字节相同”，保证接收端覆盖是无损的。"),
