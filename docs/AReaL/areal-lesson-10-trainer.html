  const STEPS=[
    {t:"actor.prepare_batch",ref:"第 8 / 9 课 · rollout",what:"取一个训练批。在线模式下从异步 rollout 队列排空已接受的轨迹，受 staleness 容量约束。每条轨迹是 workflow 产出的 input_ids/loss_mask/logprobs/versions/reward。",links:[["rl_trainer 主循环",`areal/trainer/rl_trainer.py`,584],["prepare_batch (staleness)","areal/api/engine_api.py",869]]},

    {t:"actor.ppo_update",ref:"第 4 / 7 课 · 损失+反向",what:"engine.train() 开梯度检查点，切成 ppo_n_minibatches 个微批，每批 engine.train_batch(grpo_loss_fn)。grpo_loss_fn 分发到 ppo_actor_loss_fn 或 sapo_loss_fn。",links:[["ppo_update","areal/trainer/ppo/actor.py",253],["grpo_loss_fn","areal/trainer/ppo/actor.py",408],["ppo_actor_loss_fn","areal/utils/functional/functional.py",429]]},
    {t:"权重同步",ref:"第 7 / 8 课 · 切断旧 KV",what:"rollout.pause() → pause_generation()（中止旧请求）→ 广播新权重给推理引擎 → set_version 升版本 → continue_generation() → resume()。已生成的旧 token 带旧版本，交给 decoupled PPO。",links:[["rl_trainer pause",`areal/trainer/rl_trainer.py`,445],["update_weights","areal/api/engine_api.py",175]]},
    {t:"save / eval / log",ref:"第 1 / 5 课 · 周期组件",what:"按 FrequencyControl 周期性存 DCP checkpoint、跑评测、导出统计到 W&B/TensorBoard。断点恢复靠 recover 与确定性种子。",links:[["Saver","areal/utils/saver.py",null],["Evaluator","areal/utils/evaluator.py",null],["StatsLogger","areal/utils/stats_logger.py",null]]}
  ];

  // ===== PPOActor 三步 =====
  const ACTOR=[
    {key:"logp",name:"compute_logp",render:function(){return [

      h(Code,null,"reward = clip((data['rewards'] + reward_bias) * reward_scaling, -reward_clip, reward_clip)\nif reward_norm: reward = self.reward_norm(reward)\nloss_mask = torch.roll(data['loss_mask'].float(), -1, dims=-1)\nrewards = -kl_ctl * kl_estimator(old_logp, ref_logp)   # 逐 token KL\nrewards[:, last] += reward                              # 末位任务奖励\n# GAE 反向扫描 (见第 4 课)"),
      h("div",null,h(Src,{label:"_compute_advantages",path:"areal/trainer/ppo/actor.py",line:145}),h(Src,{label:"GAE 递推",path:"areal/trainer/ppo/actor.py",line:222}))
    ];}},

      h(Code,null,"self.engine.train()                                         # 开梯度检查点\nmb_inputs = split_padded_tensor_dict_into_mb_list(\n    data, mb_spec=MicroBatchSpec(n_mbs=self.config.ppo_n_minibatches))\nfor mb in mb_inputs.mbs:\n    self.engine.train_batch(mb, loss_fn=functools.partial(\n        grpo_loss_fn, eps_clip=..., eps_clip_higher=..., c_clip=...,\n        rejection_sampling=..., importance_sampling_level=...))\n\n# grpo_loss_fn 分发:\n#   importance_sampling_level=='sapo' -> sapo_loss_fn\n#   否则 -> ppo_actor_loss_fn  (clip / dual-clip / GSPO, 第 4 课)"),
