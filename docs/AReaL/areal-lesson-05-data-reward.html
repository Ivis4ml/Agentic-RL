  const REWARDS=[
    {n:"MathVerifyWorker",file:"areal/reward/__init__.py",line:13,role:"共享的数学校验器，薄封装 math_verify 库的 parse() + verify()。关键设计：用 concurrent.futures 做线程安全超时，而不是 signal.alarm（后者只在主线程有效，多线程 rollout 下会失效）。精度按有效数字（默认 6 位），singleton 复用。",code:"class MathVerifyWorker:\n    def _verify_impl(self, response, ground_truth):\n        gold = parse(ground_truth, ...)\n        pred = parse(response, ...)\n        if not gold or not pred:\n            return 0.0\n        return 1.0 if math_verify_verify(gold, pred, float_rounding=self.precision) else 0.0\n\n    def verify(self, response, ground_truth):\n        # 线程池里跑, future.result(timeout=...) 实现线程安全超时\n        with ThreadPoolExecutor(max_workers=1) as ex:\n            return ex.submit(self._verify_impl, response, ground_truth).result(timeout=self.timeout)"},
    {n:"gsm8k_reward_fn",file:"areal/reward/gsm8k.py",line:10,role:"最简 reward 范例。签名 (prompt, completions, prompt_ids, completion_ids, answer, **kwargs) -> float，内部调 MathVerifyWorker 校验答案，对就 1.0、错就 0.0；任何异常都吞掉返回 0.0（reward 函数绝不能让一条坏样本拖垮整个训练步）。",code:"def gsm8k_reward_fn(prompt, completions, prompt_ids, completion_ids, answer, **kwargs):\n    try:\n        worker = get_math_verify_worker()\n        return worker.verify(str(completions), str(answer))   # 1.0 / 0.0\n    except Exception:\n        logger.warning('Exception in gsm8k_reward_fn', exc_info=True)\n        return 0.0"},
    {n:"geometry3k_reward_fn",file:"areal/reward/geometry3k.py",line:27,role:"多模态几何的 reward：先 extract_answer 从模型输出里抽出答案（默认取最后一个数字），再做数值校验。结构与 gsm8k 一致，只是多一步答案抽取。",code:"def extract_answer(pred_str, use_last_number=True):\n    # 从自由文本里抽出答案（默认最后一个数字）\n    ...\n\ndef geometry3k_reward_fn(prompt, completions, ..., answer, **kwargs):\n    pred = extract_answer(str(completions))\n    return 1.0 if verify(pred, answer) else 0.0"},
    {n:"懒加载分发",file:"areal/reward/__init__.py",line:120,role:"reward 包用模块级 __getattr__ 懒加载：访问 areal.reward.gsm8k_reward_fn 时才真正 import 对应模块。这样 import areal.reward 不会一次性拉入所有数据集与校验依赖。",code:"_LAZY_IMPORTS = {\n    'gsm8k_reward_fn': 'areal.reward.gsm8k',\n    'geometry3k_reward_fn': 'areal.reward.geometry3k',\n    'clevr_count_70k_reward_fn': 'areal.reward.clevr_count_70k',\n}\ndef __getattr__(name):          # PEP 562 模块级 __getattr__\n    if name in _LAZY_IMPORTS:\n        mod = importlib.import_module(_LAZY_IMPORTS[name])\n        return getattr(mod, name)\n    raise AttributeError(name)"}
