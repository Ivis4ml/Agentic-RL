  // 地基层全部文件（完整覆盖）。deep=true 的有深入说明。
  const FILES=[
    {f:"utils/logging.py",tag:"分级彩色日志",deep:true,role:"按组件类别给日志上色的集中式日志。logger 名用 PascalCase 描述名（如 FSDPEngine、RLVRWorkflow），不用模块点路径；颜色按类别分（基础设施蓝、编排白、RL 紫、计算后端青、数据绿），WARNING 以上一律覆盖成黄/红。",syms:[["getLogger","areal/utils/logging.py",339],["LoggerColoredFormatter","areal/utils/logging.py",159],["setup_file_logging","areal/utils/logging.py",407]]},
    {f:"utils/name_resolve.py",tag:"分布式名字解析",deep:true,role:"rendezvous：让分散在各机器上的 worker 不靠硬编码地址也能互相发现。抽象基类 NameRecordRepository 定义 add/get/wait/watch，多种后端实现（内存测试用、NFS 文件、etcd3 带租约、Ray actor）。键可重复、值唯一（多重映射），TTL 靠 keepalive 线程续租。",syms:[["NameRecordRepository","areal/utils/name_resolve.py",42],["NfsNameRecordRepository","areal/utils/name_resolve.py",284],["Etcd3NameRecordRepository","areal/utils/name_resolve.py",412],["make_repository","areal/utils/name_resolve.py",1211]]},

    {f:"utils/constants.py",tag:"全局常量",deep:true,role:"全局常量与算法枚举。生成超时默认 2 小时（避免长推理被提前掐断），向量化访存的 16 字节边界要求（SSE/AVX/CUDA TMA），以及 decoupled PPO 用的 ProxLogpMethod 与 ProxApproxMethod 枚举。",syms:[["DIST_GROUP_DEFAULT_TIMEOUT","areal/utils/constants.py",12],["DEFAULT_VECTORIZED_ALIGNMENT_BYTES","areal/utils/constants.py",28],["ProxLogpMethod","areal/utils/constants.py",36],["ProxApproxMethod","areal/utils/constants.py",54]]},

    {f:"utils/dynamic_import.py",tag:"按字符串导入类",deep:true,role:"把 'module.path.ClassName' 字符串解析成真实的类或函数（rsplit + importlib + getattr）。这是整个框架的插件机制：Scheduler.create_engine 就是拿配置里的 engine 字符串在远端 worker 上实例化引擎。",syms:[["import_from_string","areal/utils/dynamic_import.py",7]]},
    {f:"utils/timeutil.py",tag:"频率控制与调度",deep:true,role:"按时间间隔或步数触发的 FrequencyControl（支持 all_reduce 跨 rank 同步：任一 rank 触发则全体触发），组合三种条件的 EpochStepTimeFreqCtl，以及 LR 调度器（constant/linear/cosine/chained）。",syms:[["FrequencyControl","areal/utils/timeutil.py",17],["EpochStepTimeFreqCtl","areal/utils/timeutil.py",145],["CosineDecayScheduler","areal/utils/timeutil.py",233]]},
