  // ===== 交互式 trie：点节点高亮其祖先（= tree attention 可 attend 的范围）=====
  const TRIE=[
    {id:"root",label:"·",x:240,y:34,parent:null,seqs:"root"},

      ),
      h("div",{ref:ref},
        h("h3",{style:{marginTop:0}},"被选 token：",h("span",{className:"hl-teal"},node.label)),
        h("p",null,"它属于 ",h("code",null,node.seqs),"。在 tree attention 里，它只能 attend 自己的祖先链（绿色 ",anc.length," 个节点），看不到其它分支。"),

  const TREEBACK=[
    {key:"trie",name:"压缩 trie",render:function(){return [

    ];}},

    return h("div",{ref:ref},
      h("p",null,"长序列（32k+）单卡放不下，要沿序列维切到多张卡（上下文并行 CP）。难点是 attention 需要全序列才能算。Ulysses 的巧法是用两次 all-to-all 做“转置”："),
