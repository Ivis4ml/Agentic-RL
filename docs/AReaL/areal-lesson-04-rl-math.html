    {key:"sapo",name:"SAPO 软门控",math:function(){return [
        h("p",null,"PPO 的硬裁剪在边界处梯度突然归零。SAPO 用平滑的 sigmoid 门替代裁剪，对正负优势用不同温度（非对称）。记 ",h("code",null,"ρ = exp(log π_θ − log π_old)"),"："),
        h(Formula,{cap:"非对称软门（4/τ 把 ρ=1 处梯度归一化）"},"$$ g_{+} = \\frac{4}{\\tau_{+}}\\,\\sigma\\big(\\tau_{+}(\\rho-1)\\big), \\qquad g_{-} = \\frac{4}{\\tau_{-}}\\,\\sigma\\big(\\tau_{-}(\\rho-1)\\big) $$"),
        h(Formula,{cap:"按优势符号选门，再加权"},"$$ \\text{gate}_t = \\begin{cases} g_{+} & A_t > 0 \\\\ g_{-} & A_t \\le 0 \\end{cases}, \\qquad \\mathcal{L}_t = -\\,\\text{gate}_t \\cdot A_t $$"),
        h("p",null,"为什么乘 ",h("code",null,"4/τ"),"？因为 ",h("code",null,"σ'(0)=1/4"),"，在 ",h("code",null,"ρ=1")," 处门的斜率是 ",h("code",null,"(4/τ)·τ·(1/4)=1"),"，使不同温度下初始梯度尺度一致。SAPO 处处可导，没有硬裁剪带来的死区。")
      ];},
      code:"# areal/utils/functional/functional.py:562\ngate_pos = torch.sigmoid(tau_pos * (ratio - 1.0))\ngate_neg = torch.sigmoid(tau_neg * (ratio - 1.0))\nscaled_pos = gate_pos * (4.0 / tau_pos)\nscaled_neg = gate_neg * (4.0 / tau_neg)\nsoft_gate = torch.where(advantages > 0, scaled_pos, scaled_neg)\npg_loss = -soft_gate * advantages\nloss = torch.where(loss_mask, pg_loss, 0).sum() / loss_mask_count",
      links:[["sapo_loss_fn","areal/utils/functional/functional.py",562]]},
    {key:"critic",name:"PPO critic loss",math:function(){return [
        h("p",null,"critic 回归 GAE 算出的回报 ",h("code",null,"R̂_t"),"。和 actor 一样做裁剪，防止 value 一步更新过大："),
        h(Formula,{cap:"裁剪后的 value"},"$$ V^{\\text{clip}}_t = V^{\\text{old}}_t + \\operatorname{clip}\\big(V_t - V^{\\text{old}}_t,\\, -\\varepsilon_v,\\, \\varepsilon_v\\big) $$"),
        h(Formula,{cap:"取两者较大的损失（悲观）"},"$$ \\mathcal{L}^{V}_t = \\max\\!\\big(\\ell(V_t, \\hat{R}_t),\\; \\ell(V^{\\text{clip}}_t, \\hat{R}_t)\\big) $$"),
        h("p",null,"逐元素损失 ",h("code",null,"ℓ")," 可选 MSE ",h("code",null,"½(x−y)²")," 或 Huber（δ=10，对离群回报更稳）。GRPO 没有 critic（用组内归一化代替），所以这条只在带 value 的 PPO 用。")
      ];},
      code:"def ppo_critic_loss_fn(value, old_value, target_value,\n                       value_eps_clip, loss_mask=None, loss_fn_type='mse'):\n    loss_fn = _huber_loss if loss_fn_type == 'huber' else _mse_loss\n    l_orig = loss_fn(value, target_value)\n    v_clip = old_value + (value - old_value).clamp(-value_eps_clip, value_eps_clip)\n    l_clip = loss_fn(v_clip, target_value)\n    value_loss = torch.max(l_orig, l_clip)   # 悲观取大\n    # 再 mask 求平均",
      links:[["ppo_critic_loss_fn","areal/utils/functional/functional.py",714]]},
    {key:"overlong",name:"超长惩罚",math:function(){return [
        h("p",null,"模型会学会“写很长来骗 reward”。DAPO 式软超长惩罚：在接近上限的缓冲区内线性扣分，超过缓冲全扣。设最大长度 ",h("code",null,"L_max"),"、缓冲 ",h("code",null,"L_buf = overlong_tokens"),"、强度 ",h("code",null,"α"),"，响应长度 ",h("code",null,"L"),"："),
        h(Formula,{cap:"软超长惩罚（加到序列 reward 上）"},"$$ \\text{penalty}(L) = \\min\\!\\Big(0,\\; -\\,\\frac{L - (L_{\\max} - L_{\\text{buf}})}{L_{\\text{buf}}}\\cdot \\alpha\\Big) $$"),
        h("p",null,"当 ",h("code",null,"L ≤ L_max − L_buf")," 时分子为负，min 取 0，不罚；进入缓冲区后从 0 线性降到 ",h("code",null,"−α"),"。这是一个 reward 整形原语，在算优势之前作用于 ",h("code",null,"data['rewards']"),"。"),
        h("div",{className:"note"},"它和长度无关的任务 reward 相加，再进 GAE。把“别写太长”做成可微外的 reward 项，而不是硬截断，训练更平滑。")
      ];},
      code:"def reward_overlong_penalty(data, overlong_tokens,\n                            overlong_penalty_factor, max_response_length):\n    lengths = data['loss_mask'].sum(-1).long()\n    for i in range(len(lengths)):\n        expected = max_response_length - overlong_tokens\n        exceed = lengths[i] - expected\n        pen = min(-exceed / overlong_tokens * overlong_penalty_factor, 0)\n        data['rewards'][i] += pen\n    return data",
      links:[["reward_overlong_penalty","areal/utils/functional/functional.py",782]]}
  ];
  function LossExplorer(){const [s,setS]=useState(3);const p=PRIMS[s];const ref=useTypeset(p.key);
    return h("div",null,

      h("div",{className:"split"},
        h("div",{key:p.key,ref:ref},p.math()),
        h("div",{key:"c-"+p.key},h(Code,null,p.code),h("div",{style:{marginTop:10}},p.links.map(function(l,i){return h(Src,{key:i,label:l[0],path:l[1],line:l[2]});})))
      )
    );
  }

  function PackingSection(){const ref=useTypeset("pack");
    return h("div",{ref:ref},
      h("p",null,"RL rollout 的长度差异极大。若 micro-batch 按样本数均分，慢的 DP rank 会拖死整步；正确做法是按 token 数装箱，让各 micro-batch 的 token 总数尽量均衡。给定长度 ",h("code",null,"ℓ_i")," 与容量 ",h("code",null,"C"),"："),
      h(Formula,{cap:"装箱目标：最小化最重箱"},"$$ \\min \\; \\max_{j} \\sum_{i \\in \\text{bin}_j} \\ell_i \\quad \\text{s.t.} \\quad \\sum_{i\\in\\text{bin}_j}\\ell_i \\le C $$"),
      h("div",{className:"split"},
        h("div",null,
          h("h4",null,"两种装箱算法"),
          h("ul",null,
            h("li",null,h("strong",null,"FFD"),"（First-Fit Decreasing）：按长度降序，每条放进“放得下且当前最满”的箱。快，近似比有界。"),
            h("li",null,h("strong",null,"KK"),"（Karmarkar-Karp 最大差分）：反复合并当前最不均衡的两个部分，更均衡，代价是慢一点。"),
            h("li",null,h("strong",null,"partition_balanced"),"：numba 加速的 DP，把序列切成 k 段使各段和的极差最小（用于 DP rank 间均衡）。")),
          h("div",null,h(Src,{label:"partition_balanced (numba DP)","path":"areal/utils/seqpack.py",line:22}),h(Src,{label:"ffd_allocate",path:"areal/utils/seqpack.py",line:234}),h(Src,{label:"_kk_partition",path:"areal/utils/seqpack.py",line:337}),h(Src,{label:"kk_allocate",path:"areal/utils/seqpack.py",line:446}))
        ),
        h("div",null,
          h("h4",null,"打包成扁平张量"),
          h("p",null,"装好箱后，把 padded ",h("code",null,"[B,S]")," 压成扁平 ",h("code",null,"[T]"),"，用前缀和 ",h("code",null,"cu_seqlens")," 标记每条边界，喂 FlashAttention varlen（第 9、7 课会用到）。"),
          h(Formula,{cap:"cu_seqlens 累积边界"},"$$ \\text{cu\\_seqlens} = [\\,0,\\ \\ell_1,\\ \\ell_1{+}\\ell_2,\\ \\dots,\\ \\textstyle\\sum_i \\ell_i\\,] $$"),
          h(Code,null,"pack_tensor_dict(data)        # [B,S] padded -> [T] packed + cu_seqlens\nunpad_input(hidden, mask)     # 去 padding, 返回 indices + cu_seqlens\nsplit_padded_tensor_dict_into_mb_list(...)  # 按 token 容量切 micro-batch"),
          h("div",null,h(Src,{label:"pack_tensor_dict",path:"areal/utils/data.py",line:492}),h(Src,{label:"unpad_input",path:"areal/utils/data.py",line:183}),h(Src,{label:"split_padded_tensor_dict_into_mb_list",path:"areal/utils/data.py",line:696}))
        )
      ),
      h("div",{className:"note"},"装箱是 RL 训练吞吐的一等公民：长度方差越大，均衡装箱省的 padding 越多。FFD 默认够用，长尾分布严重时换 KK。")
    );
  }
