  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 5 课</p><h1>Runtime 池化</h1><p>能访问 CDN 时切换为交互版。本课讲清 Polar 的 Runtime 抽象：每个 agent 会话所需的隔离沙箱（容器），BaseRuntime 契约与 docker / apptainer 两种后端，factory 如何按配置选择，以及最关键的运行时复用机制：一个长生命周期的容器如何跨 INIT / RUN / POSTRUN 三个阶段复用，从而避免每个环境都是 static 一次性实例造成的 pod 与 GPU 小时浪费。</p></main></div>
