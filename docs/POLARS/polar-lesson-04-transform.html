  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 4 课</p><h1>协议变换 transform</h1><p>能访问 CDN 时切换为交互版。本课讲清 Polar 的协议变换层：为什么需要一个把 Anthropic Messages、Google/Gemini、OpenAI Chat、OpenAI Responses 四种 API 方言统一变换到 SGLang 后端格式、再把响应变换回各方言的中间层；base.py 的变换抽象（请求变换、响应变换、流式变换三个抽象方法与训练增强）；各方言在消息结构、工具调用、流式事件、停止原因上的差异；以及 images.py 的多模态图像在各格式间的互转。</p></main></div>

      h(Formula,{cap:"变换层的两个方向：请求向内统一，响应向外还原（N 种方言 ⇄ 1 种后端格式）"},"$$ \\text{方言}_i \\xrightarrow{\\;\\text{transform\\_request}\\;} \\text{OpenAI Chat} \\xrightarrow{\\;\\text{SGLang}\\;} \\text{OpenAI Chat} \\xrightarrow{\\;\\text{transform\\_response}\\;} \\text{方言}_i $$"),

        )
