  <div id="root"><main class="fallback"><p class="kicker">Static fallback · 第 1 课</p><h1>地基与全局观</h1><p>能访问 CDN 时切换为交互版。本课讲清 Polar 的三条设计主张（Harness as Environment、Smart Rollout Pipeline、Rollout as a Service），从 Rollout Server 到分布式 Gateway Node 的架构总览，cli.py 入口与 config/topology 拓扑配置，以及 Polar 作为 NVIDIA-NeMo 出品、trainer-agnostic 且自带 slime bridge 的定位。</p></main></div>

  // ===== 三条设计主张 =====
  function PhilosophySection(){
    return h("div",null,
      h("p",null,"读 Polar 之前，先把它要解决的问题讲清。强化学习训练大模型 agent 时，rollout（采样真实轨迹）这一侧的工程成本远超训练侧：一条轨迹往往不是一次推理，而是 agent 在某个执行环境里反复调用模型、执行命令、读写文件、调用工具，最后才得到可计算奖励的结果。Polar 是 ",h("strong",{className:"hl-teal"},"NVIDIA-NeMo")," 出品的 RL rollout 框架（全称 ProRL-Agent-Server），目标是把任意现成的 ",h("strong",null,"agent harness")," 当作 RL 可用的环境接入，并以服务方式对接任意训练框架。它在 README 顶部用三句话概括了全部设计意图。"),
      h("div",{className:"split"},
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill teal"},"主张一"),"Harness as Environment"),
          h("p",null,"把你的 agent harness 当作 RL 可用的环境直接接入，无需改动其代码。Polar 不要求 harness 暴露训练接口，而是用一个抽象基类把 harness 配置翻译成在隔离 runtime 中执行的命令序列，由 Polar 负责采样轨迹与计算奖励。")
        ),
        h("div",{className:"card"},
          h("div",{className:"card-title"},h("span",{className:"pill amber"},"主张二"),"Smart Rollout Pipeline"),
          h("p",null,"用并行的 Rollout Staging 与 Runtime Pooling 节省 GPU 小时。一条轨迹的准备（拉起 runtime）、执行（跑 agent）、收尾（评估）被拆成独立的阶段，各阶段有独立的工作线程池，使得推理服务的 GPU 不必干等环境准备。")
        )
      ),
      h("div",{className:"card",style:{marginTop:"16px"}},
        h("div",{className:"card-title"},h("span",{className:"pill purple"},"主张三"),"Rollout as a Service"),
        h("p",null,"以服务方式设计（server mode by design）：Polar 暴露一套 HTTP 接口，训练框架以客户端身份提交任务、轮询结果。因此 Polar 与具体训练器无关（trainer-agnostic），异步 RL 可以接到任意训练框架上，而不必把训练器的内核派生（fork）进来。仓库已经带了一个面向 ",h(Ext,{href:"https://github.com/THUDM/slime"},"slime")," 的 bridge 作为示例集成。")
      ),
      h("h3",null,"这三条主张如何对应真实需求"),
      h("ul",null,
        h("li",null,h("strong",null,"从静态环境到动态环境（static → dynamic env）"),"：传统 RL 数据集是静态的 prompt-answer 对；agent 任务的环境是动态的，每一步动作改变环境状态。Harness as Environment 把一个完整 harness（含其文件系统、工具、多轮交互）封装为可重复采样的动态环境，而不要求把它改写成静态数据。"),
        h("li",null,h("strong",null,"异步效率"),"：rollout 的瓶颈在于环境准备与执行的等待，而非 GPU 算力本身。Smart Rollout Pipeline 用阶段隔离的工作线程池把准备、执行、评估重叠起来，使推理 GPU 的利用率提高，从而节省 GPU 小时。"),
        h("li",null,h("strong",null,"在商业 Env 上搭基础设施"),"：当环境是一个无法改动的第三方 harness（例如 SWE-bench 官方评测 harness、各类商业 agent）时，Rollout as a Service 的服务边界让 Polar 只通过 HTTP 与命令执行与之交互，因此能在不侵入 harness 的前提下为其补齐 RL 训练所需的采样、轨迹构建与评估设施。")

  // ===== 架构总览：从 Rollout Server 到 Gateway Node =====
  function ArchSection(){
    return h("div",null,
      h("p",null,"README 的架构图配文给出了一句精确的总述：Rollout Server 接收并分发客户端请求到分布式的 Gateway Node，后者异步地准备 runtime、执行 agent、构建轨迹并评估；agent harness 由一个 proxy 监听，这个 proxy 坐在与具体 agent 无关的执行进程和推理服务之间。把这句话拆成三个角色，就是理解全仓库的骨架。"),

          h("div",null,h(Src,{label:"serve（rollout）",path:"src/polar/rollout/server.py",line:223}),h(Src,{label:"task/submit",path:"src/polar/rollout/server.py",line:109}),h(Src,{label:"nodes/register",path:"src/polar/rollout/server.py",line:136}))
        ),
        h("div",null,
          h("h4",null,"角色二 · Gateway Node（分布式执行）"),

          h("div",null,h(Src,{label:"serve_gateway",path:"src/polar/gateway/server.py",line:812}),h(Src,{label:"GatewayNodeManager",path:"src/polar/gateway/node.py",line:47}),h(Src,{label:"dispatch",path:"src/polar/gateway/node.py",line:152}))
        )
      ),
      h("h4",null,"角色三 · Proxy（坐在执行进程与推理服务之间）"),
      h("p",null,"Gateway Node 内部运行一个 FastAPI proxy。agent harness 在 runtime 里以普通进程运行，它对模型的调用是发往一个 OpenAI 兼容地址的 HTTP 请求；proxy 拦截这些请求（",h("code",null,"POST /{path:path}"),"），识别 API 类型，按会话补充必要信息后转发给真正的推理服务 SGLang，再把响应转回。因此 harness 完全不知道自己在被训练，它只是在和一个看起来普通的推理端点对话。这正是 Harness as Environment 得以免改造的关键机制。"),
      h("p",null,"proxy 与 SGLang 之间通过 ",h("code",null,"SGLangClient")," 通信。注意它的超时设计：每次调用的真实时限来自会话的剩余预算（在 Gateway Node 用 ",h("code",null,"_await_with_budget")," 施加），而 httpx 内部超时只是一个很高的存活上限，防止卡住的 SGLang 把请求拖过会话截止时间。"),
      h(Code,null,"# Gateway proxy: 拦截 harness 发出的推理请求并转发给 SGLang\n@app.api_route(\"/{path:path}\", methods=[\"POST\"])\nasync def proxy_request(request: Request, path: str):\n    state = get_state()\n    body = await request.json()\n    headers = {k: v for k, v in request.headers.items()}\n    full_path = request.url.path\n    api_type = detect(full_path, headers, body)          # OpenAI / Anthropic / Google ...\n    session_id = _resolve_session_id(headers, body, ...) # 把请求归属到某个会话\n    transformer = state.transform_manager.get(api_type)  # 选择协议变换器 (第 4 课)\n    # ... 变换后转发给 SGLang, 再把响应转回 ..."),

    );
  }

  // ===== Smart Rollout Pipeline：阶段隔离与 runtime 池化 =====
  function PipelineSection(){
